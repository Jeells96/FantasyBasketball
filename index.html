window.pullAllStats = async function() {
  const roster = teamRoster(myTeamId()).filter(p => p.mlbId);
  if (!roster.length) { toast('No mapped players on your roster', 'err'); return; }
  toast(`Pulling stats for ${roster.length} players…`);
  LG().gameLogs = LG().gameLogs || {};
  let ok = 0, fail = 0;
  for (const p of roster) {
    try {
      const isPitcher = /SP|RP|P/.test((p.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((p.eligible||[]).join(''));
      const groups = isPitcher ? ['pitching'] : ['hitting'];
      const all = [];
      for (const grp of groups) {
        const log = await mlbGameLog(p.mlbId, grp);
        log.forEach(g => all.push({ ...g, group: grp }));
      }
      LG().gameLogs[p.mlbId] = all;
      ok++;
    } catch(e) { fail++; }
    await new Promise(r=>setTimeout(r,60));
  }
  await save();
  toast(`Stats loaded: ${ok} ok${fail?`, ${fail} failed`:''}`, fail?'err':'ok');
  renderActive();
};

/* Players view works in Phase 1 once pool is loaded — proves the data layer */
const playerView = { sort: 'adp', dir: 1, posFilter: 'ALL', search: '', avail: 'all', ptsWindow: 'season', grpFilter: 'all', minGames: 0, minWeeks: 0, salFilter: 'all' };
let teamViewMode = 'lineup';  // 'lineup' (day grid) | 'stats' (all-stats table)

function viewPlayersReal() {
  if (!LG().playerPool.length) {
    return `<div class="h1">Players</div>
      <div class="empty"><div class="big">◎</div>
      <div class="msg">No player pool yet. Pull it from ESPN in Settings.</div>
      <button class="btn" onclick="go('settings')">Open Settings</button></div>`;
  }
  const mappedCount = LG().playerPool.filter(p => p.mlbId).length;
  const draftedIds = new Set(LG().draft.picks.map(pk => String(pk.playerId)));
  const allPos = SP().posFilters;

  let list = LG().playerPool.filter(p => {
    if (playerView.search && !normName(p.name).includes(normName(playerView.search))) return false;
    // batter/pitcher group filter (baseball)
    if (playerView.grpFilter !== 'all') {
      const elig = (p.eligible||[]).join(' ');
      const isPitcher = /\bSP\b|\bRP\b/.test(elig) && !/\bC\b|1B|2B|3B|SS|\bOF\b|\bDH\b/.test(elig);
      if (playerView.grpFilter === 'pitchers' && !isPitcher) return false;
      if (playerView.grpFilter === 'batters' && isPitcher) return false;
    }
    if (playerView.posFilter !== 'ALL') {
      const elig = (p.eligible||[]).join(' ') + ' ' + (p.pos||'');
      if (!elig.includes(playerView.posFilter)) return false;
    }
    if (playerView.avail === 'avail' && draftedIds.has(String(p.espnId))) return false;
    if (playerView.avail === 'drafted' && !draftedIds.has(String(p.espnId))) return false;
    if (playerView.minGames > 0 && (p.gamesPlayed ?? 0) < playerView.minGames) return false;
    if (playerView.minWeeks > 0 && (p.weeksPlayed ?? 0) < playerView.minWeeks) return false;
    return true;
  });

  // which points field is active based on the window toggle
  const ptsField = { season:'ptsSeason', '7':'pts7', '14':'pts14', '30':'pts30', bestavg:'bestAvg' }[playerView.ptsWindow];
  const ptsLabel = { season:'Season', '7':'7d', '14':'14d', '30':'30d', bestavg:'Best Avg' }[playerView.ptsWindow];

  const useSal = LSET().useSalaryCap;
  const s = playerView.sort, dir = playerView.dir;
  list.sort((a,b) => {
    if (s === 'name') return dir * a.name.localeCompare(b.name);
    if (s === 'pts')  return dir * ((a[ptsField] ?? -Infinity) - (b[ptsField] ?? -Infinity));
    if (s === 'salary') return dir * ((playerCapHit(a) ?? 0) - (playerCapHit(b) ?? 0));
    return dir * ((a[s] ?? 0) - (b[s] ?? 0));
  });
  // salary sub-filter (all / signed / arb / unsigned)
  if (useSal && playerView.salFilter && playerView.salFilter !== 'all') {
    list = list.filter(p => {
      if (playerView.salFilter === 'signed') return !!playerContract(p);
      if (playerView.salFilter === 'arb') return isArbPlayer(p);
      if (playerView.salFilter === 'unsigned') return !playerContract(p) && importedAAV(p)!=null;
      return true;
    });
  }

  const havePoints = LG().playerPool.some(p => p.ptsSeason != null);
  const shown = list.slice(0, 150);
  const rows = shown.map(p => {
    const drafted = draftedIds.has(String(p.espnId));
    const pk = LG().draft.picks.find(x => String(x.playerId) === String(p.espnId));
    const ownerTeam = pk ? teamById(pk.teamId).abbrev : '';
    const adpTxt = p.adp < 9999 ? p.adp.toFixed(0) : '—';
    const ptsVal = p[ptsField];
    const ptsTxt = (ptsVal != null) ? ptsVal.toFixed(0) : '—';
    return `<tr style="${drafted?'opacity:.45':''}">
      <td><span class="plink" onclick="showPlayer('${p.espnId}')">${esc(p.name)}</span>
        ${p.injured?'<span class="il-badge">IL</span>':''}
        ${drafted?`<span class="sub" style="font-size:.6rem"> · ${esc(ownerTeam)}</span>`:''}</td>
      <td class="pos">${esc((p.eligible||[]).join('/') || p.pos || '?')}</td>
      <td class="pos">${esc(p.proTeam||'')}</td>
      <td class="r num cell-best" style="${p.adp>=9999?'color:var(--sage-dim)':''}">${adpTxt}</td>
      <td class="r num" style="font-size:.72rem;${(ptsVal==null||ptsVal<=0)?'color:var(--sage-dim)':'color:var(--chalk);font-weight:600'}">${ptsTxt}</td>
      ${useSal?`<td class="r num" style="font-size:.68rem">${fmtMoney(playerCapHit(p))}${playerContract(p)?' 📝':isArbPlayer(p)?' A':''}</td>`:''}
    </tr>`;
  }).join('');

  const sortBtn = (key,label) =>
    `<button class="btn btn-sm ${playerView.sort===key?'':'btn-ghost'}" onclick="setSort('${key}')">${label}${playerView.sort===key?(dir<0?' ▼':' ▲'):''}</button>`;
  const posBtn = (pos) =>
    `<button class="btn btn-sm ${playerView.posFilter===pos?'btn-amber':'btn-ghost'}" onclick="setPosFilter('${pos}')">${pos}</button>`;
  const winBtn = (w,label) =>
    `<button class="btn btn-sm ${playerView.ptsWindow===w?'btn-amber':'btn-ghost'}" onclick="setPtsWindow('${w}')">${label}</button>`;

  return `
    <div class="eyebrow">${SP().label} pool · ${LG().playerPool.length} players · ${mappedCount} linked</div>
    <div class="h1">Players</div>

    ${!havePoints ? `<div class="card card-tight mt">
      <p class="sub" style="font-size:.75rem;text-align:center"><span class="spinner-inline"></span>
        Loading player points…</p>
    </div>` : ''}

    <div class="field mt">
      <input class="input" placeholder="Search players…" value="${esc(playerView.search)}" oninput="setSearch(this.value)">
    </div>
    ${SP().key==='flb' ? `<div class="row" style="gap:.35rem;margin-top:.5rem">
      <button class="btn btn-sm ${playerView.grpFilter==='all'?'btn-amber':'btn-ghost'}" onclick="setGrpFilter('all')">All</button>
      <button class="btn btn-sm ${playerView.grpFilter==='batters'?'btn-amber':'btn-ghost'}" onclick="setGrpFilter('batters')">⚾ Batters</button>
      <button class="btn btn-sm ${playerView.grpFilter==='pitchers'?'btn-amber':'btn-ghost'}" onclick="setGrpFilter('pitchers')">🥎 Pitchers</button>
    </div>` : ''}
    <div class="row" style="gap:.35rem;overflow-x:auto;padding-bottom:.4rem;margin-top:.4rem">${allPos.map(posBtn).join('')}</div>
    <div class="row" style="gap:.35rem;margin-top:.4rem;flex-wrap:wrap">
      <span class="sub" style="align-self:center;font-size:.68rem">Sort:</span>
      ${sortBtn('adp','ADP')} ${sortBtn('pts','Pts')} ${sortBtn('name','Name')}${useSal?' '+sortBtn('salary','$'):''}
    </div>
    ${useSal?`<div class="row" style="gap:.35rem;margin-top:.4rem;flex-wrap:wrap">
      <span class="sub" style="align-self:center;font-size:.68rem">Salary:</span>
      <button class="btn btn-sm ${(!playerView.salFilter||playerView.salFilter==='all')?'btn-amber':'btn-ghost'}" onclick="setSalFilter('all')">All</button>
      <button class="btn btn-sm ${playerView.salFilter==='signed'?'btn-amber':'btn-ghost'}" onclick="setSalFilter('signed')">📝 Signed</button>
      <button class="btn btn-sm ${playerView.salFilter==='unsigned'?'btn-amber':'btn-ghost'}" onclick="setSalFilter('unsigned')">Unsigned</button>
      <button class="btn btn-sm ${playerView.salFilter==='arb'?'btn-amber':'btn-ghost'}" onclick="setSalFilter('arb')">A Arb</button>
    </div>`:''}
    <div class="row" style="gap:.35rem;margin-top:.4rem;flex-wrap:wrap">
      <span class="sub" style="align-self:center;font-size:.68rem">Show stat:</span>
      ${winBtn('season','Season')} ${winBtn('bestavg','Best Avg')} ${winBtn('30','30d')} ${winBtn('14','14d')} ${winBtn('7','7d')}
    </div>
    <div class="row" style="gap:.35rem;margin-top:.4rem">
      <span class="sub" style="align-self:center;font-size:.68rem">Show:</span>
      <button class="btn btn-sm ${playerView.avail==='all'?'btn-amber':'btn-ghost'}" onclick="setAvail('all')">All</button>
      <button class="btn btn-sm ${playerView.avail==='avail'?'btn-amber':'btn-ghost'}" onclick="setAvail('avail')">Available</button>
    </div>
    <div class="row" style="gap:.5rem;margin-top:.4rem;flex-wrap:wrap;align-items:center">
      <span class="sub" style="font-size:.68rem">Min games</span>
      <input class="input" type="number" min="0" value="${playerView.minGames}" style="width:64px;text-align:center;padding:.3rem"
        onchange="setMinGames(this.value)">
      <span class="sub" style="font-size:.68rem">Min weeks</span>
      <input class="input" type="number" min="0" value="${playerView.minWeeks}" style="width:64px;text-align:center;padding:.3rem"
        onchange="setMinWeeks(this.value)">
      ${(playerView.minGames||playerView.minWeeks)?`<button class="btn btn-sm btn-ghost" onclick="clearMinFilters()">clear</button>`:''}
    </div>
    <div class="card card-tight mt">
      <table class="tbl">
        <thead><tr><th>Player</th><th>Pos</th><th>Tm</th><th class="r">ADP</th><th class="r">${ptsLabel}</th>${useSal?'<th class="r">$ Now</th>':''}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${list.length > 150 ? `<div class="divlabel">showing 150 of ${list.length} matches</div>` :
        `<div class="divlabel">${list.length} player${list.length!==1?'s':''}</div>`}
    </div>
    ${playerView.search && playerView.search.length >= 3 ? `
      <div class="card card-tight mt" style="border-color:var(--sage)">
        <p class="sub" style="font-size:.72rem">Don't see who you're looking for? The pool is the top 300 by ADP.
          Search MLB directly to load <b>${esc(playerView.search)}</b> to this device.</p>
        <button class="btn btn-sm btn-block" onclick="loadExtraPlayer('${esc(playerView.search)}')">🔎 Search MLB for "${esc(playerView.search)}"</button>
      </div>` : ''}
    <p class="sub mt" style="font-size:.7rem;text-align:center">Pool is the top 300 by ADP. Tap a name for details. Players outside the 300 load to this device only.</p>`;
}

/* Load a player NOT in the top-300 pool, by searching MLB. Adds them to a
   LOCAL-ONLY extras list (not synced to Firebase, so the doc stays small). */
window.loadExtraPlayer = async function(name) {
  if (!name) return;
  openModal(`<div class="h2">Searching MLB…</div><div class="spinner"></div>
    <p class="sub" style="text-align:center">Looking for "${esc(name)}"</p>`);
  try {
    const res = await fetch(`${MLB}/people/search?names=${encodeURIComponent(name)}`);
    const data = res.ok ? await res.json() : {};
    const people = (data.people || []).slice(0, 8);
    if (!people.length) {
      openModal(`<div class="h2">No match</div>
        <p class="sub mb">MLB had no player named "${esc(name)}".</p>
        <button class="btn btn-ghost btn-block" onclick="closeModal()">Close</button>`);
      return;
    }
    const rows = people.map(p => {
      const pos = p.primaryPosition?.abbreviation || '';
      const team = p.currentTeam?.name || '';
      const already = LG().playerPool.some(x => String(x.mlbId)===String(p.id));
      return `<div class="row-between" style="padding:.4rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
        <span style="font-size:.85rem">${esc(p.fullName)} <span class="sub" style="font-size:.65rem">${esc(pos)} · ${esc(team)}</span></span>
        ${already?'<span class="sub" style="font-size:.65rem">in pool</span>'
          :`<button class="btn btn-sm btn-amber" onclick="addExtraPlayer(${p.id},'${esc(p.fullName).replace(/'/g,"\\'")}','${esc(pos)}')">Load</button>`}
      </div>`;
    }).join('');
    openModal(`<div class="h2">Load a player</div>
      <p class="sub mb">These load to this device only (not synced).</p>
      ${rows}
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>`);
  } catch(e) {
    openModal(`<div class="h2">Search failed</div><p class="sub mb">${esc(e?.message||'error')}</p>
      <button class="btn btn-ghost btn-block" onclick="closeModal()">Close</button>`);
  }
};
/* add a searched MLB player into the LOCAL pool (flagged extra, not synced) */
window.addExtraPlayer = async function(mlbId, fullName, pos) {
  // map MLB position abbreviation to our eligibility buckets
  const posMap = { 'C':'C','1B':'1B','2B':'2B','3B':'3B','SS':'SS','LF':'OF','CF':'OF','RF':'OF','OF':'OF','DH':'DH','P':'SP','SP':'SP','RP':'RP' };
  const eligible = [ posMap[pos] || 'DH' ];
  const player = {
    espnId: 'mlb_' + mlbId,     // synthetic id so it won't collide with ESPN ids
    name: fullName,
    pos: eligible[0],
    defPosId: null,
    eligible,
    proTeam: '',
    eligSlots: [],
    adp: 9999,
    seasonPts: 0,
    owned: 0,
    injured: false,
    mlbId: mlbId,
    extra: true,                // flag: local-only, never synced
  };
  // de-dupe
  if (!LG().playerPool.some(p => String(p.mlbId)===String(mlbId))) {
    LG().playerPool.push(player);
  }
  saveLocal();                  // LOCAL only — not save() / Firebase
  await computeOnePlayer(player);
  toast(`Loaded ${fullName} to this device`, 'ok');
  closeModal();
  renderActive();
};

/* SINGLE source of truth for a player's computed point fields from a game log.
   Sets ptsSeason, pts7/14/30, and bestAvg (avg of each week's best single game). */
function applyPointFields(p, log) {
  const today = new Date(); today.setHours(0,0,0,0);
  const cut = (d) => { const x = new Date(today); x.setDate(today.getDate()-d); return ymd(x); };
  const c7 = cut(7), c14 = cut(14), c30 = cut(30);
  let season=0,w7=0,w14=0,w30=0;
  const weekBest = {}; // fantasy week -> best single game pts
  log.forEach(g => {
    const pts = gamePoints(g.stat, g.group);
    season+=pts;
    if(g.date>=c7)w7+=pts; if(g.date>=c14)w14+=pts; if(g.date>=c30)w30+=pts;
    const wk = weekOfDate(g.date);
    if (wk != null) weekBest[wk] = Math.max(weekBest[wk] ?? -Infinity, pts);
  });
  const bests = Object.values(weekBest).filter(v => v > -Infinity);
  const bestAvg = bests.length ? bests.reduce((a,b)=>a+b,0)/bests.length : 0;
  p.ptsSeason=Math.round(season*10)/10; p.pts7=Math.round(w7*10)/10;
  p.pts14=Math.round(w14*10)/10; p.pts30=Math.round(w30*10)/10;
  p.bestAvg=Math.round(bestAvg*10)/10; p.seasonPts=p.ptsSeason;
  p.gamesPlayed = log.length;                  // total games in the log
  p.weeksPlayed = Object.keys(weekBest).length; // distinct fantasy weeks played
}

/* compute points for ONE player on demand (when their modal opens) */
async function computeOnePlayer(p) {
  if (!p?.mlbId) return;
  try {
    let log = LG().gameLogs?.[p.mlbId];
    if (!log) {
      const isPitcher = /SP|RP/.test((p.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((p.eligible||[]).join(''));
      const grp = isPitcher ? 'pitching' : 'hitting';
      const raw = await mlbGameLog(p.mlbId, grp);
      log = raw.map(g => ({...g, group: grp}));
      LG().gameLogs = LG().gameLogs || {};
      LG().gameLogs[p.mlbId] = log;
    }
    applyPointFields(p, log);
  } catch(e) {}
}

/* Roll a player's whole-season game log into per-week buckets.
   Returns { weeks: [{week, total, best, games}], avg, playedWeeks }.
   total = sum of that week's games; best = highest single game (the "kept" score). */
function playerWeeklyBreakdown(p) {
  const log = LG().gameLogs?.[p.mlbId] || [];
  if (!log.length) return { weeks: [], avg: 0, playedWeeks: 0, bestWeek: 0 };
  // map each game date → fantasy week number
  const byWeek = {};
  log.forEach(g => {
    const wk = weekOfDate(g.date);
    if (wk == null) return;
    const pts = gamePoints(g.stat, g.group);
    (byWeek[wk] = byWeek[wk] || []).push({ ...g, pts });
  });
  const weeks = Object.keys(byWeek).map(Number).sort((a,b)=>a-b).map(wk => {
    const games = byWeek[wk];
    const total = Math.round(games.reduce((s,g)=>s+g.pts,0)*10)/10;
    const best = games.reduce((b,g)=> g.pts>b.pts?g:b, games[0]);
    return { week: wk, total, best: Math.round(best.pts*10)/10, games: games.length };
  });
  const playedWeeks = weeks.length;
  const avg = playedWeeks ? Math.round(weeks.reduce((s,w)=>s+w.total,0)/playedWeeks*10)/10 : 0;
  const bestWeek = weeks.reduce((m,w)=>Math.max(m,w.total), 0);
  return { weeks, avg, playedWeeks, bestWeek };
}

/* which fantasy week does a YYYY-MM-DD date fall in? (inverse of weekDays) */
function weekOfDate(dateYmd) {
  const d = new Date(dateYmd + 'T00:00:00');
  const open = seasonOpenerMonday();
  if (d < open) return null;
  // walk weeks (handles custom durations)
  for (let w = 1; w <= 26; w++) {
    const { start, end } = weekDateRange(w);
    if (d >= start && d <= end) return w;
  }
  return null;
}

window.showPlayer = function(espnId) {
  const p = LG().playerPool.find(x => String(x.espnId) === String(espnId));
  if (!p) return;
  // reset week-expansion when opening a different player
  if (!window._expandedWeek || String(window._expandedWeek.espnId) !== String(espnId)) {
    window._expandedWeek = null;
  }
  // if this player's points aren't computed yet but they're mapped, fetch on demand
  if (p.ptsSeason == null && p.mlbId) {
    renderPlayerModal(p, true);  // show with a loading hint
    computeOnePlayer(p).then(() => { renderPlayerModal(p, false); });
    return;
  }
  renderPlayerModal(p, false);
};
function renderPlayerModal(p, loading) {
  const pk = LG().draft.picks.find(x => String(x.playerId) === String(p.espnId));
  const onMyTeam = pk && String(pk.teamId) === String(myTeamId());
  const isFreeAgent = !pk;
  const havePts = p.ptsSeason != null;
  const cap = rosterCap(), count = myTeamId() ? rosterActiveCount(myTeamId()) : 0;
  const full = count >= cap;

  openModal(`
    <div class="h2">${esc(p.name)}</div>
    <div class="sub mb">${esc((p.eligible||[]).join(', '))} · ${esc(p.proTeam||'')}
      ${p.injured?'· <span class="cell-neg">IL</span>':''}</div>
    <div class="statrow mt mb">
      <div class="stat"><div class="lbl">ADP</div><div class="val amber">${p.adp<9999?p.adp.toFixed(0):'—'}</div></div>
      <div class="stat"><div class="lbl">Season</div><div class="val">${loading?'<span class="sub">…</span>':(havePts?p.ptsSeason.toFixed(0):'—')}</div></div>
      ${LSET().useSalaryCap
        ? `<div class="stat"><div class="lbl">AAV</div><div class="val" style="font-size:1rem">${fmtMoney(playerSalary(p))}</div></div>`
        : `<div class="stat"><div class="lbl">Status</div><div class="val" style="font-size:1rem">${pk?(onMyTeam?'Yours':'Rostered'):'Free'}</div></div>`}
    </div>
    ${LSET().useSalaryCap && salaryDB()[normName(p.name)] ? (()=>{ const r=salaryDB()[normName(p.name)];
      return `<div class="sub mb" style="font-size:.72rem">Contract: ${fmtMoney(r.total)} total · ${r.start||'?'}–${r.end||'?'}${r.years?` (${r.years}yr)`:''}</div>`; })() : ''}
    ${havePts ? `<div class="statrow mb">
      <div class="stat"><div class="lbl">Last 7d</div><div class="val">${p.pts7?.toFixed(0)??'0'}</div></div>
      <div class="stat"><div class="lbl">Last 14d</div><div class="val">${p.pts14?.toFixed(0)??'0'}</div></div>
      <div class="stat"><div class="lbl">Last 30d</div><div class="val">${p.pts30?.toFixed(0)??'0'}</div></div>
    </div>` : ''}

    ${havePts ? renderWeeklyBreakdown(p) : ''}

    ${pk && !onMyTeam ? `<p class="sub">On <b>${esc(teamById(pk.teamId).name)}</b> — pick #${pk.pick}</p>` : ''}

    ${isFreeAgent && myTeamId() ? (
      full
        ? `<button class="btn btn-amber btn-block" onclick="addWithSwap('${p.espnId}')">+ Add (roster full — pick who to drop)</button>`
        : `<button class="btn btn-amber btn-block" onclick="addPlayerFromPool('${p.espnId}')">+ Add to my team (${count}/${cap})</button>`
    ) : ''}
    ${onMyTeam ? `
      <button class="btn btn-ghost btn-block" onclick="closeModal();go('home')">View on my team →</button>
      ${LSET().useSalaryCap ? signContractSection(p) : ''}

/* contract section on a rostered player's card (sign / show contract) */
function signContractSection(p) {
  const c = playerContract(p);
  if (c) {
    const yr = currentSeasonYear();
    const cur = contractSalaryForYear(c, yr);
    const left = (c.signedYear + c.termYears - 1) - yr;
    return `<div class="card card-tight mt" style="border-color:var(--good)">
      <div class="sub" style="font-size:.72rem"><b class="amber">Signed</b> · ${c.termYears}yr term (${c.signedYear}–${c.signedYear+c.termYears-1})<br>
      This year: <b>${fmtMoney(cur)}</b> · ${left>=0?`${left+1} yr${left!==0?'s':''} left`:'expired'}<br>
      Drop dead-cap: <b class="cell-neg">${fmtMoney(dropDeadCap(p))}</b></div>
    </div>`;
  }
  if (isArbPlayer(p)) {
    return `<div class="card card-tight mt" style="border-color:var(--sage)">
      <div class="sub" style="font-size:.72rem"><b>Arbitration</b> — no MLB contract.
      Counts <b>${fmtMoney(SALCFG().arbSalary)}</b>/yr (no escalation). Can't be signed to a term until they get a real contract.</div>
    </div>`;
  }
  // unsigned but has an AAV → can sign
  if (signingOpen()) {
    return `<button class="btn btn-amber btn-block mt" onclick="openSignModal('${p.espnId}')">✍ Sign ${esc(p.name)} (${fmtMoney(importedAAV(p))} AAV)</button>`;
  }
  return `<p class="sub mt" style="font-size:.7rem;text-align:center">Signing is closed (past the trade deadline).</p>`;
}

/* is signing/roster-move window open? Closed once playoffs start (roster lock).
   Signing deadline = trade deadline. Both are league settings (week numbers). */
function signingOpen() {
  if (rostersLocked()) return false;
  const deadlineWk = LSET().tradeDeadlineWeek || 20;   // default wk 20
  return currentWeekNow() <= deadlineWk;
}
function rostersLocked() {
  const playoffWk = LSET().playoffStartWeek || 23;     // default wk 23
  return currentWeekNow() >= playoffWk;
}

window.openSignModal = function(espnId) {
  const p = LG().playerPool.find(x=>String(x.espnId)===String(espnId));
  if (!p) return;
  if (!signingOpen()) { toast('Signing is closed (past trade deadline)', 'err'); return; }
  const aav = importedAAV(p);
  if (aav == null) { toast('No AAV on record — cannot sign (arb player)', 'err'); return; }
  const maxT = SALCFG().maxTerm;
  window._signTerm = 1;
  renderSignModal(p, aav, maxT);
};
function renderSignModal(p, aav, maxT) {
  const term = window._signTerm;
  const yr = currentSeasonYear();
  // preview the schedule
  const rows = [];
  for (let n=1; n<=term; n++) {
    const sal = n===1 ? Math.round(aav*SALCFG().signingDiscount) : Math.round(aav*Math.pow(1+SALCFG().escalatorGrowth,n-1));
    rows.push(`<div class="row-between" style="font-size:.72rem"><span class="sub">${yr+n-1} (yr ${n})</span><b>${fmtMoney(sal)}</b></div>`);

  openModal(`<div class="h2">Sign ${esc(p.name)}</div>

    <button class="btn btn-amber btn-block mt" onclick="confirmSign('${p.espnId}')">Sign for ${term} year${term>1?'s':''}</button>

function doDropPlayer(espnId) {
  const tid = myTeamId();
  LG().draft.picks = LG().draft.picks.filter(pk =>

/* weekly scoring breakdown table for the player modal — rows expand on tap */
function renderWeeklyBreakdown(p) {
  const bd = playerWeeklyBreakdown(p);
  if (!bd.weeks.length) return '';
  const exp = window._expandedWeek;  // {espnId, week} of the currently expanded row
  const rows = bd.weeks.map(w => {
    const isBestWk = w.total === bd.bestWeek && bd.bestWeek > 0;
    const isOpen = exp && String(exp.espnId)===String(p.espnId) && exp.week===w.week;
    let html = `<tr style="cursor:pointer;${isBestWk?'background:var(--amber-bg)':''}" onclick="toggleWeek('${p.espnId}',${w.week})">
      <td class="pos">${isOpen?'▾':'▸'} Wk ${w.week}</td>
      <td class="r num" style="font-size:.72rem">${w.games}</td>
      <td class="r num cell-best">${w.best.toFixed(0)}</td>
      <td class="r num" style="font-weight:600;${isBestWk?'color:var(--amber)':''}">${w.total.toFixed(0)}</td>
    </tr>`;
    if (isOpen) {
      // individual games that week with each game's points + the kept (best) flagged
      const games = weekGamesDetail(p, w.week);
      const gameRows = games.map(g => `
        <tr style="background:var(--field-2)">
          <td class="pos" style="padding-left:1rem">${esc(g.dateLabel)}</td>
          <td colspan="2" class="sub" style="font-size:.68rem">${esc(g.opp||'')}${g.isBest?' <span class="amber">★ kept</span>':''}</td>
          <td class="r num ${g.pts<0?'cell-neg':''}" style="${g.isBest?'color:var(--amber);font-weight:700':''}">${g.pts.toFixed(0)}</td>
        </tr>
        <tr style="background:var(--field-2)"><td colspan="4" class="sub" style="font-size:.6rem;padding:.1rem .5rem .4rem 1rem;color:var(--sage-dim)">${esc(g.statline)}</td></tr>`).join('');
      html += gameRows;
    }
    return html;
  }).join('');
  return `
    <div class="divlabel mt">Weekly scoring · avg <b class="amber">${bd.avg.toFixed(1)}</b>/wk · best-avg <b class="amber">${(p.bestAvg??0).toFixed(1)}</b></div>
    <div class="card card-tight" style="max-height:38vh;overflow-y:auto">
      <table class="tbl">
        <thead><tr><th>Week</th><th class="r">G</th><th class="r">Best</th><th class="r">Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="sub" style="font-size:.62rem;text-align:center;margin-top:.3rem">
      Tap a week to see each game. Best = kept score. Highlighted row = best week.</p>`;
}

/* detail of each game in a player's given week: date, opp, pts, statline, isBest */
function weekGamesDetail(p, week) {
  const log = LG().gameLogs?.[p.mlbId] || [];
  const days = weekDays(week).map(ymd);
  const games = log.filter(g => days.includes(g.date)).map(g => ({
    date: g.date,
    dateLabel: (()=>{ const d=new Date(g.date+'T00:00:00'); return ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate(); })(),
    opp: g.opp ? (g.isHome?'vs ':'@ ')+g.opp : '',
    pts: gamePoints(g.stat, g.group),
    statline: buildStatline(g.stat, g.group),
  })).sort((a,b)=>a.date.localeCompare(b.date));
  // flag the best (kept) game
  if (games.length) {
    const best = games.reduce((b,g)=> g.pts>b.pts?g:b, games[0]);
    games.forEach(g => g.isBest = (g.date===best.date && g.pts===best.pts));
  }
  return games;
}

/* short human statline from a game's stat object for the active group */
function buildStatline(stat, group) {
  if (!stat) return '';
  if (group === 'pitching') {
    const ip = stat.inningsPitched ?? '0';
    return `${ip} IP, ${stat.strikeOuts??0} K, ${stat.earnedRuns??0} ER, ${stat.hits??0} H, ${stat.baseOnBalls??0} BB${stat.wins?', W':''}${stat.saves?', SV':''}`;
  }
  const h = stat.hits??0, hr = stat.homeRuns??0, rbi = stat.rbi??0, r = stat.runs??0,
        bb = stat.baseOnBalls??0, sb = stat.stolenBases??0, k = stat.strikeOuts??0;
  let parts = [`${h}-for-${stat.atBats??0}`];
  if (hr) parts.push(`${hr} HR`); if (rbi) parts.push(`${rbi} RBI`); if (r) parts.push(`${r} R`);
  if (sb) parts.push(`${sb} SB`); if (bb) parts.push(`${bb} BB`); if (k) parts.push(`${k} K`);
  return parts.join(', ');
}

/* ---- settings log ---- */
function slog(msg, kind='pending') {
  const el = $('settings-log'); if (!el) return;
  const ic = kind==='ok'?'✓':kind==='err'?'✗':kind==='run'?'…':'·';
  const col = kind==='ok'?'var(--good)':kind==='err'?'var(--bad)':kind==='run'?'var(--clay)':'var(--sage)';
  if (el.querySelector('.sage') && el.children.length === 1) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend',
    `<div class="log-step"><span class="log-ic" style="color:${col}">${ic}</span><span>${esc(msg)}</span></div>`);
  el.scrollTop = el.scrollHeight;
}

/* ============================================================
   COMMISSIONER LOG (master settings)
   You approve leagues here. Each entry: commissioner name, league

   user launches and enters their league name, we check this list;

   ============================================================ */
function normLeague(name) {
  return String(name||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}
window.openCommishLog = function() {
  const approvals = STATE.approvals || {};
  const rows = Object.entries(approvals).map(([key, a]) => `

window.addApprovalPrompt = function() {
  openModal(`
    <div class="h2">Create a league</div>
    <div class="field mt"><label>Commissioner name</label>
      <input class="input" id="ap-commish" placeholder="e.g. Dustin"></div>

      <input class="input" id="ap-league" placeholder="e.g. Dustin's Dynasty"></div>
    <p class="sub mt">A unique 5-digit League ID will be generated. Members join with that ID. A name is optional — leave it blank and we'll use the ID.</p>
    <button class="btn btn-block mt" onclick="saveApproval()">Create & generate ID</button>
    <button class="btn btn-ghost btn-block mt" onclick="openCommishLog()">Cancel</button>
  `);
};
/* generate a 5-digit league id not already in use */
function genLeagueId() {
  const used = new Set(Object.keys(STATE.approvals || {}));
  let id;
  do { id = String(Math.floor(10000 + Math.random() * 90000)); } while (used.has(id));
  return id;
}
window.saveApproval = function() {
  const commish = $('ap-commish')?.value.trim() || '';
  const leagueName = $('ap-league')?.value.trim() || '';   // optional
  const id = genLeagueId();                          // 5-digit key (the required identifier)
  STATE.approvals = STATE.approvals || {};
  STATE.approvals[id] = {
    commish,
    leagueName: leagueName || ('League ' + id),      // default name from ID if blank
    approved: true,
    leagueId: id,
    leagueDocId: 'league_' + id,
    created: Date.now(),
  };
  save({master:true});
  // CRITICAL: the commissioner must JOIN the league they just created, so that all
  // their setup (teams, draft, settings) syncs to the league doc in Firebase. Without
  // this, activeLeagueDoc stays null and every save goes local-only — other devices
  // would join and see nothing.
  STATE.activeLeagueDoc = 'league_' + id;
  LG().leagueName = STATE.approvals[id].leagueName;
  saveLocal();
  subscribeLeague('league_' + id);
  const shownName = leagueName || ('League ' + id);
  openModal(`<div class="h2">League created 🎉</div>
    <p class="sub mb">You're now in this league. Share the ID with your members so they can join.</p>
    <div style="text-align:center;padding:1rem;background:var(--field-2);border-radius:8px;margin-bottom:1rem">
      <div class="sub" style="font-size:.65rem;letter-spacing:2px">LEAGUE ID</div>
      <div class="display amber" style="font-size:2.5rem;letter-spacing:6px">${id}</div>
      <div class="sub" style="font-size:.7rem">${esc(shownName)}</div>
    </div>
    <button class="btn btn-block" onclick="closeModal();renderActive()">Done</button>
    <button class="btn btn-ghost btn-block mt" onclick="openCommishLog()">Back to commissioner log</button>`);
};
window.toggleApproval = function(key) {
  if (!STATE.approvals?.[key]) return;
  STATE.approvals[key].approved = !STATE.approvals[key].approved;
  save({master:true});
  toast(STATE.approvals[key].approved?'Approved':'Access turned off', 'ok');
  openCommishLog();
};
window.removeApproval = function(key) {
  if (!STATE.approvals) return;
  delete STATE.approvals[key];
  save({master:true});
  toast('Removed', 'ok');
  openCommishLog();
};

/* ---- LAUNCH: league-name gate ----
   After choosing a sport, the user enters their league name. If it's
   on the approved list (and toggled on), their data syncs to that
   league's own doc. Otherwise they're denied. The commissioner (you)
   bypasses this — your master PIN unlocks everything. ---- */
/* ============================================================
   BLOCKING GATE — sport selection → league name. The app is hidden
   behind this until the user picks a sport and joins an approved
   league. No skip path. Commissioners join their own league too.
   ============================================================ */
function gateNeeded() {
  // need both a chosen sport (always set) AND a joined league
  return !STATE.activeLeagueDoc;
}
function showGate(step) {
  const gate = $('gate');
  gate.style.display = 'flex';
  if (step === 'sport') renderGateSport();
  else renderGateLeague();
}
function hideGate() {
  $('gate').style.display = 'none';
}

  $('gate-inner').innerHTML = `

          <span class="nm">${sp.label}</span>
        </div>`).join('')}
    </div>`;
}
window.gatePickSport = function(key) {
  STATE.sport = key;
  saveLocal();
  renderActive();        // re-render underlying app for the new sport
  showGate('league');    // advance to league-name step
};
function renderGateLeague() {
  $('gate-inner').innerHTML = `

/* Commissioner escape from the gate: PIN-gated access to master settings so
   the commissioner can create/approve the first league before anyone joins. */
window.gateCommishSetup = function() {
  const pin = prompt('Commissioner PIN:');
  if (pin !== ADMIN_PIN) { if (pin !== null) toast('Wrong PIN', 'err'); return; }
  window._masterUnlocked = true;
  hideGate();
  go('settings');
  toast('Master unlocked — create a league in the Commissioner log, then rejoin', 'ok');
};
window.gateJoinLeague = function() {
  const id = ($('gate-ln')?.value || '').trim();
  if (!/^\d{5}$/.test(id)) { toast('Enter the 5-digit League ID', 'err'); return; }
  const appr = STATE.approvals?.[id];
  if (!appr) { toast('League ID not found. Double-check it with your commissioner.', 'err'); return; }
  if (!appr.approved) {
    $('gate-inner').innerHTML = `
      <div class="brand-big">BGL<span class="mark">.</span></div>
      <div class="step-label" style="color:var(--bad)">Access paused</div>
      <p class="sub" style="text-align:center;margin-bottom:1rem">
        This league's access is currently turned off. Please contact your commissioner.</p>
      <button class="btn btn-ghost btn-block" onclick="showGate('league')">← Back</button>`;
    return;
  }
  // approved → bind device, sync, drop the gate
  LG().leagueName = appr.leagueName;
  STATE.activeLeagueDoc = appr.leagueDocId;
  saveLocal();
  subscribeLeague(appr.leagueDocId);
  hideGate();
  toast(`Joined ${appr.leagueName}`, 'ok');
  go('home');
};

window.doPullPool = async function() {
  try {
    const raw = await fetchPlayerPool(slog);
    LG().playerPool = raw.map(pp => {
      const pl = pp.player || pp;
      const eligible = deriveEligibility(pl.eligibleSlots, pl.defaultPositionId);
      const defPos = posName(pl.defaultPositionId);
      const adpRaw = pl.ownership?.averageDraftPosition || 0;
      const adp = (adpRaw > 0) ? adpRaw : 9999;
      return {
        espnId: pl.id,
        name: pl.fullName || `${pl.firstName||''} ${pl.lastName||''}`.trim(),
        pos: defPos,
        defPosId: pl.defaultPositionId,
        eligible,
        proTeam: proTeamAbbr(pl.proTeamId),
        eligSlots: pl.eligibleSlots || [],   // raw, for re-deriving eligibility later
        adp: Math.round(adp * 10) / 10,
        seasonPts: seasonPointsFromEspn(pl),   // 0 until MLB stats are pulled
        owned: Math.round((pl.ownership?.percentOwned || 0) * 10) / 10,
        injured: !!pl.injured,
        mlbId: null,
      };
    }).filter(p => p.name);

    // sort by ADP (best first), then trim to the top 300. Keeping the pool small
    // and fixed keeps the synced Firebase doc well under the 1 MB limit. Players
    // outside the top 300 can be loaded individually to local storage on demand.
    LG().playerPool.sort((a,b) => a.adp - b.adp);
    LG().playerPool = LG().playerPool.slice(0, 300);
    const ranked = LG().playerPool.filter(p => p.adp < 9999).length;
    slog(`Stored top ${LG().playerPool.length} players (${ranked} with real ADP)`, 'ok');
    await save({master:true});
    toast('Player pool loaded (top 300)', 'ok');
    renderActive();
  } catch(e) { slog('Pool fetch failed: ' + e.message, 'err'); toast(e.message, 'err'); }
};

/* compute atomic eligibility from raw ESPN slots + default position id.
   Shared by the pool pull and the re-derive button so they never diverge. */
function deriveEligibility(eligSlots, defaultPositionId) {
  const order = ['C','1B','2B','3B','SS','OF','DH','SP','RP'];
  const eligMap = SP().eligMap || {};
  const atomic = new Set();
  (eligSlots||[]).forEach(slotId => (eligMap[slotId]||[]).forEach(pos => atomic.add(pos)));
  const defPos = posName(defaultPositionId);
  if (defPos && defPos !== '?') atomic.add(defPos);
  if (SP().key === 'flb') {
    const isPitcher = defaultPositionId === 1 || defaultPositionId === 11;
    if (isPitcher) {
      ['C','1B','2B','3B','SS','OF','DH'].forEach(h => atomic.delete(h));
      if (!atomic.has('SP') && !atomic.has('RP')) atomic.add(defPos);
    } else {
      atomic.delete('SP'); atomic.delete('RP');
    }
  }
  const eligible = [...atomic].sort((a,b) => order.indexOf(a) - order.indexOf(b));
  return eligible.length ? eligible : [defPos];
}

/* re-derive eligibility for the WHOLE pool from stored raw slots — no ESPN re-pull.
   Use after changing eligMap rules. */
window.reDeriveEligibility = function() {
  let changed = 0;
  LG().playerPool.forEach(p => {
    const before = (p.eligible||[]).join('/');
    p.eligible = deriveEligibility(p.eligSlots, p.defPosId);
    if ((p.eligible||[]).join('/') !== before) changed++;
  });
  save({master:true});
  toast(`Eligibility re-derived · ${changed} players updated`, 'ok');
  renderActive();
};

/* ============================================================

   1) over-cap penalties (remove draft picks, cascading per nextAvailableOwnPick)
   2) cap growth (next season's cap = cap * (1+growth))
   3) contract aging (each signed contract moves a year forward; expired ones end)
   4) dead-cap expiry (this-season hits clear)
   Destructive + irreversible → requires explicit confirmation.
   ============================================================ */
window.openSeasonRollover = function() {
  if (!LSET().useSalaryCap) { toast('Salaries are off for this league', 'err'); return; }
  const yr = currentSeasonYear();
  // preview penalties per team
  const teamLines = LG().teams.map(t => {

  });
  const overTeams = teamLines.filter(x => x.pen.picks > 0);
  const penHtml = overTeams.length ? overTeams.map(x =>
    `<div class="row-between" style="padding:.3rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
      <span style="font-size:.8rem">${esc(x.t.name)}</span>
      <span class="cell-neg" style="font-size:.75rem">${x.pen.overPct}% over → −${x.pen.picks} pick${x.pen.picks!==1?'s':''}</span>
    </div>`).join('') : '<p class="sub" style="font-size:.75rem">No teams are over the cap. No pick penalties.</p>';
  const newCap = Math.round(leagueCap() * (1 + (SALCFG().capGrowthPct||0)/100));
  openModal(`<div class="h2">Advance to ${yr+1} season</div>
    <div class="card card-tight mt mb" style="border-color:var(--bad)">
      <p class="sub" style="font-size:.74rem;color:var(--bad)">⚠ This is permanent. It applies penalties, ages all contracts, and grows the cap. Make sure the season is actually over.</p>
    </div>
    <div class="divlabel">Pick penalties (over-cap teams)</div>
    ${penHtml}
    <div class="divlabel mt">Cap change</div>
    <div class="row-between" style="font-size:.78rem"><span class="sub">${yr} cap</span><b>${fmtMoney(leagueCap())}</b></div>
    <div class="row-between" style="font-size:.78rem"><span class="sub">${yr+1} cap (+${SALCFG().capGrowthPct}%)</span><b class="amber">${fmtMoney(newCap)}</b></div>
    <div class="divlabel mt">Contracts</div>
    <p class="sub" style="font-size:.72rem">Every signed contract advances one year. Contracts in their final year will expire and those players become free.</p>
    <button class="btn btn-block mt" style="background:var(--bad);color:#fff" onclick="confirmSeasonRollover()">Apply & advance to ${yr+1}</button>
    <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Cancel</button>`);
};
window.confirmSeasonRollover = function() {
  const yr = currentSeasonYear();
  const logs = [];
  const log = (m) => logs.push(m);
  // 1) PENALTIES — remove picks for each over-cap team (cascade-aware)
  LG().teams.forEach(t => {
    const pen = teamCapPenalty(t.id, yr);
    for (let k = 0; k < pen.picks; k++) {
      // remove from round 1 first, then round 2, etc. (one pick per round, escalating)
      removeOnePick(t.id, k + 1, yr + 1, log);
    }
  });
  // 2) CAP GROWTH — bake the grown cap into this league's setting
  ensureSettings();
  LG().settings.salaryCap = Math.round(leagueCap() * (1 + (SALCFG().capGrowthPct||0)/100));
  // 3) CONTRACT AGING — advance signedYear bookkeeping by expiring finished deals.
  //    Contracts are stored by signedYear+term; "aging" = drop any whose last year was yr.
  const contracts = LG().contracts || {};
  let expired = 0;
  Object.keys(contracts).forEach(pid => {
    const c = contracts[pid];
    const lastYear = c.signedYear + c.termYears - 1;
    if (lastYear <= yr) { delete contracts[pid]; expired++; log(`Contract expired: player ${pid}`); }
  });
  // 4) DEAD-CAP EXPIRY — clear hits dated this season or earlier
  const dc = LG().deadCap || {};
  Object.keys(dc).forEach(tid => {
    dc[tid] = (dc[tid] || []).filter(d => d.year > yr);
    if (!dc[tid].length) delete dc[tid];
  });
  // money trades that have fully elapsed
  LG().moneyTrades = (LG().moneyTrades || []).filter(mt => (mt.startYear + (mt.years||1) - 1) > yr);
  // record advance
  LG().seasonApplied = yr;
  save();
  openModal(`<div class="h2">✓ Advanced to ${yr+1}</div>
    <p class="sub mb">${expired} contract${expired!==1?'s':''} expired. Cap is now ${fmtMoney(leagueCap())}.</p>
    ${logs.length?`<div class="card card-tight" style="max-height:40vh;overflow-y:auto"><div class="sub" style="font-size:.7rem;line-height:1.6">${logs.map(esc).join('<br>')}</div></div>`:''}
    <button class="btn btn-block mt" onclick="closeModal();renderActive()">Done</button>`);
};

/* Inspect raw ESPN player data — fetches one player and dumps the stat splits
   so we can see exactly what fields hold the season points. */
window.inspectRaw = async function() {
  openModal(`<div class="h2">Raw player inspect</div><div class="spinner"></div>
    <p class="sub" style="text-align:center">Fetching from ESPN…</p>`);
  try {
    const raw = await fetchPlayerPool();
    // find the first player that actually HAS stats, else just the first
    let entry = raw.find(pp => ((pp.player||pp).stats||[]).length > 0) || raw[0];
    const pl = (entry?.player) || entry;
    if (!pl) { $('modal-body').innerHTML = '<p>No players returned at all.</p>'; return; }

    const withStats = raw.filter(pp => ((pp.player||pp).stats||[]).length > 0).length;
    const stats = pl.stats || [];
    const computed = seasonPointsFromEspn(pl);

    // full raw JSON of this one player (trimmed of huge sub-objects)
    const slim = JSON.parse(JSON.stringify(pl));
    if (slim.draftRanksByRankType) slim.draftRanksByRankType = '…';
    const fullJson = JSON.stringify(slim, null, 1);
    window._inspectText = fullJson;

    const statLines = stats.length
      ? stats.map((s,i) => `[${i}] id=${s.id} split=${s.statSplitTypeId} src=${s.statSourceId} szn=${s.seasonId} applied=${s.appliedTotal}`).join('\n')
      : '(this player has NO stats array)';

    openModal(`
      <div class="h2">${esc(pl.fullName||'?')}</div>
      <div class="sub mb">Pool: ${raw.length} players · ${withStats} have stats · we compute: <b class="amber">${computed} pts</b></div>
      <div class="field"><label>Stat splits (looking for id 00${SP().statSeason} or 00${SP().season})</label></div>
      <div class="log" style="max-height:200px">${esc(statLines)}</div>
      <div class="field mt"><label>Full raw player JSON</label></div>
      <div class="log" style="max-height:240px">${esc(fullJson)}</div>
      <button class="btn btn-block mt" onclick="copyText(window._inspectText)">📋 Copy full JSON — paste to me</button>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
    `);
  } catch(e) {
    $('modal-body').innerHTML = `<div class="h2">Inspect failed</div><p class="sub">${esc(e.message)}</p>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>`;
  }
};
window.copyText = function(t) {
  navigator.clipboard?.writeText(t).then(()=>toast('Copied','ok')).catch(()=>toast('Copy failed','err'));
};

/* ============================================================
   SCORING TEST — pull one player's MLB game log and apply our
   scoring so the user can confirm points look right.
   ============================================================ */
window.scoringDiag = async function() {
  const mapped = LG().playerPool.filter(p => p.mlbId);
  if (!mapped.length) { toast('Map players to MLB first (step 2)', 'err'); return; }
  const pick = mapped.slice().sort((a,b)=>a.adp-b.adp)[0];

  openModal(`<div class="h2">Scoring test</div><div class="spinner"></div>
    <p class="sub" style="text-align:center">Pulling ${esc(pick.name)}'s MLB game log…</p>`);

  try {
    const isPitcher = /SP|RP|P/.test((pick.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((pick.eligible||[]).join(''));
    const group = isPitcher ? 'pitching' : 'hitting';
    const log = await mlbGameLog(pick.mlbId, group);
    const recent = log.slice(-10).reverse();

    const logRows = recent.map(g => {
      const pts = gamePoints(g.stat, group);
      const key = group === 'hitting'
        ? `${g.stat.hits||0}H ${g.stat.homeRuns||0}HR ${g.stat.rbi||0}RBI ${g.stat.runs||0}R`
        : `${g.stat.inningsPitched||0}IP ${g.stat.strikeOuts||0}K ${g.stat.earnedRuns||0}ER`;
      return `<tr><td class="pos">${esc(g.date?.slice(5)||'')}</td>
        <td class="sage" style="font-size:.72rem">${esc(g.opp)}</td>
        <td style="font-size:.72rem">${esc(key)}</td>
        <td class="r num cell-best">${pts}</td></tr>`;
    }).join('');

    const seasonTotal = log.reduce((s,g)=>s+gamePoints(g.stat,group),0);
    const bestGame = log.reduce((m,g)=>Math.max(m,gamePoints(g.stat,group)),0);

    openModal(`
      <div class="h2">${esc(pick.name)}</div>
      <div class="sub mb">${group} · ${log.length} games in ${statSeasonNow()}</div>
      <div class="statrow mb">
        <div class="stat"><div class="lbl">Season</div><div class="val amber">${seasonTotal.toFixed(0)}</div></div>
        <div class="stat"><div class="lbl">Best game</div><div class="val amber">${bestGame.toFixed(1)}</div></div>
        <div class="stat"><div class="lbl">Games</div><div class="val">${log.length}</div></div>
      </div>
      <div class="divlabel">Last 10 games — your scoring applied</div>
      <div class="card card-tight" style="max-height:280px;overflow-y:auto">
        <table class="tbl"><thead><tr><th>Date</th><th>Opp</th><th>Key stats</th><th class="r">Pts</th></tr></thead>
        <tbody>${logRows || '<tr><td colspan="4" class="sub">No games found</td></tr>'}</tbody></table>
      </div>
      <p class="sub mt" style="font-size:.72rem">Points off? Edit values in Settings → Scoring system.</p>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
    `);
  } catch(e) {
    openModal(`
      <div class="h2">Scoring test failed</div>
      <p class="cell-neg mt">MLB game log error: ${esc(e.message)}</p>
      <p class="sub" style="font-size:.72rem">Likely ${esc(pick.name)} has no ${statSeasonNow()} games yet,
        or the MLB API is unreachable from your browser.</p>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
    `);
  }
};

window.editRosterSlots = function() {
  const slots = activeLineupSlots();
  const counts = {};
  slots.forEach(s => counts[s.slot] = (counts[s.slot]||0)+1);
  const summary = Object.entries(counts).map(([s,n]) => `${s}×${n}`).join(', ');
  // simple editor: adjust count of each position type + bench/IR
  const allPos = SP().posFilters.filter(p => p!=='ALL');
  const posRows = allPos.map(pos => {
    const n = slots.filter(s => s.slot===pos || (s.eligible.length===1 && s.eligible[0]===pos)).length;

        onchange="setSlotCount('${pos}',this.value)">

    <p class="sub mb">Current: ${esc(summary)}</p>
    <div class="divlabel">Position slots</div>

    ${SP().key==='flb' ? `<div class="row-between" style="padding:.3rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
      <span>P (any pitcher)</span>
      <input class="input" type="number" min="0" max="12" value="${pN}" style="width:70px;text-align:right"
        onchange="setMultiSlot('P',this.value)"></div>` : ''}
    <div class="row-between" style="padding:.3rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
      <span>UTIL (any)</span>
      <input class="input" type="number" min="0" max="6" value="${utilN}" style="width:70px;text-align:right"
        onchange="setMultiSlot('UTIL',this.value)"></div>
    <div class="divlabel mt">Reserve</div>
    <div class="row-between" style="padding:.3rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
      <span>Bench</span>
      <input class="input" type="number" min="0" max="15" value="${rosterBenchCount()}" style="width:70px;text-align:right"
        onchange="setReserve('bench',this.value)"></div>
    <div class="row-between" style="padding:.3rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
      <span>Injured Reserve</span>
      <input class="input" type="number" min="0" max="10" value="${rosterIrCount()}" style="width:70px;text-align:right"
        onchange="setReserve('ir',this.value)"></div>
    <button class="btn btn-block mt" onclick="closeModal();renderActive()">Done</button>
    <button class="btn btn-ghost btn-block mt" onclick="resetRosterSlots()">Reset to default</button>
  `);
};
// helpers to mutate the override slot list
function ensureRosterOverride() {
  if (!LG().rosterOverride) {
    LG().rosterOverride = {
      lineupSlots: JSON.parse(JSON.stringify(SP().lineupSlots||[])),
      benchCount: SP().benchCount ?? 5,
      irCount: SP().irCount ?? 0,
    };
  }
}
window.setSlotCount = function(pos, n) {
  ensureRosterOverride();
  n = Math.max(0, parseInt(n)||0);
  let slots = LG().rosterOverride.lineupSlots.filter(s => !(s.slot===pos && s.eligible.length===1 && s.eligible[0]===pos));
  for (let i=0;i<n;i++) slots.push({ slot: pos, eligible: [pos] });
  // keep a sensible order
  LG().rosterOverride.lineupSlots = reorderSlots(slots);
  save({master:false});
};
window.setMultiSlot = function(slotName, n) {
  ensureRosterOverride();
  n = Math.max(0, parseInt(n)||0);
  const eligible = slotName==='P' ? ['SP','RP'] : SP().posFilters.filter(p=>p!=='ALL'&&p!=='SP'&&p!=='RP');
  let slots = LG().rosterOverride.lineupSlots.filter(s => s.slot!==slotName);
  for (let i=0;i<n;i++) slots.push({ slot: slotName, eligible: [...eligible] });
  LG().rosterOverride.lineupSlots = reorderSlots(slots);
  save({master:false});
};
window.setReserve = function(kind, n) {
  ensureRosterOverride();
  n = Math.max(0, parseInt(n)||0);
  if (kind==='bench') LG().rosterOverride.benchCount = n;
  else LG().rosterOverride.irCount = n;
  save({master:false});
};
function reorderSlots(slots) {
  const ord = ['C','1B','2B','3B','SS','OF','DH','P','SP','RP','PG','SG','SF','PF','G','F','UTIL'];
  return slots.slice().sort((a,b)=> ord.indexOf(a.slot)-ord.indexOf(b.slot));
}
window.resetRosterSlots = function() {
  delete LG().rosterOverride;
  save({master:false}); toast('Roster reset to default','ok'); editRosterSlots();
};

/* rookie draft sequence: uses its own order (or team order if none) + rounds.
   Snake honored. */
function rookieSequence() {
  const order = RD().order?.length ? RD().order : LG().teams.map(t=>t.id);
  const rounds = RD().rounds || 4;
  const seq = [];
  for (let r = 0; r < rounds; r++) {
    const ro = (RD().snake && r % 2 === 1) ? [...order].reverse() : order;
    ro.forEach(tid => seq.push(tid));
  }
  return seq;
}
function rookiePickIndex() { return (RD().picks || []).length; }
function rookieCurrentTeam() {
  const seq = rookieSequence(); const idx = rookiePickIndex();
  return idx < seq.length ? seq[idx] : null;
}
function rookieDone() { return rookiePickIndex() >= rookieSequence().length; }
/* pick label: exact "round.slot" if order set, else generic "Pick N" */
function rookiePickLabel(idx) {
  const teams = (RD().order?.length ? RD().order.length : LG().teams.length) || 1;
  const round = Math.floor(idx / teams) + 1;
  const slot = (idx % teams) + 1;
  if (RD().order?.length) return `${round}.${slot}`;        // exact
  return `Pick ${idx + 1}`;                                  // generic
}

let _rookieGuard = -1;
function rookieSecondsLeft() {
  const d = RD();
  if (d.paused || !d.pickStartedAt) return d.secPerPick;

  return Math.max(0, d.secPerPick - elapsed);
}

/* ============================================================
   LIVE DRAFT ENGINE — snake/linear, timer, auto-pick fills empty slots
   ============================================================ */

/* total rounds = starting slots + bench (everyone fills a full roster) */
function draftRounds() {
  return (activeLineupSlots()?.length || 0) + rosterBenchCount();
}
/* the full pick order across all rounds, honoring snake setting.
   returns an array of teamIds, length = rounds * teams. */
function draftSequence() {
  const order = LG().draft.order || [];
  const rounds = draftRounds();
  const seq = [];
  for (let r = 0; r < rounds; r++) {
    const roundOrder = (LSET().snake && r % 2 === 1) ? [...order].reverse() : order;
    roundOrder.forEach(tid => seq.push(tid));
  }
  return seq;
}
/* whose pick is it right now? index into the sequence = picks already made */
function currentPickIndex() { return LG().draft.picks.length; }
function currentPickTeam() {
  const seq = draftSequence();
  const idx = currentPickIndex();
  return idx < seq.length ? seq[idx] : null;
}
function pickRoundAndSlot(idx) {
  const teams = (LG().draft.order||[]).length || 1;
  return { round: Math.floor(idx / teams) + 1, slotInRound: (idx % teams) + 1 };
}
/* is the draft fully done? */
function draftDone() { return currentPickIndex() >= draftSequence().length; }

window.startLiveDraft = function() {
  if (!(LG().draft.order?.length) || LG().teams.length < 2) { toast('Set the draft order first', 'err'); return; }
  if (LG().draft.complete) { toast('Draft already complete', 'err'); return; }
  LG().draft.started = true;
  LG().draft.live = true;
  LG().draft.paused = false;
  LG().draft.pickStartedAt = Date.now();
  if (!LG().draft.picks) LG().draft.picks = [];
  save();
  toast('Draft room is live', 'ok');
  go('draft');
};

/* make a pick (manual click). enforces turn order. */
window.makeDraftPick = function(espnId, force) {
  if (!LG().draft.live) { toast('Draft is not live', 'err'); return; }
  const team = currentPickTeam();
  if (!team) { finishDraft(); return; }
  const mine = String(team) === String(myTeamId());
  // Turn order is enforced for EVERYONE, including the commissioner. The only way
  // to pick for another team is the explicit "Force pick" button (force === true).
  if (!mine && !force) { toast("Not your pick — it's " + (teamById(team).name||'another team') + "'s turn", 'err'); return; }
  commitPick(espnId, team);
};

/* commit a pick for a team — shared by manual + auto. No turn check here. */
function commitPick(espnId, team) {
  if (!team) return;
  const taken = new Set(LG().draft.picks.map(p => String(p.playerId)));
  if (taken.has(String(espnId))) { return; }   // already drafted (sync race) — ignore
  const { round } = pickRoundAndSlot(currentPickIndex());
  LG().draft.picks.push({ pick: currentPickIndex()+1, round, teamId: team, playerId: espnId });
  LG().draft.pickStartedAt = Date.now();   // reset clock for next picker
  _autoPickGuard = -1;                      // allow auto-pick for the new pick index
  if (draftDone()) { finishDraft(); return; }
  save();
  syncExtraIfRostered(espnId);
  renderActive();
}

/* auto-pick: best available that fills an empty roster slot for the team on clock.
   Forced (bypasses turn check) — used on timer expiry for ANY team. */
function autoPickForCurrent() {
  const team = currentPickTeam();
  if (!team) { if (LG().draft.live) finishDraft(); return; }
  const taken = new Set(LG().draft.picks.map(p => String(p.playerId)));
  const myPicks = LG().draft.picks.filter(p => String(p.teamId)===String(team));
  const slots = activeLineupSlots();
  const needPos = {};
  slots.forEach(s => { needPos[s.slot] = (needPos[s.slot]||0)+1; });
  myPicks.forEach(pk => {
    const pl = LG().playerPool.find(x=>String(x.espnId)===String(pk.playerId));
    if (!pl) return;
    const hit = Object.keys(needPos).find(slot => needPos[slot]>0 && slotEligible(slot, pl));
    if (hit) needPos[hit]--;
  });
  const stillNeed = Object.keys(needPos).filter(s => needPos[s] > 0);
  const pool = [...LG().playerPool].sort((a,b)=>a.adp-b.adp);
  let pick = null;
  if (stillNeed.length) {
    pick = pool.find(p => !taken.has(String(p.espnId)) && stillNeed.some(slot => slotEligible(slot, p)));
  }
  if (!pick) pick = pool.find(p => !taken.has(String(p.espnId)));  // fallback: best available
  if (pick) commitPick(pick.espnId, team);
}
/* does a player satisfy a given lineup slot name? */
function slotEligible(slotName, player) {
  const def = activeLineupSlots().find(s => s.slot === slotName);
  const elig = def?.eligible || [slotName];
  return (player.eligible||[]).some(pos => elig.includes(pos));
}

function finishDraft() {
  LG().draft.live = false;
  LG().draft.complete = true;
  LG().draft.currentPick = LG().draft.picks.length;
  save();
  toast('Draft complete!', 'ok');
  go('teams');
}
window.pauseDraft = function() {
  LG().draft.paused = !LG().draft.paused;
  if (!LG().draft.paused) LG().draft.pickStartedAt = Date.now(); // resume resets clock
  save(); renderActive();
};
window.commishForcePick = function() { autoPickForCurrent(); };

/* ============================================================
   TRADE SYSTEM — players and/or dynasty picks between two teams.
   Privacy: a pending proposal is visible ONLY to the two teams involved.
   Once accepted, it's executed and logged (visible to all as history).

/* trades this device's team can SEE: ones it's part of, plus all completed history */
function visibleTrades() {
  const mine = myTeamId();
  return (LG().trades || []).filter(t =>
    t.status !== 'pending' ||                       // completed/rejected = visible to all
    String(t.from) === String(mine) ||              // I proposed it
    String(t.to) === String(mine) ||                // it's offered to me
    window._masterUnlocked                          // commissioner sees all
  );
}
function pendingForMe() {
  const mine = myTeamId();
  return (LG().trades || []).filter(t => t.status === 'pending' && String(t.to) === String(mine));
}
function myPendingOut() {
  const mine = myTeamId();
  return (LG().trades || []).filter(t => t.status === 'pending' && String(t.from) === String(mine));

/* render a single trade as a card with context-appropriate actions */
function tradeCard(t, mode) {
  const fromT = teamById(t.from), toT = teamById(t.to);
  const fromMoney = (t.money||[]).filter(m=>m.dir==='fromTo');
  const toMoney = (t.money||[]).filter(m=>m.dir==='toFrom');
  const fromAssets = describeAssets(t.fromPlayers, t.fromPicks, fromMoney);
  const toAssets = describeAssets(t.toPlayers, t.toPicks, toMoney);
  let actions = '';
  if (mode === 'incoming') {
    actions = `<div class="row" style="gap:.4rem;margin-top:.5rem">
      <button class="btn btn-sm btn-amber" onclick="acceptTrade('${t.id}')">Accept</button>
      <button class="btn btn-sm btn-ghost" onclick="rejectTrade('${t.id}')">Reject</button>
    </div>`;
  } else if (mode === 'outgoing') {
    actions = `<button class="btn btn-sm btn-ghost mt" onclick="cancelTrade('${t.id}')">Cancel offer</button>`;
  }
  const statusTag = mode==='history' ? `<span class="sub" style="font-size:.6rem">✓ completed</span>` : '';
  return `<div class="card card-tight" style="margin-bottom:.5rem">
    <div class="row-between"><b style="font-size:.82rem">${esc(fromT.name)} ⇄ ${esc(toT.name)}</b>${statusTag}</div>
    <div class="sub" style="font-size:.72rem;margin-top:.3rem">
      <b>${esc(fromT.abbrev||fromT.name)}</b> sends: ${fromAssets || '—'}<br>
      <b>${esc(toT.abbrev||toT.name)}</b> sends: ${toAssets || '—'}
    </div>
    ${actions}
  </div>`;
}
/* human-readable list of players + picks + cash */
function describeAssets(playerIds, picks, money) {
  const parts = [];
  (playerIds||[]).forEach(id => {
    const p = LG().playerPool.find(x => String(x.espnId)===String(id));
    if (p) parts.push(esc(p.name));
  });
  (picks||[]).forEach(pk => parts.push(`${pk.year} R${pk.round} pick`));
  (money||[]).forEach(m => parts.push(`${fmtMoney(m.amount)}${m.years>1?` over ${m.years}yr`:''} cash`));
  return parts.join(', ');
}

    <label class="sub">Round</label>
    <select class="select mb" id="pick-round" style="width:100%">${rounds.map(r=>`<option value="${r}">Round ${r}</option>`).join('')}</select>
    <button class="btn btn-amber btn-block" onclick="confirmAddPick('${side}')">Add pick</button>
    <button class="btn btn-ghost btn-block mt" onclick="renderTradeBuilder()">← Back</button>`);
};
window.confirmAddPick = function(side) {
  const year = parseInt($('pick-year').value);
  const round = parseInt($('pick-round').value);
  const arr = side==='from' ? window._trade.fromPicks : window._trade.toPicks;
  if (!arr.some(p=>p.year===year && p.round===round)) arr.push({ year, round });
  renderTradeBuilder();
};
window.sendTradeProposal = function() {
  const tr = window._trade;
  if (!tr.to) { toast('Pick a trade partner', 'err'); return; }
  const nAssets = tr.fromPlayers.length + tr.toPlayers.length + tr.fromPicks.length + tr.toPicks.length + (tr.money?.length||0);
  if (nAssets === 0) { toast('Add at least one asset', 'err'); return; }
  const trade = {
    id: 'tr_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    from: myTeamId(), to: tr.to,
    fromPlayers: tr.fromPlayers.slice(), toPlayers: tr.toPlayers.slice(),
    fromPicks: tr.fromPicks.slice(), toPicks: tr.toPicks.slice(),
    money: (tr.money||[]).slice(),
    status: 'pending', created: Date.now(),
  };
  LG().trades = LG().trades || [];
  LG().trades.push(trade);
  save();
  toast(`Trade proposal sent to ${teamById(tr.to).name}`, 'ok');
  window._trade = null;
  openTradeCenter();
};

/* ---- respond to a trade ---- */
window.acceptTrade = function(id) {
  const t = (LG().trades||[]).find(x => x.id===id);
  if (!t || t.status!=='pending') { toast('Trade no longer available', 'err'); return; }
  if (String(t.to)!==String(myTeamId())) { toast('Only the receiving team can accept', 'err'); return; }
  const ok = executeTrade(t);
  if (!ok) { toast('Trade could not be applied — nothing changed', 'err'); return; }
  t.status = 'accepted'; t.resolved = Date.now();
  save();
  toast('Trade accepted!', 'ok');
  openTradeCenter();
  renderActive();
};
window.rejectTrade = function(id) {
  const t = (LG().trades||[]).find(x => x.id===id);
  if (!t) return;
  t.status = 'rejected'; t.resolved = Date.now();
  save();
  toast('Trade rejected', 'ok');
  openTradeCenter();
};
window.cancelTrade = function(id) {
  const t = (LG().trades||[]).find(x => x.id===id);
  if (!t || String(t.from)!==String(myTeamId())) return;
  t.status = 'cancelled'; t.resolved = Date.now();
  save();
  toast('Offer cancelled', 'ok');
  openTradeCenter();
};

/* move players + picks between the two teams. Defensive: validates refs and
   applies atomically; never leaves state half-changed. */
function executeTrade(t) {
  if (!t || !t.from || !t.to) return false;
  const picks = (LG().draft && LG().draft.picks) ? LG().draft.picks : null;
  if (!picks) { console.error('executeTrade: no draft picks array'); return false; }
  // PLAYERS: reassign draft-pick ownership (rosters derive from draft.picks.teamId)
  const reassign = (playerIds, newTeam) => {
    (playerIds||[]).forEach(pid => {
      const pk = picks.find(x => String(x.playerId)===String(pid));
      if (pk) pk.teamId = newTeam;
      // clear from any team's lineup assignments
      const lineups = LG().lineups || {};
      Object.values(lineups).forEach(weeks => Object.values(weeks||{}).forEach(wk => {
        if (wk && wk.assignments) for (const k of Object.keys(wk.assignments)) {
          if (String(wk.assignments[k])===String(pid)) delete wk.assignments[k];
        }
      }));
    });
  };
  try {
    reassign(t.fromPlayers, t.to);
    reassign(t.toPlayers, t.from);
    // PICKS: record ownership transfer in draftPicks[year][round] = owning team
    LG().draftPicks = LG().draftPicks || {};
    const movePick = (pks, newOwner) => {
      (pks||[]).forEach(pk => {
        if (!pk || pk.year==null || pk.round==null) return;
        LG().draftPicks[pk.year] = LG().draftPicks[pk.year] || {};
        LG().draftPicks[pk.year][pk.round] = newOwner;
      });
    };
    movePick(t.fromPicks, t.to);
    movePick(t.toPicks, t.from);
    // MONEY: record each cash consideration. dir 'fromTo' = proposer(t.from) sends to t.to;
    // 'toFrom' = t.to sends to t.from. Store normalized {from,to,amount,years,startYear}.
    if (t.money && t.money.length) {
      LG().moneyTrades = LG().moneyTrades || [];
      t.money.forEach(m => {
        const sender = m.dir === 'fromTo' ? t.from : t.to;
        const receiver = m.dir === 'fromTo' ? t.to : t.from;
        LG().moneyTrades.push({
          from: sender, to: receiver,
          amount: m.amount, years: m.years || 1,
          perYear: Math.round(m.amount / (m.years || 1)),
          startYear: currentSeasonYear(),
        });
      });
    }
    return true;
  } catch(e) {
    console.error('executeTrade failed:', e);
    return false;
  }
}

/* ---- AUTODRAFT — snake, best available by ADP ---- */
window.autodraft = function() {
  if (LG().teams.length < 2) { toast('Need at least 2 teams', 'err'); return; }
  if (!LG().playerPool.length) { toast('No player pool', 'err'); return; }
  const ROUNDS = SP().rosterSize;
  const teamIds = LG().teams.map(t => t.id);
  const picks = [], taken = new Set();
  const pool = [...LG().playerPool].sort((a,b) => a.adp - b.adp); // best ADP first
  let pickNum = 1;
  for (let round = 0; round < ROUNDS; round++) {
    const order = round % 2 === 0 ? teamIds : [...teamIds].reverse();
    for (const teamId of order) {
      const next = pool.find(p => !taken.has(String(p.espnId)));
      if (!next) break;
      taken.add(String(next.espnId));
      picks.push({ pick: pickNum++, round: round+1, teamId, playerId: next.espnId });
    }
  }
  LG().draft = { started:true, complete:true, order:teamIds, picks, currentPick:picks.length, rounds:ROUNDS, type:'auto' };
  save(); toast(`Autodraft complete — ${picks.length} picks`, 'ok'); go('teams');
};

window.wipeDraft = function() {
  LG().draft = { started:false, complete:false, order:[], picks:[], currentPick:0 };
  LG().weekly = {};
  save(); toast('Draft wiped', 'ok'); renderActive();
};

/* ---- SPORT SWITCHER ---- */
window.switchSport = function(key) {
  if (!SPORTS[key]) return;
  STATE.sport = key;
  playerView.search = ''; playerView.posFilter = 'ALL'; playerView.sort = 'seasonPts'; playerView.dir = -1;
  save(); toast(`Switched to ${SPORTS[key].label}`, 'ok'); go('home');
};

/* ============================================================
   ESPN ID → label maps (baseball, confirmed from prior work)
   ============================================================ */
function posName(id) {
  return SP().posMap[id] || '?';
}
function slotName(id) {
  if (SP().benchSlots.includes(id)) return null;  // bench/IL not scored
  return SP().slotMap[id] || null;
}
function proTeamAbbr(id) {
  return SP().proTeams[id] || '';
}

/* ============================================================
   BOOT
   ============================================================ */
initFirebase();
go('home');
if (!fbReady) setTimeout(() => { if (!STATE._loaded) renderActive(); }, 300);

/* Blocking gate: if this device hasn't joined a league, show the gate
   (sport → league name) immediately. Nothing else is usable until passed.
   We show it right away so there's no flash of the app behind it. */
if (gateNeeded()) showGate('sport');

/* Re-check after master loads — in case approvals arrive late, the gate is
   already up; this just ensures it's shown if boot raced ahead. Skip if the
   commissioner used the setup escape (master unlocked). */
setTimeout(() => { if (gateNeeded() && !window._masterUnlocked) showGate('sport'); }, 400);

/* Auto-pull MLB stats on load (once per ~6h) and when a team is chosen.
   Runs silently in the background; refreshes the view when done. */
async function autoPullStats(force) {
  if (!myTeamId()) return;                 // only if user has a team
  const last = LG().lastStatPull || 0;
  const sixHrs = 6*60*60*1000;
  if (!force && (Date.now() - last) < sixHrs) return;  // recently pulled
  const roster = teamRoster(myTeamId()).filter(p => p.mlbId);
  if (!roster.length) return;
  LG().gameLogs = LG().gameLogs || {};
  for (const p of roster) {
    try {
      const isPitcher = /SP|RP/.test((p.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((p.eligible||[]).join(''));
      const grp = isPitcher ? 'pitching' : 'hitting';
      const log = await mlbGameLog(p.mlbId, grp);
      const mapped = log.map(g => ({...g, group: grp}));
      LG().gameLogs[p.mlbId] = mapped;
      applyPointFields(p, mapped);  // compute point fields (incl. bestAvg)
    } catch(e) {}
    await new Promise(r=>setTimeout(r,50));
  }
  LG().lastStatPull = Date.now();
  if (STATE.activeLeagueDoc) saveLeague({silent:true}); else saveLocal();
  renderActive();
  // background: resolve team ids + injuries + schedule (non-blocking for the grid)
  refreshTeamMeta();
  // also compute points for the rest of the pool (top players + free agents) in the
  // background, so the Players page is populated without a manual "Load points" tap.
  computePoolPoints(false).then(() => renderActive()).catch(()=>{});
}

/* resolve each rostered player's MLB team id + current injury status, then
   fetch this week's schedule so the lookahead can show opponents/probables.
   Injury status here is the LIVE source (updates when a player returns). */
async function refreshTeamMeta() {
  if (!myTeamId()) return;
  const roster = teamRoster(myTeamId()).filter(p => p.mlbId);
  // batch people lookup for team id + injury status
  if (roster.length) {
    try {
      const ids = roster.map(p => p.mlbId).join(',');
      const res = await fetch(`${MLB}/people?personIds=${ids}&hydrate=currentTeam`);
      if (res.ok) {
        const data = await res.json();
        const byId = {}; (data.people||[]).forEach(person => byId[person.id] = person);
        LG().playerPool.forEach(pl => {
          const person = byId[pl.mlbId];
          if (person) {
            pl.mlbTeamId = person.currentTeam?.id || pl.mlbTeamId;
            if (person.active === true && pl.injured) pl.injured = false;
          }
        });
      }
    } catch(e) {}
  }
  // fetch schedule for the viewed week (so opponents/probables show)
  try { await getWeekSchedule(activeWeek()); } catch(e) {}
  if (STATE.activeLeagueDoc) saveLeague({silent:true}); else saveLocal();
  renderActive();
}
// kick off shortly after load
setTimeout(() => autoPullStats(false), 800);
// ALWAYS resolve team meta + schedule on load (independent of the stat-pull 6h guard),
// so upcoming opponents and probable starters appear even when stats are already cached.
setTimeout(() => { if (myTeamId()) refreshTeamMeta(); }, 1200);
// ALWAYS compute pool points on load, independent of autoPullStats' guards, so the
// Players page is populated automatically. Reuses cached logs so it's cheap on refresh.
setTimeout(() => {
  if (LG().playerPool.some(p => p.mlbId)) {
    computePoolPoints(false).then(() => renderActive()).catch(()=>{});
  }
}, 1500);
// re-run when the league doc first syncs in (pool may arrive after boot)
let _pooledOnce = false;
function ensurePoolPoints() {
  if (_pooledOnce) return;
  if (LG().playerPool.some(p => p.mlbId) && !LG().playerPool.some(p => p.ptsSeason != null)) {
    _pooledOnce = true;
    computePoolPoints(false).then(() => renderActive()).catch(()=>{ _pooledOnce = false; });
  }
}
</script>
