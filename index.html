<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Best Game League v4.8</title>
<style>
/* ============================================================
   BGL v4.8 — Design System
   Subject: competitive fantasy baseball; hook = best single game/week
   Palette: stadium-at-night
   ============================================================ */
:root {
  --field:    #0d1510;  /* deep field green-black (bg) */
  --field-2:  #131e16;  /* raised surface */
  --field-3:  #1a2a1f;  /* card */
  --line:     #2a3d30;  /* chalk line / border */
  --chalk:    #f5f3ed;  /* primary text */
  --sage:     #7a8a7a;  /* secondary text */
  --sage-dim: #56635a;  /* tertiary */
  --clay:     #d4763a;  /* basepath clay accent */
  --amber:    #f0b429;  /* scoreboard amber = BEST GAME */
  --amber-bg: rgba(240,180,41,.12);
  --good:     #5fae6a;
  --bad:      #d9555a;

  --display: 'Oswald', 'Bebas Neue', system-ui, sans-serif; /* condensed scoreboard */
  --body:    'Inter', system-ui, -apple-system, sans-serif;
  --mono:    'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

  --r: 10px;
  --r-sm: 6px;
}

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--body);
  background: var(--field);
  color: var(--chalk);
  line-height: 1.5;
  font-size: 15px;
  overflow-x: hidden;
  padding-bottom: 80px;
}

/* numbers everywhere read as scoreboard */
.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.display { font-family: var(--display); letter-spacing: .5px; }

/* ---- top bar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,21,16,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: .65rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  font-family: var(--display); font-weight: 700; font-size: 1.4rem;
  letter-spacing: 1px; color: var(--chalk); cursor: pointer;
  display: flex; align-items: baseline; gap: .4rem;
}
.brand .ver { font-size: .55rem; color: var(--sage-dim); letter-spacing: 1px; }
.brand .mark { color: var(--amber); }
.topbar-right { display: flex; align-items: center; gap: .75rem; }
.week-pill {
  font-family: var(--mono); font-size: .72rem; color: var(--sage);
  border: 1px solid var(--line); border-radius: 999px;
  padding: .25rem .7rem;
}
.week-pill b { color: var(--amber); }
.icon-btn {
  background: none; border: none; color: var(--sage); cursor: pointer;
  font-size: 1.2rem; padding: .25rem; line-height: 1;
}

/* ---- bottom nav (mobile-first) ---- */
.botnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,21,16,.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-around;
  padding: .55rem .25rem calc(.55rem + env(safe-area-inset-bottom));
}
.botnav button {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: .25rem;
  color: var(--sage-dim); font-size: .72rem; font-weight: 600;
  padding: .5rem .65rem; border-radius: var(--r-sm);
  transition: color .15s, background .15s;
  font-family: var(--body); min-width: 60px;
}
.botnav button .ic { font-size: 1.5rem; line-height: 1; }
.botnav button.active { color: var(--amber); }
.botnav button.active .ic { transform: scale(1.05); }

/* daily scoring grid */
.daygrid { display: grid; gap: 2px; font-family: var(--mono); }
.daygrid .dcell {
  text-align: center; padding: .35rem .2rem; border-radius: 4px;
  background: var(--field-2); font-size: .8rem; cursor: pointer;
  border: 1px solid transparent;
}
.daygrid .dcell.best { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); font-weight: 700; }
.daygrid .dcell.dnf { color: var(--sage-dim); opacity: .5; }
.daygrid .dcell.upcoming { background: var(--field); border: 1px dashed var(--line);
  display: flex; flex-direction: column; justify-content: center; padding: .2rem 0; }
.daygrid .dcell.neg { color: var(--bad); }
.daygrid .dhead { text-align: center; font-size: .58rem; color: var(--sage-dim);
  text-transform: uppercase; padding: .2rem 0; }
.pcard { background: var(--field-3); border: 1px solid var(--line);
  border-radius: var(--r); padding: .75rem; margin-bottom: .6rem; }
.pcard.bench { opacity: .72; border-style: dashed; }
.starter-badge { font-size: .55rem; font-family: var(--mono); letter-spacing: 1px;
  padding: .1rem .4rem; border-radius: 3px; text-transform: uppercase; }
.starter-badge.s { background: var(--amber); color: #1a1305; }
.starter-badge.b { background: var(--field); color: var(--sage); border: 1px solid var(--line); }
.il-badge { font-size: .55rem; font-family: var(--mono); letter-spacing: 1px;
  padding: .1rem .35rem; border-radius: 3px; background: var(--bad); color: #fff;
  font-weight: 700; margin-left: .3rem; }
.ps-tag { font-size: .5rem; font-family: var(--mono); color: var(--good);
  font-weight: 700; display: block; margin-top: 1px; }
.opp-tag { font-size: .5rem; color: var(--sage-dim); display: block; }

/* ---- page container ---- */
.page { padding: 1rem; max-width: 980px; margin: 0 auto; display: none; }
.page.active { display: block; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }

/* ---- section headers ---- */
.eyebrow {
  font-family: var(--mono); font-size: .65rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--clay); margin-bottom: .4rem;
}
.h1 { font-family: var(--display); font-size: 2rem; font-weight: 600; line-height: 1.05; }
.h2 { font-family: var(--display); font-size: 1.35rem; font-weight: 600; margin-bottom: .5rem; }
.sub { color: var(--sage); font-size: .85rem; }

/* ---- cards ---- */
.card {
  background: var(--field-3);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 1rem;
  margin-bottom: 1rem;
}
.card-tight { padding: .75rem; }

/* ---- buttons ---- */
.btn {
  font-family: var(--body); font-weight: 600; font-size: .9rem;
  background: var(--clay); color: #1a0f08; border: none;
  border-radius: var(--r-sm); padding: .6rem 1.1rem; cursor: pointer;
  transition: filter .15s, transform .05s;
}
.btn:active { transform: scale(.98); }
.btn:hover { filter: brightness(1.08); }
.btn-ghost {
  background: transparent; color: var(--chalk);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--clay); color: var(--clay); }
.btn-amber { background: var(--amber); color: #1a1305; }
.btn-sm { padding: .4rem .75rem; font-size: .8rem; }
.btn-block { display: block; width: 100%; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ---- stat chips ---- */
.statrow { display: grid; grid-template-columns: repeat(3,1fr); gap: .6rem; }
.stat {
  background: var(--field-2); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: .7rem .5rem; text-align: center;
}
.stat .lbl { font-family: var(--mono); font-size: .58rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); }
.stat .val { font-family: var(--display); font-size: 1.6rem; color: var(--chalk); line-height: 1.1; }
.stat .val.amber { color: var(--amber); }
.stat .foot { font-size: .6rem; color: var(--sage-dim); }

/* ---- empty state ---- */
.empty {
  text-align: center; padding: 2.5rem 1rem; color: var(--sage);
}
.empty .big { font-size: 2.5rem; margin-bottom: .5rem; opacity: .5; }
.empty .msg { font-size: .9rem; margin-bottom: 1rem; }

/* ---- loading ---- */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--line);
  border-top-color: var(--clay); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 1rem auto;
}
@keyframes spin { to { transform: rotate(360deg);} }

/* ---- log output ---- */
.log {
  background: var(--field); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: .6rem .8rem;
  font-family: var(--mono); font-size: .7rem; line-height: 1.6;
  max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
}
.log-step { display: flex; gap: .5rem; }
.log-ic { flex-shrink: 0; }

/* ---- toast ---- */
.toast-wrap { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: flex; flex-direction: column; gap: .4rem; align-items: center; }
.toast {
  background: var(--field-3); border: 1px solid var(--line);
  border-left: 3px solid var(--clay);
  border-radius: var(--r-sm); padding: .6rem 1rem; font-size: .82rem;
  box-shadow: 0 8px 24px rgba(0,0,0,.4); animation: toastIn .25s ease;
  max-width: 90vw;
}
.toast.err { border-left-color: var(--bad); }
.toast.ok { border-left-color: var(--good); }
@keyframes toastIn { from { opacity:0; transform: translateY(8px);} to {opacity:1;transform:none;} }

/* ---- modal ---- */
.modal-bg {
  position: fixed; inset: 0; z-index: 300; display: none;
  background: rgba(5,8,6,.7); backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--field-2); border: 1px solid var(--line);
  border-radius: var(--r) var(--r) 0 0; width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto; padding: 1.25rem;
  animation: sheetUp .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes sheetUp { from { transform: translateY(100%);} to {transform:none;} }
@media (min-width: 600px) {
  .modal-bg { align-items: center; }
  .modal { border-radius: var(--r); }
}

/* ---- forms ---- */
.field { margin-bottom: .9rem; }
.field label { display: block; font-family: var(--mono); font-size: .62rem;
  letter-spacing: 1px; text-transform: uppercase; color: var(--sage); margin-bottom: .3rem; }
.input, .select {
  width: 100%; background: var(--field); color: var(--chalk);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: .55rem .7rem; font-family: var(--body); font-size: .9rem;
}
.input:focus, .select:focus { outline: none; border-color: var(--clay); }

/* ---- tables ---- */
.tbl { width: 100%; border-collapse: collapse; font-size: .82rem; }
.tbl th { font-family: var(--mono); font-size: .58rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); text-align: left;
  padding: .4rem .5rem; border-bottom: 1px solid var(--line); }
.tbl th.r, .tbl td.r { text-align: right; }
.tbl td { padding: .45rem .5rem; border-bottom: 1px solid rgba(42,61,48,.4); }
.tbl tr:last-child td { border-bottom: none; }
.tbl .pos { font-family: var(--mono); font-size: .68rem; color: var(--sage); width: 38px; }
.cell-best { color: var(--amber); font-weight: 700; }
.cell-zero { color: var(--sage-dim); }
.cell-neg { color: var(--bad); }

/* player link */
.plink { color: inherit; cursor: pointer; border-bottom: 1px dashed var(--sage-dim); }
.plink:hover { color: var(--amber); border-color: var(--amber); }

/* divider label */
.divlabel { font-family: var(--mono); font-size: .6rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); text-align: center;
  margin: .75rem 0 .5rem; }

.hide { display: none !important; }
.row { display: flex; gap: .6rem; flex-wrap: wrap; }
.row-between { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
.mt { margin-top: 1rem; } .mb { margin-bottom: 1rem; }
.amber { color: var(--amber); } .clay { color: var(--clay); } .sage { color: var(--sage); }
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

/* ============================================================
   CONFIG
   ============================================================ */
const FB_CONFIG = {
  apiKey: "AIzaSyCMx3JkbkOQg3krv5P7Usixp7RFmGcpwYM",
  authDomain: "best-ball-master-settings.firebaseapp.com",
  projectId: "best-ball-master-settings",
  storageBucket: "best-ball-master-settings.firebasestorage.app",
  messagingSenderId: "961404685458",
  appId: "1:961404685458:web:81d6a6002bce84640baa4b"
};

/* ============================================================
   MULTI-SPORT CONFIG
   Everything sport-specific lives here. Adding a sport = filling
   in one entry. Baseball is complete; basketball is scaffolded.
   ============================================================ */
const SPORTS = {
  flb: {
    key: 'flb',
    label: 'Baseball',
    icon: '⚾',
    espnGame: 'flb',
    season: 2026,
    statSeason: 2026,            // real-stat season (MLB) — current year; see CURRENT_YEAR
    rosterSize: 23,
    statsApi: 'mlb',
    // ESPN defaultPositionId -> position
    posMap: {1:'SP',2:'C',3:'1B',4:'2B',5:'3B',6:'SS',7:'OF',8:'OF',9:'OF',10:'DH',11:'RP'},
    // ESPN lineupSlotId -> slot label (null = bench/IL, not scored)
    slotMap: {0:'C',1:'1B',2:'2B',3:'3B',4:'SS',5:'OF',6:'2B/SS',7:'1B/3B',8:'OF',9:'OF',
              10:'DH',11:'UTIL',12:'SP',13:'RP',14:'P'},
    // ESPN eligibleSlot ID -> ATOMIC positions it confers, using ESPN's REAL
    // baseball lineupSlotId scheme:
    //  0=C 1=1B 2=2B 3=3B 4=SS 5=OF 6=2B/SS 7=1B/3B 8=LF 9=CF 10=RF
    //  11=DH 12=UTIL 13=P(any) 14=SP 15=RP 16=BE 17=IL 19=IF(corner+middle)
    // Generic slots (UTIL/P/BE/IL) confer NO specific position and are omitted —
    // otherwise every hitter eligible for UTIL would wrongly gain 'SP'.
    eligMap: {
      0:['C'], 1:['1B'], 2:['2B'], 3:['3B'], 4:['SS'], 5:['OF'],
      6:['2B','SS'], 7:['1B','3B'], 8:['OF'], 9:['OF'], 10:['OF'],
      11:['DH'], 14:['SP'], 15:['RP'], 19:['1B','2B','3B','SS'],
      // 12 (UTIL), 13 (P generic), 16 (bench), 17 (IL) intentionally omitted
    },
    irSlots: [17],              // IL slot id(s)
    benchSlots: [16,17],
    proTeams: {0:'FA',1:'BAL',2:'BOS',3:'LAA',4:'CWS',5:'CLE',6:'DET',7:'KC',8:'MIL',9:'MIN',
      10:'NYY',11:'OAK',12:'SEA',13:'TEX',14:'TOR',15:'ATL',16:'CHC',17:'CIN',18:'HOU',19:'LAD',
      20:'WSH',21:'NYM',22:'PHI',23:'PIT',24:'STL',25:'SD',26:'SF',27:'COL',28:'MIA',29:'ARI',30:'TB'},
    posFilters: ['ALL','C','1B','2B','3B','SS','OF','DH','SP','RP'],
    // Starting lineup slots (ESPN default). Each entry = {slot, eligible[]}.
    // eligible lists which player positions can fill it. Edit to match your league.
    lineupSlots: [
      { slot: 'C',   eligible: ['C'] },
      { slot: '1B',  eligible: ['1B'] },
      { slot: '2B',  eligible: ['2B'] },
      { slot: '3B',  eligible: ['3B'] },
      { slot: 'SS',  eligible: ['SS'] },
      { slot: 'OF',  eligible: ['OF'] },
      { slot: 'OF',  eligible: ['OF'] },
      { slot: 'OF',  eligible: ['OF'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'UTIL',eligible: ['C','1B','2B','3B','SS','OF','DH'] },
    ],
    benchCount: 5,
    irCount: 5,
  },
  fba: {
    key: 'fba',
    label: 'Basketball',
    icon: '🏀',
    espnGame: 'fba',
    season: 2026,
    statSeason: 2025,            // real-stat season (NBA)
    rosterSize: 13,
    statsApi: 'nba',
    posMap: {1:'PG',2:'SG',3:'SF',4:'PF',5:'C',6:'G',7:'F'},
    slotMap: {0:'PG',1:'SG',2:'SF',3:'PF',4:'C',5:'G',6:'F',7:'F/C',8:'G/F',9:'UTIL',10:'BE'},
    eligMap: {
      0:['PG'], 1:['SG'], 2:['SF'], 3:['PF'], 4:['C'],
      5:['PG','SG'], 6:['SF','PF'], 7:['PF','C'], 8:['SF','SG'],
    },
    benchSlots: [12,13],
    proTeams: {}, // filled when basketball is activated
    posFilters: ['ALL','PG','SG','SF','PF','C','G','F'],
    lineupSlots: [
      { slot: 'PG',  eligible: ['PG'] },
      { slot: 'SG',  eligible: ['SG'] },
      { slot: 'SF',  eligible: ['SF'] },
      { slot: 'PF',  eligible: ['PF'] },
      { slot: 'C',   eligible: ['C'] },
      { slot: 'UTIL',eligible: ['PG','SG','SF','PF','C'] },
    ],
    benchCount: 10,
    irCount: 0,
  },
};

const FB_DOC_ID = 'bgl_multisport'; // single Firebase doc holds all sports
const ADMIN_PIN = '2325';

/* the active sport — persisted in STATE.sport */
function SP() { return SPORTS[STATE.sport] || SPORTS.flb; }

/* ============================================================
   STATE  (now namespaced per-sport for league data)
   ============================================================ */
const STATE = {
  sport: 'flb',                 // active sport
  // per-sport league data lives under leagues[sportKey]
  leagues: {
    flb: blankLeague('Best Game League'),
    fba: blankLeague('BGL Hoops'),
  },
  idOverrides: {},              // shared name->realId overrides
  activeLeagueDoc: null,        // which league doc this device synced to
  memberId: null,               // this device's locked identity (key into members)
  approvals: {},                // commissioner approval list (from master)
  _loaded: false,
};

function blankLeague(name) {
  return {
    leagueName: name,
    currentWeek: 1,
    teams: [],
    draft: { started:false, complete:false, order:[], picks:[], currentPick:0 },
    playerPool: [],
    customScoring: {},          // our own scoring: {categoryId: pointValue} overrides
    stats: {},
    weekly: {},
    trades: [],                 // trade requests (players + future picks)
    members: {},                // {memberId: {name, teamId, joined}} — locked identities
    lineups: {},                // lineups[teamId][week] = { assignments }
    gameLogs: {},               // cached MLB logs: gameLogs[mlbId] = [{date, group, stat}]
    scheduleCache: {},          // cached MLB schedule per week
    irStash: {},                // {teamId: [playerId]} players on IL
    viewWeek: null,             // week the user is viewing (null = auto current)
    schedule: { opener: null, durations: {} },  // custom week schedule
    rosterOverride: null,       // commissioner roster slot override (null = use sport default)
  };
}

/* This device's team = the team tied to its locked member identity. */
function myTeamId() {
  if (STATE.memberId && LG().members?.[STATE.memberId]) {
    return LG().members[STATE.memberId].teamId;
  }
  return null;
}

/* shortcut to the active sport's league data */
function LG() { return STATE.leagues[STATE.sport] || (STATE.leagues[STATE.sport] = blankLeague('League')); }

let db = null, fbReady = false, fbErr = null;

/* ============================================================
   FIREBASE
   ============================================================ */
/* ============================================================
   STORAGE ARCHITECTURE
   - MASTER settings (shared Firebase doc 'master/<sportleague>'):
     player pool, ID mapping, scoring, schedule. Commissioner-level,
     PIN-protected to edit. Everyone reads these.
   - LOCAL settings (this device, localStorage): teams, draft, my team,
     lineups, view state, and any local overrides.
   ============================================================ */
const MASTER_KEYS = ['playerPool', 'idMapping', 'customScoring', 'schedule', 'masterMeta'];
const MASTER_DOC = 'master';        // firestore: leagues/master
const LOCAL_LS_KEY = 'bgl_local_v1';

function masterPayload() {
  // master holds only GLOBAL data shared across all leagues: the player pool
  // and ID overrides. Scoring + schedule are per-league (in leaguePayload).
  const out = {};
  for (const sk of Object.keys(STATE.leagues)) {
    const lg = STATE.leagues[sk];
    out[sk] = {
      playerPool: lg.playerPool,
    };
  }
  out.idOverrides = STATE.idOverrides;
  out.approvals = STATE.approvals || {};   // commissioner approval list
  return out;
}

function applyMaster(master) {
  if (!master) return;
  if (master.approvals) STATE.approvals = master.approvals;
  for (const sk of Object.keys(master)) {
    if (sk === 'idOverrides') { STATE.idOverrides = master.idOverrides || {}; continue; }
    if (sk === 'approvals') continue;
    if (!STATE.leagues[sk]) continue;
    const m = master[sk];
    if (m.playerPool) STATE.leagues[sk].playerPool = m.playerPool;
  }
}

/* Local storage now holds ONLY identity pointers — which league this device
   joined and which member it is. All actual league data lives in Firebase. */
function saveLocal() {
  try {
    const identity = {
      sport: STATE.sport,
      activeLeagueDoc: STATE.activeLeagueDoc || null,
      memberId: STATE.memberId || null,
    };
    localStorage.setItem(LOCAL_LS_KEY, JSON.stringify(identity));
  } catch(e) { /* localStorage unavailable */ }
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LOCAL_LS_KEY);
    if (!raw) return;
    const id = JSON.parse(raw);
    if (id.sport) STATE.sport = id.sport;
    if (id.activeLeagueDoc) STATE.activeLeagueDoc = id.activeLeagueDoc;
    if (id.memberId) STATE.memberId = id.memberId;
  } catch(e) {}
}

function initFirebase() {
  loadLocal();  // device data first, instant
  if (FB_CONFIG.apiKey.startsWith('REPLACE')) { fbErr = 'Firebase not configured'; return; }
  try {
    const app = initializeApp(FB_CONFIG);
    db = getFirestore(app);
    fbReady = true;
    // live sync of MASTER settings (player pool, scoring, schedule, approvals)
    onSnapshot(doc(db, 'leagues', MASTER_DOC), (snap) => {
      if (snap.exists() && snap.data().master) {
        applyMaster(snap.data().master);
        STATE._loaded = true;
        renderActive();
      }
    }, (e) => { fbErr = e.message; });
    // if this device previously joined a league, resubscribe to its shared doc
    if (STATE.activeLeagueDoc) subscribeLeague(STATE.activeLeagueDoc);
  } catch(e) { fbErr = e.message; }
}

/* live-sync a per-league doc (shared teams/draft). Personal data stays local. */
let _leagueUnsub = null;
function subscribeLeague(docId) {
  if (!fbReady || !docId) return;
  if (_leagueUnsub) { try { _leagueUnsub(); } catch(e){} _leagueUnsub = null; }
  _leagueUnsub = onSnapshot(doc(db, 'leagues', docId), (snap) => {
    if (snap.exists() && snap.data().league) {
      applyLeague(snap.data().league);
      saveLocal();
      renderActive();
    }
  }, (e) => { /* denied = not approved; stays local */ });
}

/* save LOCAL always; save MASTER only when unlocked (commissioner) */
async function save(opts = {}) {
  saveLocal();  // always persist device state (my team, lineups, caches)
  if (opts.master) {
    await saveMaster();
  } else if (STATE.activeLeagueDoc) {
    await saveLeague(opts);   // joined an approved league → sync shared data
  } else if (!opts.silent) {
    toast('💾 Saved locally (this device)', 'ok');
  }
}

/* The slice of a league that is SHARED across all members (not device-specific).
   Teams + draft + league meta are shared; my team/lineups/caches stay local. */
/* The ENTIRE league now lives in one shared doc — no local data.
   Lineups are keyed by teamId so everyone sees everyone's. Members maps
   a locked identity (name) to a team. gameLogs/schedule cached here too. */
function leaguePayload() {
  const lg = LG();
  return {
    sport: STATE.sport,
    leagueName: lg.leagueName,
    currentWeek: lg.currentWeek,
    teams: lg.teams,

    rosterOverride: lg.rosterOverride || null,

    lineups: lg.lineups || {},          // {teamId: {week: {assignments}}}
    members: lg.members || {},          // {memberId: {name, teamId, joined}}
    gameLogs: lg.gameLogs || {},        // shared stat cache (everyone benefits)
    scheduleCache: lg.scheduleCache || {},

}

async function saveLeague(opts = {}) {
  if (!fbReady || !STATE.activeLeagueDoc) {
    if (!opts.silent) toast('💾 Saved locally', 'ok');
    return;
  }
  try {
    await setDoc(doc(db, 'leagues', STATE.activeLeagueDoc), { league: leaguePayload() });
    if (!opts.silent) toast(`☁️ Synced to league: ${LG().leagueName}`, 'ok');
  } catch(e) {
    // most common cause: not approved (rule denied) — fall back to local
    toast('League sync blocked (check approval). Saved locally.', 'err');

/* Apply shared league data pulled from the per-league doc (without clobbering
   this device's personal choices like myTeamId / lineups). */
/* Apply the full shared league doc. Everything is shared now, including
   all members' lineups (you view all, edit only your own). */
function applyLeague(league) {
  if (!league) return;
  const sk = league.sport || STATE.sport;
  if (!STATE.leagues[sk]) return;
  const lg = STATE.leagues[sk];
  if (league.leagueName) lg.leagueName = league.leagueName;
  if (league.currentWeek != null) lg.currentWeek = league.currentWeek;
  if (league.teams) lg.teams = league.teams;
  if (league.draft) lg.draft = league.draft;
  if (league.schedule) lg.schedule = league.schedule;
  if (league.customScoring) lg.customScoring = league.customScoring;
  if (league.rosterOverride !== undefined) lg.rosterOverride = league.rosterOverride;
  if (league.trades) lg.trades = league.trades;
  if (league.lineups) lg.lineups = league.lineups;
  if (league.members) lg.members = league.members;
  if (league.gameLogs) lg.gameLogs = league.gameLogs;
  if (league.scheduleCache) lg.scheduleCache = league.scheduleCache;
  if (league.irStash) lg.irStash = league.irStash;
}

/* normalize a player name for matching: lowercase, strip accents, punctuation, suffixes */
function normName(name) {
  return String(name || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // strip accents
    .toLowerCase()
    .replace(/\b(jr|sr|ii|iii|iv)\b\.?/g, '')            // strip suffixes
    .replace(/[^a-z\s]/g, '')                             // strip punctuation
    .replace(/\s+/g, ' ').trim();
}

/* ============================================================
   ESPN API — player pool ONLY (no league ID needed; the /players
   endpoint is global per game+season, not league-scoped)
   ============================================================ */

/* Pull the full draftable player pool from ESPN's player info endpoint */
async function fetchPlayerPool(logFn) {
  logFn?.('Fetching ESPN player pool…', 'run');
  const statSeason = SP().statSeason;
  const url = `https://lm-api-reads.fantasy.espn.com/apis/v3/games/${SP().espnGame}/seasons/${SP().season}/players?scoringPeriodId=0&view=kona_player_info`;
  // Correct ESPN filter structure:
  //  - filterStatsForTopScoringPeriodIds tells ESPN WHICH stats to attach
  //  - additionalValue carries the season-total key "00<season>" and projected "10<season>"
  //  - sortPercOwned orders by relevance (rostered players first), limit caps the dump
  const filter = {
    players: {
      filterStatsForTopScoringPeriodIds: {
        value: 2,
        additionalValue: [`00${statSeason}`, `10${statSeason}`, `00${SP().season}`, `10${SP().season}`]
      },
      sortPercOwned: { sortPriority: 1, sortAsc: false },
      limit: 600,
      filterRanksForScoringPeriodIds: { value: [0] },
    }
  };
  const res = await fetch(url, { headers: { 'X-Fantasy-Filter': JSON.stringify(filter) } });
  if (!res.ok) throw new Error('ESPN player pool HTTP ' + res.status);
  const data = await res.json();
  const players = Array.isArray(data) ? data : (data.players || []);
  logFn?.(`Got ${players.length} players from ESPN`, 'ok');
  if (players.length) window._lastRawPlayer = players[0];
  return players;
}

/* Pull a player's season fantasy-point total from ESPN stat splits.
   ESPN stat split `id` is a string like "00<season>" (season total, actual).
   We try the stat season first, then the league season, then any actual split. */
function seasonPointsFromEspn(pl) {
  const stats = pl.stats || [];
  const tryKeys = [`00${SP().statSeason}`, `00${SP().season}`];
  for (const key of tryKeys) {
    const hit = stats.find(s => s.id === key && s.appliedTotal != null);
    if (hit) return Math.round((hit.appliedTotal || 0) * 10) / 10;
  }
  // fallback: any real (non-projected) season-total split with points
  const any = stats.find(s => s.statSourceId === 0 && s.statSplitTypeId === 0 && s.appliedTotal != null)
           || stats.find(s => s.statSourceId === 0 && s.appliedTotal != null);
  return any ? Math.round((any.appliedTotal || 0) * 10) / 10 : 0;
}

/* ============================================================
   MLB STATS API — the source of truth for game stats
   (runs in browser; not testable from build env but API is stable)
   ============================================================ */
const MLB = 'https://statsapi.mlb.com/api/v1';

/* search MLB for a player by name → returns best mlbId match */
async function mlbLookup(name) {
  const q = encodeURIComponent(name);
  const res = await fetch(`${MLB}/people/search?names=${q}`);
  if (!res.ok) return null;
  const data = await res.json();
  const people = data.people || [];
  if (!people.length) return null;
  const target = normName(name);
  const exact = people.find(p => normName(p.fullName) === target);
  return (exact || people[0]).id;
}

/* Get the active scoring values: user overrides if set, else defaults. */
function scoringValues() {
  const cat = SCORING_CATALOG[STATE.sport] || SCORING_CATALOG.flb;
  const saved = LG().customScoring || {};
  const out = {};
  cat.forEach(c => { out[c.id] = (saved[c.id] != null) ? saved[c.id] : c.def; });
  return out;
}
function scoringCatalog() { return SCORING_CATALOG[STATE.sport] || SCORING_CATALOG.flb; }

/* The current stat season — league year, rolls over automatically. */
function statSeasonNow() { return SP().season; }


/* Fetch a player's game-by-game log from MLB StatsAPI for the current season.
   Returns [{date, gamePk, opp, stat:{...}}] for both hitting and pitching. */
async function mlbGameLog(mlbId, group, season) {
  const yr = season || statSeasonNow();
  const url = `${MLB}/people/${mlbId}/stats?stats=gameLog&season=${yr}&group=${group}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`MLB gameLog HTTP ${res.status}`);
  const data = await res.json();
  const splits = data.stats?.[0]?.splits || [];
  return splits.map(s => ({
    date: s.date,
    gamePk: s.game?.gamePk,
    opp: s.opponent?.abbreviation || s.opponent?.name || '',
    isHome: s.isHome,
    stat: s.stat || {},
  }));
}

/* ============================================================
   SCHEDULE + PROBABLE PITCHERS (for the week lookahead)
   Fetches the MLB schedule for a date range with probable pitchers,
   then lets us answer: for player X on day D, who do they play, and
   (for pitchers) are they the probable starter? Cached per week.
   ============================================================ */
async function fetchSchedule(startYmd, endYmd) {
  // hydrate=probablePitcher gives us the listed starters
  const url = `${MLB}/schedule?sportId=1&startDate=${startYmd}&endDate=${endYmd}&hydrate=probablePitcher,team`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`MLB schedule HTTP ${res.status}`);
  const data = await res.json();
  // flatten into per-date game records keyed by team id
  const byDate = {}; // 'YYYY-MM-DD' -> [{homeId,awayId,homeAbbr,awayAbbr,homeProb,awayProb}]
  (data.dates||[]).forEach(d => {
    const games = (d.games||[]).map(g => ({
      homeId: g.teams?.home?.team?.id, awayId: g.teams?.away?.team?.id,
      homeAbbr: g.teams?.home?.team?.abbreviation, awayAbbr: g.teams?.away?.team?.abbreviation,
      homeProb: g.teams?.home?.probablePitcher?.id, awayProb: g.teams?.away?.probablePitcher?.id,
    }));
    byDate[d.date] = games;
  });
  return byDate;
}

/* cache schedule for a fantasy week in LG().scheduleCache[weekKey] */
async function getWeekSchedule(week) {
  const days = weekDays(week);
  const startYmd = ymd(days[0]), endYmd = ymd(days[days.length-1]);
  const key = `${SP().season}_${startYmd}_${endYmd}`;
  LG().scheduleCache = LG().scheduleCache || {};
  if (LG().scheduleCache[key]) return LG().scheduleCache[key];
  try {
    const sched = await fetchSchedule(startYmd, endYmd);
    LG().scheduleCache[key] = sched;
    return sched;
  } catch(e) { return {}; }
}

/* For a player on a given calendar date, return {opp, isProbable} or null.
   Needs the player's MLB team id (we resolve it lazily and cache on the player). */
function playerDayMatchup(player, dateYmd, sched) {
  const teamId = player.mlbTeamId;
  if (!teamId || !sched || !sched[dateYmd]) return null;
  for (const g of sched[dateYmd]) {
    if (g.homeId === teamId) return { opp: 'vs ' + (g.awayAbbr||''), isProbable: g.homeProb === player.mlbId };
    if (g.awayId === teamId) return { opp: '@ ' + (g.homeAbbr||''), isProbable: g.awayProb === player.mlbId };
  }
  return null;
}

/* Convert one game's MLB stat line into points using OUR scoring system.
   Reads the active per-category values (user overrides or defaults). */
function gamePoints(statObj, group) {
  const vals = scoringValues();
  const cat = scoringCatalog();
  let pts = 0;
  for (const c of cat) {
    if (c.grp !== group) continue;          // hitting cats → hitting games only
    const per = vals[c.id];
    if (!per) continue;                      // zero-valued categories skipped
    let val;
    if (c.derive) val = c.derive(statObj);   // computed (singles, etc.)
    else val = statObj[c.mlb];
    if (val == null) continue;
    val = parseFloat(val);
    if (isNaN(val)) continue;
    pts += val * per;
  }
  return Math.round(pts * 100) / 100;
}

/* Per-category breakdown of a game's points (for tap-to-see detail). */
function gameBreakdown(statObj, group) {
  const vals = scoringValues();
  const cat = scoringCatalog();
  const out = [];
  for (const c of cat) {
    if (c.grp !== group) continue;
    const per = vals[c.id];
    if (!per) continue;
    let raw = c.derive ? c.derive(statObj) : statObj[c.mlb];
    if (raw == null) continue;
    raw = parseFloat(raw);
    if (isNaN(raw) || raw === 0) continue;
    out.push({ label: c.label, raw, per, pts: Math.round(raw*per*100)/100 });
  }
  return out;
}

/* ============================================================
   WEEK ↔ DATE LOGIC
   Each week defaults to 7 days starting from the season opener
   Monday. Users can override (a) the opener date and (b) any
   week's duration in days. Weeks after a custom-duration week
   shift automatically, then resume standard 7-day spacing.
   Stored: LG().schedule = { opener: 'YYYY-MM-DD', durations: {week: days} }
   ============================================================ */
const SEASON_OPENERS = { 2025: '2025-03-24', 2026: '2026-03-23', 2027: '2027-03-29' };

function seasonOpenerMonday() {
  // user override first
  const custom = LG().schedule?.opener;
  if (custom) return new Date(custom + 'T00:00:00');
  const iso = SEASON_OPENERS[SP().season] || `${SP().season}-03-30`;
  return new Date(iso + 'T00:00:00');
}
/* duration (days) of a given week — custom or default 7 */
function weekDuration(week) {
  const d = LG().schedule?.durations?.[week];
  return (d && d > 0) ? d : 7;
}
/* start date of a week = opener + sum of all prior weeks' durations */
function weekStart(week) {
  const open = seasonOpenerMonday();
  let offset = 0;
  for (let w = 1; w < week; w++) offset += weekDuration(w);
  const start = new Date(open); start.setDate(open.getDate() + offset);
  return start;
}
function weekDateRange(week) {
  const start = weekStart(week);
  const end = new Date(start); end.setDate(start.getDate() + weekDuration(week) - 1);
  return { start, end };
}
function ymd(d) { return d.toISOString().slice(0,10); }
function dayLabel(d) {
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate();
}
function weekDays(week) {
  const start = weekStart(week);
  const len = weekDuration(week);
  const days = [];
  for (let i=0;i<len;i++) { const d = new Date(start); d.setDate(start.getDate()+i); days.push(d); }
  return days;
}
/* Which fantasy week is "now" — walk weeks until today falls inside one.
   Accounts for custom week durations. Clamped to 1..26. */
function currentWeekNow() {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let w = 1; w <= 26; w++) {
    const { start, end } = weekDateRange(w);
    if (today >= start && today <= end) return w;
    if (today < start) return Math.max(1, w);  // before this week starts
  }
  return 26;
}
/* The week the UI should show: explicit viewWeek if set, else computed now. */
function activeWeek() { return LG().viewWeek || currentWeekNow(); }

/* ============================================================
   LINEUP LOCK — lineups lock at 11:00 AM on the Sunday before
   a week begins (i.e. the day before a Monday week start).
   Returns the lock Date for a given week.
   ============================================================ */
const LOCK_HOUR = 11; // 11:00 AM local
function weekLockTime(week) {
  const start = weekStart(week);          // Monday (week start)
  const lock = new Date(start);
  lock.setDate(start.getDate() - 1);      // the Sunday before
  lock.setHours(LOCK_HOUR, 0, 0, 0);
  return lock;
}
function isWeekLocked(week) {
  return new Date() >= weekLockTime(week);
}
/* human countdown string until a week locks, or 'Locked' */
function lockCountdown(week) {
  const ms = weekLockTime(week) - new Date();
  if (ms <= 0) return 'Locked';
  const d = Math.floor(ms/86400000);
  const h = Math.floor((ms%86400000)/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function playerWeekGames(mlbId, week) {
  const logs = LG().gameLogs?.[mlbId] || [];
  const days = weekDays(week).map(ymd);
  const out = [];
  logs.forEach(g => {
    const idx = days.indexOf(g.date);
    if (idx >= 0) out.push({ ...g, dayIdx: idx, pts: gamePoints(g.stat, g.group) });
  });
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
function playerBestGame(mlbId, week) {
  const games = playerWeekGames(mlbId, week);
  if (!games.length) return null;
  return games.reduce((best,g)=> g.pts > best.pts ? g : best, games[0]);
}


/* ============================================================
   ID MAPPING — bridge ESPN players ↔ MLB players
   Strategy: name match + override table; cache results
   ============================================================ */
async function resolveMlbIds(logFn, progressFn) {
  const api = SP().statsApi;
  if (api === 'mlb') return resolveIds(logFn, progressFn, mlbLookup, 'MLB');
  if (api === 'nba') return resolveIds(logFn, progressFn, nbaLookup, 'NBA');
  logFn?.(`No stat provider for ${SP().label}`, 'err');
  return { mapped: 0, failed: 0, failures: [] };
}

/* generic resolver — sport provides the lookup fn */
async function resolveIds(logFn, progressFn, lookupFn, apiName) {
  logFn?.(`Mapping ${SP().label} players to ${apiName} IDs…`, 'run');
  let mapped = 0, failed = 0, done = 0;
  const failures = [];
  const pool = LG().playerPool;
  const total = pool.length;
  for (const p of pool) {
    done++;
    if (p.mlbId) { mapped++; progressFn?.(done, total, mapped, failed); continue; }
    if (STATE.idOverrides[normName(p.name)]) {
      p.mlbId = STATE.idOverrides[normName(p.name)];
      mapped++; progressFn?.(done, total, mapped, failed); continue;
    }
    try {
      const id = await lookupFn(p.name);
      if (id) { p.mlbId = id; mapped++; }
      else { failed++; failures.push(p.name); }
    } catch { failed++; failures.push(p.name); }
    progressFn?.(done, total, mapped, failed);
    await new Promise(r => setTimeout(r, 35));
  }
  logFn?.(`Mapped ${mapped}, failed ${failed}`, failed ? 'err' : 'ok');
  if (failures.length) logFn?.('Unmapped: ' + failures.slice(0,10).join(', ') + (failures.length>10?'…':''), 'pending');
  return { mapped, failed, failures };
}

/* roster (array of player objects) for a team */
function teamRoster(teamId) {
  return LG().draft.picks
    .filter(pk => String(pk.teamId) === String(teamId))
    .map(pk => { const p = LG().playerPool.find(x => String(x.espnId)===String(pk.playerId));
      return p ? {...p, pick: pk.pick} : null; })
    .filter(Boolean);
}

/* Max roster size = starting slots + bench. IL players don't count. */
function rosterCap() {
  return (activeLineupSlots()||[]).length + rosterBenchCount();
}
/* count of a team's roster excluding IL-stashed players */
function rosterActiveCount(teamId) {
  const ir = LG().irStash?.[teamId] || [];
  return teamRoster(teamId).filter(p => !ir.includes(String(p.espnId))).length;
}

/* starters for team+week — manual lineup, or default to first N if unset */
/* The lineup for team+week: {assignments: {slotIdx: playerId}}.
   Carries forward from the most recent prior week if unset. */
function getLineup(teamId, week) {
  const lu = LG().lineups?.[teamId]?.[week];
  if (lu?.assignments && Object.keys(lu.assignments).length) return lu;
  // carry forward most recent prior week's lineup
  for (let w = week-1; w >= 1; w--) {
    const prev = LG().lineups?.[teamId]?.[w];
    if (prev?.assignments && Object.keys(prev.assignments).length)
      return { assignments: {...prev.assignments}, carried: true };
  }
  // never set → build a sensible default lineup so scoring still works
  return { assignments: defaultLineup(teamId), isDefault: true };
}

/* Auto-build a valid default lineup: greedily fill each slot with the
   best-ADP eligible un-used player. Ensures unset/locked weeks still score. */
function defaultLineup(teamId) {
  const slots = activeLineupSlots() || [];
  const roster = teamRoster(teamId).slice().sort((a,b)=>a.adp-b.adp); // best first
  const used = new Set();
  const assign = {};
  slots.forEach((s, idx) => {
    const pick = roster.find(r =>
      !used.has(String(r.espnId)) &&
      s.eligible.some(e => (r.eligible||[]).includes(e)));
    if (pick) { assign[idx] = pick.espnId; used.add(String(pick.espnId)); }
  });
  return assign;
}
/* starters = the set of player IDs assigned to any slot */
function getStarters(teamId, week) {
  const lu = getLineup(teamId, week);
  return Object.values(lu.assignments || {}).filter(Boolean).map(String);
}

/* ---- TAP-TO-MOVE LINEUP (from roster page) ----
   Tapping a player's slot badge opens this. Choose a new slot or bench.
   If the chosen slot is occupied, that player is bumped to bench. ---- */
window.pickPosition = function(espnId) {
  const week = activeWeek();
  if (isWeekLocked(week)) { toast('Week is locked', 'err'); return; }
  const p = teamRoster(myTeamId()).find(x => String(x.espnId)===String(espnId));
  if (!p) return;
  ensureLineupExists(week);
  const lu = LG().lineups[myTeamId()][week];
  const assign = lu.assignments;
  const slots = activeLineupSlots() || [];
  const curSlot = Object.entries(assign).find(([i,pid]) => String(pid)===String(espnId))?.[0];

  // which slots is this player eligible for?
  const eligibleSlotIdxs = slots.map((s,i)=>({s,i}))
    .filter(({s}) => s.eligible.some(e => (p.eligible||[]).includes(e)));

  const slotBtns = eligibleSlotIdxs.map(({s,i}) => {
    const occupant = assign[i] ? teamRoster(myTeamId()).find(r=>String(r.espnId)===String(assign[i])) : null;
    const isCur = String(curSlot)===String(i);
    return `<button class="btn ${isCur?'btn-amber':'btn-ghost'} btn-block mt" style="text-align:left"
      onclick="moveToSlot('${espnId}',${i})">
      <b>${esc(s.slot)}</b>${occupant&&!isCur?`<span class="sub"> · bumps ${esc(occupant.name)}</span>`:''}${isCur?' <span class="sub">· current</span>':''}
    </button>`;
  }).join('');

  openModal(`
    <div class="h2">${esc(p.name)}</div>
    <div class="sub mb">${esc((p.eligible||[]).join('/'))} · move to:</div>
    ${slotBtns}
    ${curSlot!=null ? `<button class="btn btn-ghost btn-block mt" onclick="moveToSlot('${espnId}','bench')">Bench</button>` : ''}
    <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Cancel</button>
  `);
};

/* materialize the current (possibly default/carried) lineup into storage so edits stick */
function ensureLineupExists(week) {
  const tid = myTeamId();
  LG().lineups = LG().lineups || {};
  LG().lineups[tid] = LG().lineups[tid] || {};
  if (!LG().lineups[tid][week]?.assignments || !Object.keys(LG().lineups[tid][week].assignments).length) {
    const cur = getLineup(tid, week);  // default or carried
    LG().lineups[tid][week] = { assignments: {...cur.assignments} };
  }
}

window.moveToSlot = function(espnId, slotIdx) {
  const week = activeWeek();
  if (isWeekLocked(week)) { toast('Week is locked', 'err'); return; }
  ensureLineupExists(week);
  const assign = LG().lineups[myTeamId()][week].assignments;
  // remove player from any current slot
  for (const k of Object.keys(assign)) {
    if (String(assign[k])===String(espnId)) delete assign[k];
  }
  if (slotIdx !== 'bench') {
    // bump whoever is in the target slot
    if (assign[slotIdx]) delete assign[slotIdx];  // bumped player → bench (just unassigned)
    assign[slotIdx] = espnId;
  }
  save();  // local save (lineups are device-level)
  closeModal();
  renderActive();
};

function renderLineupEditor(week, locked) {
  const slots = activeLineupSlots() || [];
  const roster = teamRoster(myTeamId());
  const assign = window._lineupWork || {};
  const usedIds = new Set(Object.values(assign).filter(Boolean).map(String));

  const slotRows = slots.map((s, idx) => {
    const pid = assign[idx];
    const p = pid ? roster.find(r => String(r.espnId)===String(pid)) : null;
    // eligible players for this slot, not already used elsewhere
    const opts = roster.filter(r => {
      const elig = (r.eligible||[]);
      const fits = s.eligible.some(e => elig.includes(e));
      return fits && (!usedIds.has(String(r.espnId)) || String(r.espnId)===String(pid));
    });
    const optHtml = ['<option value="">— empty —</option>']
      .concat(opts.map(r => `<option value="${r.espnId}" ${String(r.espnId)===String(pid)?'selected':''}>${esc(r.name)} (${esc((r.eligible||[]).join('/'))})</option>`))
      .join('');
    return `<div class="row-between" style="padding:.35rem 0;border-bottom:1px solid rgba(42,61,48,.4);gap:.5rem">
      <span class="starter-badge s" style="min-width:42px;text-align:center">${esc(s.slot)}</span>
      <select class="select" style="flex:1" ${locked?'disabled':''}
        onchange="assignSlot(${idx},this.value)">${optHtml}</select>
    </div>`;
  }).join('');

  // bench = rostered players not in any slot
  const bench = roster.filter(r => !usedIds.has(String(r.espnId)));
  const benchHtml = bench.length
    ? bench.map(r => `<span class="starter-badge b" style="margin:.15rem">${esc(r.name)}</span>`).join('')
    : '<span class="sub">none</span>';

  return `
    <div class="h2">Lineup · Week ${week}</div>
    <div class="row-between mb">
      <span class="sub">${locked ? '<span class="cell-neg">🔒 Locked</span>' : `Locks in ${lockCountdown(week)}`}</span>
      <span class="sub" style="font-size:.7rem">${SP().label}</span>
    </div>
    ${locked ? `<p class="sub mb" style="font-size:.72rem">This week's lineup is locked. Edit a future week with the arrows.</p>` : ''}
    <div style="max-height:48vh;overflow-y:auto">${slotRows}</div>
    <div class="divlabel mt">Bench</div>
    <div style="line-height:1.8">${benchHtml}</div>
    ${!locked ? `<button class="btn btn-block mt" onclick="saveLineup()">Save lineup</button>` : ''}
    <button class="btn btn-ghost btn-block mt" onclick="closeModal()">${locked?'Close':'Cancel'}</button>
  `;
}

window.assignSlot = function(slotIdx, playerId) {
  window._lineupWork = window._lineupWork || {};
  // if this player is assigned to another slot, clear that one (swap)
  if (playerId) {
    for (const k of Object.keys(window._lineupWork)) {
      if (String(window._lineupWork[k]) === String(playerId)) delete window._lineupWork[k];
    }
    window._lineupWork[slotIdx] = playerId;
  } else {
    delete window._lineupWork[slotIdx];
  }
  // re-render editor to refresh dropdowns (eligibility/used state)
  const week = activeWeek();
  $('modal-body').innerHTML = renderLineupEditor(week, isWeekLocked(week));
};
window.saveLineup = function() {
  const week = activeWeek();
  if (isWeekLocked(week)) { toast('Week is locked', 'err'); return; }
  const tid = myTeamId();
  LG().lineups = LG().lineups || {};

  LG().lineups[tid][week] = { assignments: {...(window._lineupWork||{})} };
  save(); closeModal(); toast('Lineup saved', 'ok'); renderActive();
};

/* ---- pull MLB stats for the user's roster ---- */
window.pullAllStats = async function() {
  const roster = teamRoster(myTeamId()).filter(p => p.mlbId);
  if (!roster.length) { toast('No mapped players on your roster', 'err'); return; }
  toast(`Pulling stats for ${roster.length} players…`);
  LG().gameLogs = LG().gameLogs || {};
  let ok = 0, fail = 0;
  for (const p of roster) {
    try {
      const isPitcher = /SP|RP|P/.test((p.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((p.eligible||[]).join(''));
      const groups = isPitcher ? ['pitching'] : ['hitting'];
      const all = [];
      for (const grp of groups) {
        const log = await mlbGameLog(p.mlbId, grp);
        log.forEach(g => all.push({ ...g, group: grp }));
      }
      LG().gameLogs[p.mlbId] = all;
      ok++;
    } catch(e) { fail++; }
    await new Promise(r=>setTimeout(r,60));
  }
  await save();
  toast(`Stats loaded: ${ok} ok${fail?`, ${fail} failed`:''}`, fail?'err':'ok');
  renderActive();
};

/* ---- settings log ---- */
function slog(msg, kind='pending') {
  const el = $('settings-log'); if (!el) return;
  const ic = kind==='ok'?'✓':kind==='err'?'✗':kind==='run'?'…':'·';
  const col = kind==='ok'?'var(--good)':kind==='err'?'var(--bad)':kind==='run'?'var(--clay)':'var(--sage)';
  if (el.querySelector('.sage') && el.children.length === 1) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend',
    `<div class="log-step"><span class="log-ic" style="color:${col}">${ic}</span><span>${esc(msg)}</span></div>`);
  el.scrollTop = el.scrollHeight;
}

window.manualMap = async function(espnId) {

    const data = await res.json();

    // if no results, try last name only

      people = (await res2.json()).people || [];

window.doPullPool = async function() {
  try {
    const raw = await fetchPlayerPool(slog);
    LG().playerPool = raw.map(pp => {
      const pl = pp.player || pp;
      const order = ['C','1B','2B','3B','SS','OF','DH','SP','RP'];
      const eligMap = SP().eligMap || {};
      // expand each ESPN eligibleSlot to atomic positions, dedupe, order
      const atomic = new Set();
      (pl.eligibleSlots||[]).forEach(slotId => {
        (eligMap[slotId]||[]).forEach(pos => atomic.add(pos));
      });
      // always include the player's default position so eligibility is never empty/wrong
      const defPos = posName(pl.defaultPositionId);
      if (defPos && defPos !== '?') atomic.add(defPos);
      // GUARD (baseball): a player is either a pitcher or a hitter, never both.
      // defaultPositionId 1=SP, 11=RP are the pitcher ids. Use that as truth and
      // strip cross-contamination (prevents "every hitter eligible for SP").
      if (SP().key === 'flb') {
        const isPitcher = pl.defaultPositionId === 1 || pl.defaultPositionId === 11;
        if (isPitcher) {
          ['C','1B','2B','3B','SS','OF','DH'].forEach(h => atomic.delete(h));
          if (!atomic.has('SP') && !atomic.has('RP')) atomic.add(defPos); // ensure has one
        } else {
          atomic.delete('SP'); atomic.delete('RP');
        }
      }
      const eligible = [...atomic].sort((a,b) => order.indexOf(a) - order.indexOf(b));
      const adpRaw = pl.ownership?.averageDraftPosition || 0;
      const adp = (adpRaw > 0) ? adpRaw : 9999;
      return {
        espnId: pl.id,
        name: pl.fullName || `${pl.firstName||''} ${pl.lastName||''}`.trim(),
        pos: defPos,
        defPosId: pl.defaultPositionId,
        eligible: eligible.length ? eligible : [defPos],
        proTeam: proTeamAbbr(pl.proTeamId),
        eligSlots: pl.eligibleSlots || [],   // raw, for re-deriving eligibility later
        adp: Math.round(adp * 10) / 10,
        seasonPts: seasonPointsFromEspn(pl),   // 0 until MLB stats are pulled
        owned: Math.round((pl.ownership?.percentOwned || 0) * 10) / 10,
        injured: !!pl.injured,
        mlbId: null,
      };
    }).filter(p => p.name);

    // sort by ADP (best first), then trim to top 600 relevant players
    LG().playerPool.sort((a,b) => a.adp - b.adp);
    LG().playerPool = LG().playerPool.slice(0, 600);
    const ranked = LG().playerPool.filter(p => p.adp < 9999).length;
    slog(`Stored top ${LG().playerPool.length} players (${ranked} with real ADP)`, 'ok');
    await save({master:true});
    toast('Player pool loaded', 'ok');
    renderActive();
  } catch(e) { slog('Pool fetch failed: ' + e.message, 'err'); toast(e.message, 'err'); }
};

/* Inspect raw ESPN player data — fetches one player and dumps the stat splits
   so we can see exactly what fields hold the season points. */
window.inspectRaw = async function() {
  openModal(`<div class="h2">Raw player inspect</div><div class="spinner"></div>
    <p class="sub" style="text-align:center">Fetching from ESPN…</p>`);
  try {
    const raw = await fetchPlayerPool();
    // find the first player that actually HAS stats, else just the first
    let entry = raw.find(pp => ((pp.player||pp).stats||[]).length > 0) || raw[0];
    const pl = (entry?.player) || entry;
    if (!pl) { $('modal-body').innerHTML = '<p>No players returned at all.</p>'; return; }

    const withStats = raw.filter(pp => ((pp.player||pp).stats||[]).length > 0).length;
    const stats = pl.stats || [];
    const computed = seasonPointsFromEspn(pl);

    // full raw JSON of this one player (trimmed of huge sub-objects)
    const slim = JSON.parse(JSON.stringify(pl));
    if (slim.draftRanksByRankType) slim.draftRanksByRankType = '…';
    const fullJson = JSON.stringify(slim, null, 1);
    window._inspectText = fullJson;

    const statLines = stats.length
      ? stats.map((s,i) => `[${i}] id=${s.id} split=${s.statSplitTypeId} src=${s.statSourceId} szn=${s.seasonId} applied=${s.appliedTotal}`).join('\n')
      : '(this player has NO stats array)';

    openModal(`
      <div class="h2">${esc(pl.fullName||'?')}</div>
      <div class="sub mb">Pool: ${raw.length} players · ${withStats} have stats · we compute: <b class="amber">${computed} pts</b></div>
      <div class="field"><label>Stat splits (looking for id 00${SP().statSeason} or 00${SP().season})</label></div>
      <div class="log" style="max-height:200px">${esc(statLines)}</div>
      <div class="field mt"><label>Full raw player JSON</label></div>
      <div class="log" style="max-height:240px">${esc(fullJson)}</div>
      <button class="btn btn-block mt" onclick="copyText(window._inspectText)">📋 Copy full JSON — paste to me</button>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
    `);
  } catch(e) {
    $('modal-body').innerHTML = `<div class="h2">Inspect failed</div><p class="sub">${esc(e.message)}</p>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>`;
  }
};
window.copyText = function(t) {

/* ============================================================
   SCORING TEST — pull one player's MLB game log and apply our
   scoring so the user can confirm points look right.
   ============================================================ */
window.scoringDiag = async function() {
  const mapped = LG().playerPool.filter(p => p.mlbId);
  if (!mapped.length) { toast('Map players to MLB first (step 2)', 'err'); return; }
  const pick = mapped.slice().sort((a,b)=>a.adp-b.adp)[0];

  openModal(`<div class="h2">Scoring test</div><div class="spinner"></div>
    <p class="sub" style="text-align:center">Pulling ${esc(pick.name)}'s MLB game log…</p>`);

  try {
    const isPitcher = /SP|RP|P/.test((pick.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((pick.eligible||[]).join(''));
    const group = isPitcher ? 'pitching' : 'hitting';
    const log = await mlbGameLog(pick.mlbId, group);
    const recent = log.slice(-10).reverse();

    const logRows = recent.map(g => {
      const pts = gamePoints(g.stat, group);
      const key = group === 'hitting'
        ? `${g.stat.hits||0}H ${g.stat.homeRuns||0}HR ${g.stat.rbi||0}RBI ${g.stat.runs||0}R`
        : `${g.stat.inningsPitched||0}IP ${g.stat.strikeOuts||0}K ${g.stat.earnedRuns||0}ER`;
      return `<tr><td class="pos">${esc(g.date?.slice(5)||'')}</td>
        <td class="sage" style="font-size:.72rem">${esc(g.opp)}</td>
        <td style="font-size:.72rem">${esc(key)}</td>
        <td class="r num cell-best">${pts}</td></tr>`;
    }).join('');

    const seasonTotal = log.reduce((s,g)=>s+gamePoints(g.stat,group),0);
    const bestGame = log.reduce((m,g)=>Math.max(m,gamePoints(g.stat,group)),0);

    openModal(`
      <div class="h2">${esc(pick.name)}</div>
      <div class="sub mb">${group} · ${log.length} games in ${statSeasonNow()}</div>
      <div class="statrow mb">
        <div class="stat"><div class="lbl">Season</div><div class="val amber">${seasonTotal.toFixed(0)}</div></div>
        <div class="stat"><div class="lbl">Best game</div><div class="val amber">${bestGame.toFixed(1)}</div></div>
        <div class="stat"><div class="lbl">Games</div><div class="val">${log.length}</div></div>
      </div>
      <div class="divlabel">Last 10 games — your scoring applied</div>
      <div class="card card-tight" style="max-height:280px;overflow-y:auto">
        <table class="tbl"><thead><tr><th>Date</th><th>Opp</th><th>Key stats</th><th class="r">Pts</th></tr></thead>
        <tbody>${logRows || '<tr><td colspan="4" class="sub">No games found</td></tr>'}</tbody></table>
      </div>
      <p class="sub mt" style="font-size:.72rem">Points off? Edit values in Settings → Scoring system.</p>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
    `);
  } catch(e) {
    openModal(`
      <div class="h2">Scoring test failed</div>
      <p class="cell-neg mt">MLB game log error: ${esc(e.message)}</p>
      <p class="sub" style="font-size:.72rem">Likely ${esc(pick.name)} has no ${statSeasonNow()} games yet,
        or the MLB API is unreachable from your browser.</p>
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
    `);
  }
};

// helpers to mutate the override slot list
function ensureRosterOverride() {
  if (!LG().rosterOverride) {
    LG().rosterOverride = {
      lineupSlots: JSON.parse(JSON.stringify(SP().lineupSlots||[])),
      benchCount: SP().benchCount ?? 5,
      irCount: SP().irCount ?? 0,
    };
  }
}
window.setSlotCount = function(pos, n) {
  ensureRosterOverride();
  n = Math.max(0, parseInt(n)||0);
  let slots = LG().rosterOverride.lineupSlots.filter(s => !(s.slot===pos && s.eligible.length===1 && s.eligible[0]===pos));
  for (let i=0;i<n;i++) slots.push({ slot: pos, eligible: [pos] });
  // keep a sensible order
  LG().rosterOverride.lineupSlots = reorderSlots(slots);
  save({master:false});
};
window.setMultiSlot = function(slotName, n) {
  ensureRosterOverride();
  n = Math.max(0, parseInt(n)||0);
  const eligible = slotName==='P' ? ['SP','RP'] : SP().posFilters.filter(p=>p!=='ALL'&&p!=='SP'&&p!=='RP');
  let slots = LG().rosterOverride.lineupSlots.filter(s => s.slot!==slotName);
  for (let i=0;i<n;i++) slots.push({ slot: slotName, eligible: [...eligible] });
  LG().rosterOverride.lineupSlots = reorderSlots(slots);
  save({master:false});
};
window.setReserve = function(kind, n) {
  ensureRosterOverride();
  n = Math.max(0, parseInt(n)||0);
  if (kind==='bench') LG().rosterOverride.benchCount = n;
  else LG().rosterOverride.irCount = n;
  save({master:false});
};
function reorderSlots(slots) {
  const ord = ['C','1B','2B','3B','SS','OF','DH','P','SP','RP','PG','SG','SF','PF','G','F','UTIL'];
  return slots.slice().sort((a,b)=> ord.indexOf(a.slot)-ord.indexOf(b.slot));
}
window.resetRosterSlots = function() {
  delete LG().rosterOverride;
  save({master:false}); toast('Roster reset to default','ok'); editRosterSlots();
};

/* ---- AUTODRAFT — snake, best available by ADP ---- */
window.autodraft = function() {
  if (LG().teams.length < 2) { toast('Need at least 2 teams', 'err'); return; }
  if (!LG().playerPool.length) { toast('No player pool', 'err'); return; }
  const ROUNDS = SP().rosterSize;
  const teamIds = LG().teams.map(t => t.id);
  const picks = [], taken = new Set();
  const pool = [...LG().playerPool].sort((a,b) => a.adp - b.adp); // best ADP first
  let pickNum = 1;
  for (let round = 0; round < ROUNDS; round++) {
    const order = round % 2 === 0 ? teamIds : [...teamIds].reverse();
    for (const teamId of order) {
      const next = pool.find(p => !taken.has(String(p.espnId)));
      if (!next) break;
      taken.add(String(next.espnId));
      picks.push({ pick: pickNum++, round: round+1, teamId, playerId: next.espnId });
    }
  }
  LG().draft = { started:true, complete:true, order:teamIds, picks, currentPick:picks.length, rounds:ROUNDS, type:'auto' };
  save(); toast(`Autodraft complete — ${picks.length} picks`, 'ok'); go('teams');
};

/* Auto-pull MLB stats on load (once per ~6h) and when a team is chosen.
   Runs silently in the background; refreshes the view when done. */
async function autoPullStats(force) {
  if (!myTeamId()) return;                 // only if user has a team
  const last = LG().lastStatPull || 0;
  const sixHrs = 6*60*60*1000;
  if (!force && (Date.now() - last) < sixHrs) return;  // recently pulled
  const roster = teamRoster(myTeamId()).filter(p => p.mlbId);
  if (!roster.length) return;
  LG().gameLogs = LG().gameLogs || {};
  for (const p of roster) {
    try {
      const isPitcher = /SP|RP/.test((p.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((p.eligible||[]).join(''));
      const grp = isPitcher ? 'pitching' : 'hitting';
      const log = await mlbGameLog(p.mlbId, grp);
      LG().gameLogs[p.mlbId] = log.map(g => ({...g, group: grp}));
    } catch(e) {}
    await new Promise(r=>setTimeout(r,50));
  }
  LG().lastStatPull = Date.now();
  if (STATE.activeLeagueDoc) saveLeague({silent:true}); else saveLocal();
  renderActive();
  // background: resolve team ids + injuries + schedule (non-blocking for the grid)
  refreshTeamMeta();
}

/* resolve each rostered player's MLB team id + current injury status, then
   fetch this week's schedule so the lookahead can show opponents/probables.
   Injury status here is the LIVE source (updates when a player returns). */
async function refreshTeamMeta() {
  if (!myTeamId()) return;
  const roster = teamRoster(myTeamId()).filter(p => p.mlbId);
  // batch people lookup for team id + injury status
  try {
    const ids = roster.map(p => p.mlbId).join(',');
    const res = await fetch(`${MLB}/people?personIds=${ids}&hydrate=currentTeam`);
    if (res.ok) {
      const data = await res.json();
      const byId = {}; (data.people||[]).forEach(person => byId[person.id] = person);
      // update the master pool entries (team id + injury) for these players
      LG().playerPool.forEach(pl => {
        const person = byId[pl.mlbId];
        if (person) {
          pl.mlbTeamId = person.currentTeam?.id || pl.mlbTeamId;
          // MLB marks active roster status; 'active' code is 'A'
          const statusCode = person.currentTeam ? (person.active === false ? 'IL' : '') : '';
          // injury comes from ESPN pull; keep it but let MLB clear obvious returns
          if (person.active === true && pl.injured) pl.injured = false;
        }
      });
    }
  } catch(e) {}
  // fetch schedule for the viewed week
  try { await getWeekSchedule(activeWeek()); } catch(e) {}
  if (STATE.activeLeagueDoc) saveLeague({silent:true}); else saveLocal();
  renderActive();
}
// kick off shortly after load
setTimeout(() => autoPullStats(false), 800);
