<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Best Game League v3.0</title>
<style>
/* ============================================================
   BGL v3.0 — Design System
   Subject: competitive fantasy baseball; hook = best single game/week
   Palette: stadium-at-night
   ============================================================ */
:root {
  --field:    #0d1510;  /* deep field green-black (bg) */
  --field-2:  #131e16;  /* raised surface */
  --field-3:  #1a2a1f;  /* card */
  --line:     #2a3d30;  /* chalk line / border */
  --chalk:    #f5f3ed;  /* primary text */
  --sage:     #7a8a7a;  /* secondary text */
  --sage-dim: #56635a;  /* tertiary */
  --clay:     #d4763a;  /* basepath clay accent */
  --amber:    #f0b429;  /* scoreboard amber = BEST GAME */
  --amber-bg: rgba(240,180,41,.12);
  --good:     #5fae6a;
  --bad:      #d9555a;

  --display: 'Oswald', 'Bebas Neue', system-ui, sans-serif; /* condensed scoreboard */
  --body:    'Inter', system-ui, -apple-system, sans-serif;
  --mono:    'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

  --r: 10px;
  --r-sm: 6px;
}

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--body);
  background: var(--field);
  color: var(--chalk);
  line-height: 1.5;
  font-size: 15px;
  overflow-x: hidden;
  padding-bottom: 80px;
}

/* numbers everywhere read as scoreboard */
.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.display { font-family: var(--display); letter-spacing: .5px; }

/* ---- top bar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,21,16,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: .65rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  font-family: var(--display); font-weight: 700; font-size: 1.4rem;
  letter-spacing: 1px; color: var(--chalk); cursor: pointer;
  display: flex; align-items: baseline; gap: .4rem;
}
.brand .ver { font-size: .55rem; color: var(--sage-dim); letter-spacing: 1px; }
.brand .mark { color: var(--amber); }
.topbar-right { display: flex; align-items: center; gap: .75rem; }
.week-pill {
  font-family: var(--mono); font-size: .72rem; color: var(--sage);
  border: 1px solid var(--line); border-radius: 999px;
  padding: .25rem .7rem;
}
.week-pill b { color: var(--amber); }
.icon-btn {
  background: none; border: none; color: var(--sage); cursor: pointer;
  font-size: 1.2rem; padding: .25rem; line-height: 1;
}

/* ---- bottom nav (mobile-first) ---- */
.botnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,21,16,.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-around;
  padding: .4rem .25rem calc(.4rem + env(safe-area-inset-bottom));
}
.botnav button {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: .15rem;
  color: var(--sage-dim); font-size: .62rem; font-weight: 500;
  padding: .3rem .5rem; border-radius: var(--r-sm);
  transition: color .15s;
  font-family: var(--body);
}
.botnav button .ic { font-size: 1.15rem; line-height: 1; }
.botnav button.active { color: var(--amber); }

/* ---- page container ---- */
.page { padding: 1rem; max-width: 980px; margin: 0 auto; display: none; }
.page.active { display: block; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }

/* ---- section headers ---- */
.eyebrow {
  font-family: var(--mono); font-size: .65rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--clay); margin-bottom: .4rem;
}
.h1 { font-family: var(--display); font-size: 2rem; font-weight: 600; line-height: 1.05; }
.h2 { font-family: var(--display); font-size: 1.35rem; font-weight: 600; margin-bottom: .5rem; }
.sub { color: var(--sage); font-size: .85rem; }

/* ---- cards ---- */
.card {
  background: var(--field-3);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 1rem;
  margin-bottom: 1rem;
}
.card-tight { padding: .75rem; }

/* ---- buttons ---- */
.btn {
  font-family: var(--body); font-weight: 600; font-size: .9rem;
  background: var(--clay); color: #1a0f08; border: none;
  border-radius: var(--r-sm); padding: .6rem 1.1rem; cursor: pointer;
  transition: filter .15s, transform .05s;
}
.btn:active { transform: scale(.98); }
.btn:hover { filter: brightness(1.08); }
.btn-ghost {
  background: transparent; color: var(--chalk);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--clay); color: var(--clay); }
.btn-amber { background: var(--amber); color: #1a1305; }
.btn-sm { padding: .4rem .75rem; font-size: .8rem; }
.btn-block { display: block; width: 100%; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ---- stat chips ---- */
.statrow { display: grid; grid-template-columns: repeat(3,1fr); gap: .6rem; }
.stat {
  background: var(--field-2); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: .7rem .5rem; text-align: center;
}
.stat .lbl { font-family: var(--mono); font-size: .58rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); }
.stat .val { font-family: var(--display); font-size: 1.6rem; color: var(--chalk); line-height: 1.1; }
.stat .val.amber { color: var(--amber); }
.stat .foot { font-size: .6rem; color: var(--sage-dim); }

/* ---- empty state ---- */
.empty {
  text-align: center; padding: 2.5rem 1rem; color: var(--sage);
}
.empty .big { font-size: 2.5rem; margin-bottom: .5rem; opacity: .5; }
.empty .msg { font-size: .9rem; margin-bottom: 1rem; }

/* ---- loading ---- */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--line);
  border-top-color: var(--clay); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 1rem auto;
}
@keyframes spin { to { transform: rotate(360deg);} }

/* ---- log output ---- */
.log {
  background: var(--field); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: .6rem .8rem;
  font-family: var(--mono); font-size: .7rem; line-height: 1.6;
  max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
}
.log-step { display: flex; gap: .5rem; }
.log-ic { flex-shrink: 0; }

/* ---- toast ---- */
.toast-wrap { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: flex; flex-direction: column; gap: .4rem; align-items: center; }
.toast {
  background: var(--field-3); border: 1px solid var(--line);
  border-left: 3px solid var(--clay);
  border-radius: var(--r-sm); padding: .6rem 1rem; font-size: .82rem;
  box-shadow: 0 8px 24px rgba(0,0,0,.4); animation: toastIn .25s ease;
  max-width: 90vw;
}
.toast.err { border-left-color: var(--bad); }
.toast.ok { border-left-color: var(--good); }
@keyframes toastIn { from { opacity:0; transform: translateY(8px);} to {opacity:1;transform:none;} }

/* ---- modal ---- */
.modal-bg {
  position: fixed; inset: 0; z-index: 300; display: none;
  background: rgba(5,8,6,.7); backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--field-2); border: 1px solid var(--line);
  border-radius: var(--r) var(--r) 0 0; width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto; padding: 1.25rem;
  animation: sheetUp .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes sheetUp { from { transform: translateY(100%);} to {transform:none;} }
@media (min-width: 600px) {
  .modal-bg { align-items: center; }
  .modal { border-radius: var(--r); }
}

/* ---- forms ---- */
.field { margin-bottom: .9rem; }
.field label { display: block; font-family: var(--mono); font-size: .62rem;
  letter-spacing: 1px; text-transform: uppercase; color: var(--sage); margin-bottom: .3rem; }
.input, .select {
  width: 100%; background: var(--field); color: var(--chalk);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: .55rem .7rem; font-family: var(--body); font-size: .9rem;
}
.input:focus, .select:focus { outline: none; border-color: var(--clay); }

/* ---- tables ---- */
.tbl { width: 100%; border-collapse: collapse; font-size: .82rem; }
.tbl th { font-family: var(--mono); font-size: .58rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); text-align: left;
  padding: .4rem .5rem; border-bottom: 1px solid var(--line); }
.tbl th.r, .tbl td.r { text-align: right; }
.tbl td { padding: .45rem .5rem; border-bottom: 1px solid rgba(42,61,48,.4); }
.tbl tr:last-child td { border-bottom: none; }
.tbl .pos { font-family: var(--mono); font-size: .68rem; color: var(--sage); width: 38px; }
.cell-best { color: var(--amber); font-weight: 700; }
.cell-zero { color: var(--sage-dim); }
.cell-neg { color: var(--bad); }

/* player link */
.plink { color: inherit; cursor: pointer; border-bottom: 1px dashed var(--sage-dim); }
.plink:hover { color: var(--amber); border-color: var(--amber); }

/* divider label */
.divlabel { font-family: var(--mono); font-size: .6rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); text-align: center;
  margin: .75rem 0 .5rem; }

.hide { display: none !important; }
.row { display: flex; gap: .6rem; flex-wrap: wrap; }
.row-between { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
.mt { margin-top: 1rem; } .mb { margin-bottom: 1rem; }
.amber { color: var(--amber); } .clay { color: var(--clay); } .sage { color: var(--sage); }
</style>
</head>
<body>

<!-- ============ TOP BAR ============ -->
<div class="topbar">
  <div class="brand" onclick="go('home')">
    <span>BGL<span class="mark">.</span></span>
    <span class="ver">v3.0</span>
  </div>
  <div class="topbar-right">
    <span class="week-pill">WK <b id="wk-label">—</b></span>
    <button class="icon-btn" onclick="go('settings')" title="Settings">⚙</button>
  </div>
</div>

<!-- ============ PAGES ============ -->
<div id="page-home" class="page active"></div>
<div id="page-draft" class="page"></div>
<div id="page-standings" class="page"></div>
<div id="page-matchups" class="page"></div>
<div id="page-teams" class="page"></div>
<div id="page-players" class="page"></div>
<div id="page-settings" class="page"></div>

<!-- ============ BOTTOM NAV ============ -->
<div class="botnav">
  <button data-nav="home" onclick="go('home')"><span class="ic">⌂</span>Home</button>
  <button data-nav="standings" onclick="go('standings')"><span class="ic">▦</span>Standings</button>
  <button data-nav="matchups" onclick="go('matchups')"><span class="ic">⚔</span>Matchups</button>
  <button data-nav="players" onclick="go('players')"><span class="ic">◎</span>Players</button>
  <button data-nav="teams" onclick="go('teams')"><span class="ic">⛨</span>Teams</button>
</div>

<div class="toast-wrap" id="toasts"></div>

<!-- generic modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

/* ============================================================
   CONFIG
   ============================================================ */
const FB_CONFIG = {
  apiKey: "REPLACE_WITH_YOUR_API_KEY",
  authDomain: "REPLACE.firebaseapp.com",
  projectId: "REPLACE",
  storageBucket: "REPLACE.appspot.com",
  messagingSenderId: "REPLACE",
  appId: "REPLACE"
};

const ESPN_LEAGUE_ID = '69029411';
const SEASON = 2026;
const MLB_SEASON = 2025; // MLB stat season (2026 may not have started; configurable)
const ADMIN_PIN = '2325';

/* ============================================================
   STATE
   ============================================================ */
const STATE = {
  // league meta
  leagueName: 'Best Game League',
  currentWeek: 1,
  sport: 'flb',

  // teams created in-app (NOT from ESPN)
  teams: [],            // [{id, name, owner, abbrev}]

  // draft
  draft: {
    started: false,
    complete: false,
    order: [],          // [teamId, teamId, ...] snake order resolved
    picks: [],          // [{pick, teamId, playerId}]
    currentPick: 0,
  },

  // player pool from ESPN (the ONLY thing we use ESPN rosters/pool for)
  playerPool: [],       // [{espnId, name, mlbId, pos, eligible[], proTeam}]

  // scoring rules from ESPN
  scoringRules: null,   // {statId: pointValue}

  // computed stats from MLB API: stats[playerId][date] = {raw, points}
  stats: {},

  // weekly best-game results: weekly[week][teamId] = {score, breakdown[]}
  weekly: {},

  // id mapping overrides (name->mlbId) for edge cases
  idOverrides: {},

  _loaded: false,
};

let db = null, fbReady = false, fbErr = null;

/* ============================================================
   FIREBASE
   ============================================================ */
function initFirebase() {
  if (FB_CONFIG.apiKey.startsWith('REPLACE')) {
    fbErr = 'Firebase not configured';
    return;
  }
  try {
    const app = initializeApp(FB_CONFIG);
    db = getFirestore(app);
    fbReady = true;
    // live sync
    onSnapshot(doc(db, 'leagues', ESPN_LEAGUE_ID), (snap) => {
      if (snap.exists() && snap.data().state) {
        const incoming = snap.data().state;
        // shallow-merge to avoid clobbering local-only fields mid-edit
        Object.assign(STATE, incoming);
        STATE._loaded = true;
        renderActive();
      }
    }, (e) => { fbErr = e.message; });
  } catch(e) { fbErr = e.message; }
}

async function save() {
  if (!fbReady) { toast('Not saved — Firebase offline', 'err'); return; }
  try {
    const payload = {...STATE}; delete payload._loaded;
    await setDoc(doc(db, 'leagues', ESPN_LEAGUE_ID), { state: payload, ts: Date.now() });
  } catch(e) { toast('Save failed: ' + e.message, 'err'); }
}

/* ============================================================
   UTILITIES
   ============================================================ */
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function $(id) { return document.getElementById(id); }
function teamById(id) { return STATE.teams.find(t => String(t.id) === String(id)) || {name:'?', abbrev:'?'}; }

function toast(msg, kind='') {
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function openModal(html) { $('modal-body').innerHTML = html; $('modal').classList.add('open'); }
window.closeModal = () => $('modal').classList.remove('open');

/* normalize a player name for matching: lowercase, strip accents, punctuation, suffixes */
function normName(name) {
  return String(name || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // strip accents
    .toLowerCase()
    .replace(/\b(jr|sr|ii|iii|iv)\b\.?/g, '')            // strip suffixes
    .replace(/[^a-z\s]/g, '')                             // strip punctuation
    .replace(/\s+/g, ' ').trim();
}

/* ============================================================
   ESPN API — player pool + scoring rules ONLY
   ============================================================ */
function espnUrl(params) {
  return `https://lm-api-reads.fantasy.espn.com/apis/v3/games/flb/seasons/${SEASON}/segments/0/leagues/${ESPN_LEAGUE_ID}?${params}`;
}

async function espnFetch(params) {
  const res = await fetch(espnUrl(params), { headers: { 'X-Fantasy-Filter': '{}' } });
  if (!res.ok) throw new Error('ESPN HTTP ' + res.status);
  return res.json();
}

/* Pull the full draftable player pool from ESPN's player info endpoint */
async function fetchPlayerPool(logFn) {
  logFn?.('Fetching ESPN player pool…', 'run');
  // ESPN players_wl endpoint returns the full player universe
  const url = `https://lm-api-reads.fantasy.espn.com/apis/v3/games/flb/seasons/${SEASON}/players?scoringPeriodId=0&view=players_wl`;
  const res = await fetch(url, {
    headers: {
      'X-Fantasy-Filter': JSON.stringify({
        players: {
          limit: 1500,
          sortPercOwned: { sortAsc: false, sortPriority: 1 }
        }
      })
    }
  });
  if (!res.ok) throw new Error('ESPN player pool HTTP ' + res.status);
  const data = await res.json();
  const players = Array.isArray(data) ? data : (data.players || []);
  logFn?.(`Got ${players.length} players from ESPN`, 'ok');
  return players;
}

/* Pull scoring rules from ESPN league settings */
async function fetchScoringRules(logFn) {
  logFn?.('Fetching scoring rules…', 'run');
  const data = await espnFetch('view=mSettings');
  const items = data.settings?.scoringSettings?.scoringItems || [];
  const rules = {};
  items.forEach(it => {
    // points = the per-unit value for this stat
    rules[it.statId] = it.points ?? (it.pointsOverrides ? Object.values(it.pointsOverrides)[0] : 0);
  });
  logFn?.(`Got ${items.length} scoring rules`, 'ok');
  return rules;
}

/* ============================================================
   MLB STATS API — the source of truth for game stats
   (runs in browser; not testable from build env but API is stable)
   ============================================================ */
const MLB = 'https://statsapi.mlb.com/api/v1';

/* search MLB for a player by name → returns best mlbId match */
async function mlbLookup(name) {
  const q = encodeURIComponent(name);
  const res = await fetch(`${MLB}/people/search?names=${q}`);
  if (!res.ok) return null;
  const data = await res.json();
  const people = data.people || [];
  if (!people.length) return null;
  // exact normalized match first
  const target = normName(name);
  const exact = people.find(p => normName(p.fullName) === target);
  return (exact || people[0]).id;
}

/* ============================================================
   ID MAPPING — bridge ESPN players ↔ MLB players
   Strategy: name match + override table; cache results
   ============================================================ */
async function resolveMlbIds(logFn) {
  logFn?.('Mapping ESPN players to MLB IDs…', 'run');
  let mapped = 0, failed = 0;
  const failures = [];
  for (const p of STATE.playerPool) {
    if (p.mlbId) { mapped++; continue; }          // already mapped
    if (STATE.idOverrides[normName(p.name)]) {     // manual override
      p.mlbId = STATE.idOverrides[normName(p.name)];
      mapped++; continue;
    }
    try {
      const id = await mlbLookup(p.name);
      if (id) { p.mlbId = id; mapped++; }
      else { failed++; failures.push(p.name); }
    } catch { failed++; failures.push(p.name); }
    await new Promise(r => setTimeout(r, 40)); // be gentle on MLB API
  }
  logFn?.(`Mapped ${mapped}, failed ${failed}`, failed ? 'err' : 'ok');
  if (failures.length) logFn?.('Unmapped: ' + failures.slice(0,10).join(', ') + (failures.length>10?'…':''), 'pending');
  return { mapped, failed, failures };
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const PAGES = ['home','draft','standings','matchups','teams','players','settings'];
let activePage = 'home';

window.go = function(page) {
  activePage = page;
  PAGES.forEach(p => $('page-' + p)?.classList.toggle('active', p === page));
  document.querySelectorAll('.botnav button').forEach(b =>
    b.classList.toggle('active', b.dataset.nav === page));
  window.scrollTo(0, 0);
  renderActive();
};

function renderActive() { renderPage(activePage); }

function renderPage(page) {
  const el = $('page-' + page);
  if (!el) return;
  switch(page) {
    case 'home':      el.innerHTML = viewHome(); break;
    case 'draft':     el.innerHTML = viewDraft(); break;
    case 'standings': el.innerHTML = viewStandings(); break;
    case 'matchups':  el.innerHTML = viewMatchups(); break;
    case 'teams':     el.innerHTML = viewTeams(); break;
    case 'players':   el.innerHTML = viewPlayers(); break;
    case 'settings':  el.innerHTML = viewSettings(); break;
  }
  $('wk-label').textContent = STATE.currentWeek || '—';
}

/* ============================================================
   VIEWS (Phase 1 — shells; filled in later phases)
   ============================================================ */
function viewHome() {
  const haveTeams = STATE.teams.length > 0;
  const haveDraft = STATE.draft.complete;
  const havePool  = STATE.playerPool.length > 0;

  return `
    <div class="eyebrow">${esc(STATE.leagueName)}</div>
    <div class="h1">Best game<br>of the week.</div>
    <p class="sub mt">Each week, only your starters count — and only their single
      best game. Highest weekly total wins.</p>

    <div class="card mt">
      <div class="h2">Setup checklist</div>
      ${checkRow('League connected', havePool, 'Pull player pool & rules in Settings')}
      ${checkRow('Teams created', haveTeams, 'Add teams in Settings')}
      ${checkRow('Draft complete', haveDraft, haveTeams ? 'Run the draft' : 'Create teams first')}
    </div>

    ${!havePool ? `
      <div class="card">
        <div class="h2">Get started</div>
        <p class="sub mb">First, pull the player pool and scoring rules from ESPN.
          This is the only thing we use ESPN for — all game stats come from MLB.</p>
        <button class="btn btn-block" onclick="go('settings')">Open Settings →</button>
      </div>` : ''}

    ${havePool && !haveDraft ? `
      <div class="card">
        <div class="h2">Ready to draft</div>
        <p class="sub mb">${STATE.playerPool.length} players available.</p>
        <button class="btn btn-amber btn-block" onclick="go('draft')">Go to Draft →</button>
      </div>` : ''}

    ${haveDraft ? `
      <div class="row">
        <button class="btn btn-amber" onclick="go('standings')">Standings</button>
        <button class="btn btn-ghost" onclick="go('matchups')">This week</button>
      </div>` : ''}
  `;
}

function checkRow(label, done, hint) {
  return `<div class="row-between" style="padding:.5rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
    <div>
      <span style="color:${done?'var(--good)':'var(--sage-dim)'}">${done?'✓':'○'}</span>
      <span style="margin-left:.5rem">${esc(label)}</span>
    </div>
    ${!done ? `<span class="sub" style="font-size:.72rem">${esc(hint)}</span>` : ''}
  </div>`;
}

function viewDraft()     { return placeholderView('Draft', 'Snake draft from the ESPN player pool. Built in Phase 2.'); }
function viewStandings() { return placeholderView('Standings', 'Win/loss records from weekly best-game matchups. Built in Phase 4.'); }
function viewMatchups()  { return placeholderView('Matchups', 'Weekly head-to-head with daily best-game breakdowns. Built in Phase 4.'); }
function viewTeams()     { return placeholderView('Teams', 'Rosters and team pages. Built in Phase 2.'); }
function viewPlayers()   { return viewPlayersReal(); }

function placeholderView(title, msg) {
  return `<div class="eyebrow">Coming together</div>
    <div class="h1">${esc(title)}</div>
    <div class="empty"><div class="big">⚾</div><div class="msg">${esc(msg)}</div></div>`;
}

/* Players view works in Phase 1 once pool is loaded — proves the data layer */
function viewPlayersReal() {
  if (!STATE.playerPool.length) {
    return `<div class="h1">Players</div>
      <div class="empty"><div class="big">◎</div>
      <div class="msg">No player pool yet. Pull it from ESPN in Settings.</div>
      <button class="btn" onclick="go('settings')">Open Settings</button></div>`;
  }
  const mappedCount = STATE.playerPool.filter(p => p.mlbId).length;
  const rows = STATE.playerPool.slice(0, 100).map(p => `
    <tr>
      <td><span class="plink" onclick="showPlayer('${p.espnId}')">${esc(p.name)}</span></td>
      <td class="pos">${esc((p.eligible||[]).join('/') || p.pos || '?')}</td>
      <td class="pos">${esc(p.proTeam || '')}</td>
      <td class="r num" style="font-size:.7rem;color:${p.mlbId?'var(--good)':'var(--bad)'}">
        ${p.mlbId ? 'MLB✓' : '—'}</td>
    </tr>`).join('');

  return `
    <div class="eyebrow">Player pool</div>
    <div class="h1">Players</div>
    <div class="statrow mt mb">
      <div class="stat"><div class="lbl">In pool</div><div class="val">${STATE.playerPool.length}</div></div>
      <div class="stat"><div class="lbl">MLB linked</div><div class="val amber">${mappedCount}</div></div>
      <div class="stat"><div class="lbl">Unlinked</div><div class="val">${STATE.playerPool.length - mappedCount}</div></div>
    </div>
    <div class="card card-tight">
      <table class="tbl">
        <thead><tr><th>Player</th><th>Pos</th><th>Team</th><th class="r">MLB</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${STATE.playerPool.length > 100 ? `<div class="divlabel">showing first 100 of ${STATE.playerPool.length}</div>` : ''}
    </div>`;
}

window.showPlayer = function(espnId) {
  const p = STATE.playerPool.find(x => String(x.espnId) === String(espnId));
  if (!p) return;
  openModal(`
    <div class="h2">${esc(p.name)}</div>
    <div class="sub mb">${esc((p.eligible||[]).join(', '))} · ${esc(p.proTeam||'')}</div>
    <table class="tbl mt">
      <tr><td class="sage">ESPN ID</td><td class="r num">${esc(p.espnId)}</td></tr>
      <tr><td class="sage">MLB ID</td><td class="r num">${p.mlbId ? esc(p.mlbId) : '<span class="cell-neg">not linked</span>'}</td></tr>
      <tr><td class="sage">Default pos</td><td class="r">${esc(p.pos||'?')}</td></tr>
    </table>
    <p class="sub mt">Game-by-game stats load in Phase 3 (from MLB API).</p>
    <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Close</button>
  `);
};

/* ============================================================
   SETTINGS — the control center (Phase 1 functional)
   ============================================================ */
function viewSettings() {
  const havePool = STATE.playerPool.length > 0;
  const haveRules = STATE.scoringRules && Object.keys(STATE.scoringRules).length > 0;
  return `
    <div class="eyebrow">Control center</div>
    <div class="h1">Settings</div>

    <div class="card mt">
      <div class="h2">1 · Connect ESPN</div>
      <p class="sub mb">Pull the player pool and scoring rules. League ID
        <span class="num">${ESPN_LEAGUE_ID}</span>, season <span class="num">${SEASON}</span>.</p>
      <div class="row">
        <button class="btn" onclick="doPullPool()">Pull player pool</button>
        <button class="btn btn-ghost" onclick="doPullRules()">Pull scoring rules</button>
      </div>
      <div class="row mt">
        <span class="sub">${havePool ? `✓ ${STATE.playerPool.length} players` : '○ no pool yet'}</span>
        <span class="sub">${haveRules ? `✓ ${Object.keys(STATE.scoringRules).length} rules` : '○ no rules yet'}</span>
      </div>
    </div>

    <div class="card">
      <div class="h2">2 · Link MLB stats</div>
      <p class="sub mb">Match each ESPN player to their MLB ID so we can pull real
        box scores. Runs after the pool is loaded.</p>
      <button class="btn ${havePool?'':'btn-ghost'}" onclick="doMapIds()" ${havePool?'':'disabled'}>
        Map players to MLB</button>
    </div>

    <div class="card">
      <div class="h2">3 · Teams</div>
      <p class="sub mb">Create the teams in your league. You'll draft players to them next.</p>
      <button class="btn btn-ghost" onclick="manageTeams()">Manage teams (${STATE.teams.length})</button>
    </div>

    <div class="card">
      <div class="h2">Activity</div>
      <div class="log" id="settings-log"><span class="sage">Ready.</span></div>
    </div>

    <div class="card">
      <div class="h2">Data</div>
      <div class="row">
        <button class="btn btn-ghost btn-sm" onclick="save().then(()=>toast('Saved','ok'))">Force save</button>
        <button class="btn btn-ghost btn-sm" onclick="dumpState()">Export JSON</button>
      </div>
      <p class="sub mt" style="font-size:.72rem">
        Firebase: ${fbReady ? '<span class="amber">connected</span>' : esc(fbErr||'offline')}</p>
    </div>
  `;
}

/* ---- settings log ---- */
function slog(msg, kind='pending') {
  const el = $('settings-log'); if (!el) return;
  const ic = kind==='ok'?'✓':kind==='err'?'✗':kind==='run'?'…':'·';
  const col = kind==='ok'?'var(--good)':kind==='err'?'var(--bad)':kind==='run'?'var(--clay)':'var(--sage)';
  if (el.querySelector('.sage') && el.children.length === 1) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend',
    `<div class="log-step"><span class="log-ic" style="color:${col}">${ic}</span><span>${esc(msg)}</span></div>`);
  el.scrollTop = el.scrollHeight;
}

/* ---- settings actions ---- */
window.doPullPool = async function() {
  try {
    const raw = await fetchPlayerPool(slog);
    STATE.playerPool = raw.map(pp => {
      const pl = pp.player || pp;
      return {
        espnId: pl.id,
        name: pl.fullName || `${pl.firstName||''} ${pl.lastName||''}`.trim(),
        pos: posName(pl.defaultPositionId),
        eligible: (pl.eligibleSlots||[]).map(slotName).filter(Boolean),
        proTeam: proTeamAbbr(pl.proTeamId),
        mlbId: null,
      };
    }).filter(p => p.name);
    slog(`Stored ${STATE.playerPool.length} players`, 'ok');
    await save();
    toast('Player pool loaded', 'ok');
    renderActive();
  } catch(e) { slog('Pool fetch failed: ' + e.message, 'err'); toast(e.message, 'err'); }
};

window.doPullRules = async function() {
  try {
    STATE.scoringRules = await fetchScoringRules(slog);
    await save();
    toast('Scoring rules loaded', 'ok');
    renderActive();
  } catch(e) { slog('Rules fetch failed: ' + e.message, 'err'); toast(e.message, 'err'); }
};

window.doMapIds = async function() {
  try {
    const r = await resolveMlbIds(slog);
    await save();
    toast(`Mapped ${r.mapped}, ${r.failed} failed`, r.failed ? 'err' : 'ok');
    renderActive();
  } catch(e) { slog('Mapping failed: ' + e.message, 'err'); toast(e.message, 'err'); }
};

window.dumpState = function() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bgl-state.json'; a.click();
  URL.revokeObjectURL(url);
};

/* ---- team management (basic; expanded in Phase 2) ---- */
window.manageTeams = function() {
  const rows = STATE.teams.map((t,i) => `
    <div class="row-between" style="padding:.4rem 0;border-bottom:1px solid rgba(42,61,48,.4)">
      <span>${esc(t.name)} <span class="sub">· ${esc(t.owner||'')}</span></span>
      <button class="btn btn-ghost btn-sm" onclick="removeTeam('${t.id}')">Remove</button>
    </div>`).join('') || '<p class="sub">No teams yet.</p>';
  openModal(`
    <div class="h2">Teams</div>
    <div class="mt mb">${rows}</div>
    <div class="field"><label>Team name</label><input class="input" id="nt-name" placeholder="The Sandlot"></div>
    <div class="field"><label>Owner</label><input class="input" id="nt-owner" placeholder="Name"></div>
    <button class="btn btn-block" onclick="addTeam()">Add team</button>
    <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Done</button>
  `);
};
window.addTeam = function() {
  const name = $('nt-name').value.trim();
  const owner = $('nt-owner').value.trim();
  if (!name) { toast('Enter a team name', 'err'); return; }
  STATE.teams.push({ id: 't' + Date.now(), name, owner, abbrev: name.slice(0,3).toUpperCase() });
  save(); manageTeams(); toast('Team added', 'ok');
};
window.removeTeam = function(id) {
  STATE.teams = STATE.teams.filter(t => String(t.id) !== String(id));
  save(); manageTeams();
};

/* ============================================================
   ESPN ID → label maps (baseball, confirmed from prior work)
   ============================================================ */
function posName(id) {
  return ({1:'SP',2:'C',3:'1B',4:'2B',5:'3B',6:'SS',7:'OF',8:'OF',9:'OF',10:'DH',11:'RP'})[id] || '?';
}
function slotName(id) {
  const m = {0:'C',1:'1B',2:'2B',3:'3B',4:'SS',5:'OF',6:'2B/SS',7:'1B/3B',8:'OF',9:'OF',
             10:'DH',11:'UTIL',12:'SP',13:'RP',14:'P'};
  // skip bench/IL slots 16,17
  if (id === 16 || id === 17) return null;
  return m[id] || null;
}
function proTeamAbbr(id) {
  const m = {0:'FA',1:'BAL',2:'BOS',3:'LAA',4:'CWS',5:'CLE',6:'DET',7:'KC',8:'MIL',9:'MIN',
    10:'NYY',11:'OAK',12:'SEA',13:'TEX',14:'TOR',15:'ATL',16:'CHC',17:'CIN',18:'HOU',19:'LAD',
    20:'WSH',21:'NYM',22:'PHI',23:'PIT',24:'STL',25:'SD',26:'SF',27:'COL',28:'MIA',29:'ARI',30:'TB'};
  return m[id] || '';
}

/* ============================================================
   BOOT
   ============================================================ */
initFirebase();
go('home');
// if firebase is offline, still render so the app is usable
if (!fbReady) setTimeout(() => { if (!STATE._loaded) renderActive(); }, 300);
</script>
</body>
</html>
