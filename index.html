<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Best Game League v7.1</title>
<style>
/* ============================================================
   BGL v7.1 — Design System
   Subject: competitive fantasy baseball; hook = best single game/week
   Palette: stadium-at-night
   ============================================================ */
:root {
  --field:    #0d1510;  /* deep field green-black (bg) */
  --field-2:  #131e16;  /* raised surface */
  --field-3:  #1a2a1f;  /* card */
  --line:     #2a3d30;  /* chalk line / border */
  --chalk:    #f5f3ed;  /* primary text */
  --sage:     #7a8a7a;  /* secondary text */
  --sage-dim: #56635a;  /* tertiary */
  --clay:     #d4763a;  /* basepath clay accent */
  --amber:    #f0b429;  /* scoreboard amber = BEST GAME */
  --amber-bg: rgba(240,180,41,.12);
  --good:     #5fae6a;
  --bad:      #d9555a;

  --display: 'Oswald', 'Bebas Neue', system-ui, sans-serif; /* condensed scoreboard */
  --body:    'Inter', system-ui, -apple-system, sans-serif;
  --mono:    'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

  --r: 10px;
  --r-sm: 6px;
}

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--body);
  background: var(--field);
  color: var(--chalk);
  line-height: 1.5;
  font-size: 15px;
  overflow-x: hidden;
  padding-bottom: 80px;
}

/* numbers everywhere read as scoreboard */
.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.display { font-family: var(--display); letter-spacing: .5px; }

/* ---- top bar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,21,16,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: .65rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  font-family: var(--display); font-weight: 700; font-size: 1.4rem;
  letter-spacing: 1px; color: var(--chalk); cursor: pointer;
  display: flex; align-items: baseline; gap: .4rem;
}
.brand .ver { font-size: .55rem; color: var(--sage-dim); letter-spacing: 1px; }
.brand .mark { color: var(--amber); }
.topbar-right { display: flex; align-items: center; gap: .75rem; }
.week-pill {
  font-family: var(--mono); font-size: .72rem; color: var(--sage);
  border: 1px solid var(--line); border-radius: 999px;
  padding: .25rem .7rem;
}
.week-pill b { color: var(--amber); }
.league-chip {
  font-family: var(--body); font-size: .68rem; font-weight: 600; color: var(--chalk);
  background: var(--field-3); border: 1px solid var(--line); border-radius: 999px;
  padding: .25rem .65rem; cursor: pointer; max-width: 140px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; transition: border-color .15s;
}
.league-chip:hover { border-color: var(--amber); }
.league-chip:empty { display: none; }
.icon-btn {
  background: none; border: none; color: var(--sage); cursor: pointer;
  font-size: 1.2rem; padding: .25rem; line-height: 1;
}

/* ---- bottom nav (mobile-first) ---- */
.botnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,21,16,.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-around;
  padding: .55rem .25rem calc(.55rem + env(safe-area-inset-bottom));
}
.botnav button {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: .25rem;
  color: var(--sage-dim); font-size: .72rem; font-weight: 600;
  padding: .5rem .65rem; border-radius: var(--r-sm);
  transition: color .15s, background .15s;
  font-family: var(--body); min-width: 60px;
}
.botnav button .ic { font-size: 1.5rem; line-height: 1; }
.botnav button.active { color: var(--amber); }
.botnav button.active .ic { transform: scale(1.05); }

/* daily scoring grid */
.daygrid { display: grid; gap: 2px; font-family: var(--mono); }
.daygrid .dcell {
  text-align: center; padding: .35rem .2rem; border-radius: 4px;
  background: var(--field-2); font-size: .8rem; cursor: pointer;
  border: 1px solid transparent;
}
.daygrid .dcell.best { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); font-weight: 700; }
.daygrid .dcell.dnf { color: var(--sage-dim); opacity: .5; }
.daygrid .dcell.upcoming { background: var(--field); border: 1px dashed var(--line);
  display: flex; flex-direction: column; justify-content: center; padding: .2rem 0; }
.daygrid .dcell.neg { color: var(--bad); }
.daygrid .dhead { text-align: center; font-size: .58rem; color: var(--sage-dim);
  text-transform: uppercase; padding: .2rem 0; }
.pcard { background: var(--field-3); border: 1px solid var(--line);
  border-radius: var(--r); padding: .75rem; margin-bottom: .6rem; }
.pcard.bench { opacity: .72; border-style: dashed; }
.starter-badge { font-size: .55rem; font-family: var(--mono); letter-spacing: 1px;
  padding: .1rem .4rem; border-radius: 3px; text-transform: uppercase; }
.starter-badge.s { background: var(--amber); color: #1a1305; }
.starter-badge.b { background: var(--field); color: var(--sage); border: 1px solid var(--line); }
.il-badge { font-size: .55rem; font-family: var(--mono); letter-spacing: 1px;
  padding: .1rem .35rem; border-radius: 3px; background: var(--bad); color: #fff;
  font-weight: 700; margin-left: .3rem; }
.ps-tag { font-size: .5rem; font-family: var(--mono); color: var(--good);
  font-weight: 700; display: block; margin-top: 1px; }
.opp-tag { font-size: .5rem; color: var(--sage-dim); display: block; }

/* ---- draft room ---- */
.draft-timer { font-family: var(--mono); font-size: 2.6rem; font-weight: 800; color: var(--chalk); letter-spacing: 1px; }
.draft-timer.urgent { color: var(--bad); animation: pulse .8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.on-clock-mine { border-color: var(--amber) !important; box-shadow: 0 0 0 1px var(--amber); }
.draft-order-strip { display: flex; gap: .4rem; overflow-x: auto; padding-bottom: .5rem; }
.draft-team { flex: 0 0 auto; min-width: 88px; background: var(--field-2); border: 1px solid var(--line);
  border-radius: 8px; padding: .4rem .5rem; text-align: center; position: relative; }
.draft-team.now { border-color: var(--amber); background: var(--amber-bg); }
.draft-team.next { border-color: var(--sage); }
.draft-team .dt-pos { font-family: var(--mono); font-size: .6rem; color: var(--sage-dim); display: block; }
.draft-team .dt-name { font-size: .72rem; font-weight: 600; color: var(--chalk); display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
.draft-team .dt-tag { font-size: .52rem; font-family: var(--mono); color: var(--amber); text-transform: uppercase; letter-spacing: 1px; }
.draft-team .dt-tag.next { color: var(--sage); }
.draft-pick-row .btn { flex: 0 0 auto; }

/* ---- page container ---- */
.page { padding: 1rem; max-width: 980px; margin: 0 auto; display: none; }
.page.active { display: block; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }

/* ---- section headers ---- */
.eyebrow {
  font-family: var(--mono); font-size: .65rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--clay); margin-bottom: .4rem;
}
.h1 { font-family: var(--display); font-size: 2rem; font-weight: 600; line-height: 1.05; }
.h2 { font-family: var(--display); font-size: 1.35rem; font-weight: 600; margin-bottom: .5rem; }
.sub { color: var(--sage); font-size: .85rem; }

/* ---- cards ---- */
.card {
  background: var(--field-3);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 1rem;
  margin-bottom: 1rem;
}
.card-tight { padding: .75rem; }

/* ---- buttons ---- */
.btn {
  font-family: var(--body); font-weight: 600; font-size: .9rem;
  background: var(--clay); color: #1a0f08; border: none;
  border-radius: var(--r-sm); padding: .6rem 1.1rem; cursor: pointer;
  transition: filter .15s, transform .05s;
}
.btn:active { transform: scale(.98); }
.btn:hover { filter: brightness(1.08); }
.btn-ghost {
  background: transparent; color: var(--chalk);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--clay); color: var(--clay); }
.btn-amber { background: var(--amber); color: #1a1305; }
.btn-sm { padding: .4rem .75rem; font-size: .8rem; }
.btn-block { display: block; width: 100%; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ---- stat chips ---- */
.statrow { display: grid; grid-template-columns: repeat(3,1fr); gap: .6rem; }
.stat {
  background: var(--field-2); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: .7rem .5rem; text-align: center;
}
.stat .lbl { font-family: var(--mono); font-size: .58rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); }
.stat .val { font-family: var(--display); font-size: 1.6rem; color: var(--chalk); line-height: 1.1; }
.stat .val.amber { color: var(--amber); }
.stat .foot { font-size: .6rem; color: var(--sage-dim); }

/* ---- empty state ---- */
.empty {
  text-align: center; padding: 2.5rem 1rem; color: var(--sage);
}
.empty .big { font-size: 2.5rem; margin-bottom: .5rem; opacity: .5; }
.empty .msg { font-size: .9rem; margin-bottom: 1rem; }

/* ---- loading ---- */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--line);
  border-top-color: var(--clay); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 1rem auto;
}
@keyframes spin { to { transform: rotate(360deg);} }
.spinner-inline {
  display: inline-block; width: 12px; height: 12px; border: 2px solid var(--line);
  border-top-color: var(--amber); border-radius: 50%; vertical-align: middle;
  animation: spin .7s linear infinite; margin-right: .4rem;
}

/* ---- log output ---- */
.log {
  background: var(--field); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: .6rem .8rem;
  font-family: var(--mono); font-size: .7rem; line-height: 1.6;
  max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
}
.log-step { display: flex; gap: .5rem; }
.log-ic { flex-shrink: 0; }

/* ---- toast ---- */
.toast-wrap { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: flex; flex-direction: column; gap: .4rem; align-items: center; }
.toast {
  background: var(--field-3); border: 1px solid var(--line);
  border-left: 3px solid var(--clay);
  border-radius: var(--r-sm); padding: .6rem 1rem; font-size: .82rem;
  box-shadow: 0 8px 24px rgba(0,0,0,.4); animation: toastIn .25s ease;
  max-width: 90vw;
}
.toast.err { border-left-color: var(--bad); }
.toast.ok { border-left-color: var(--good); }
@keyframes toastIn { from { opacity:0; transform: translateY(8px);} to {opacity:1;transform:none;} }

/* ---- modal ---- */
.modal-bg {
  position: fixed; inset: 0; z-index: 300; display: none;
  background: rgba(5,8,6,.7); backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }

/* blocking gate — sits above everything, app can't be used until passed */
.gate {
  position: fixed; inset: 0; z-index: 500;
  background: var(--field); display: flex;
  align-items: center; justify-content: center; padding: 1.5rem;
}
.gate-inner {
  width: 100%; max-width: 440px;
}
.gate .brand-big {
  font-family: var(--display); font-size: 2.5rem; font-weight: 800;
  text-align: center; color: var(--chalk); margin-bottom: .25rem; letter-spacing: -1px;
}
.gate .brand-big .mark { color: var(--amber); }
.gate .tagline { text-align: center; color: var(--sage-dim); font-size: .8rem; margin-bottom: 2rem; }
.gate .step-label { text-transform: uppercase; letter-spacing: 2px; font-size: .65rem;
  color: var(--amber); text-align: center; margin-bottom: 1rem; font-family: var(--mono); }
.gate .sport-pick { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
.gate .sport-card {
  background: var(--field-2); border: 2px solid var(--line); border-radius: var(--r);
  padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all .15s;
}
.gate .sport-card:hover, .gate .sport-card:active { border-color: var(--amber); background: var(--field-3); }
.gate .sport-card .ic { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
.gate .sport-card .nm { font-family: var(--display); font-size: 1.1rem; font-weight: 700; color: var(--chalk); }
.modal {
  background: var(--field-2); border: 1px solid var(--line);
  border-radius: var(--r) var(--r) 0 0; width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto; padding: 1.25rem;
  animation: sheetUp .3s cubic-bezier(.2,.8,.2,1);
}
@keyframes sheetUp { from { transform: translateY(100%);} to {transform:none;} }
@media (min-width: 600px) {
  .modal-bg { align-items: center; }
  .modal { border-radius: var(--r); }
}

/* ---- forms ---- */
.field { margin-bottom: .9rem; }
.field label { display: block; font-family: var(--mono); font-size: .62rem;
  letter-spacing: 1px; text-transform: uppercase; color: var(--sage); margin-bottom: .3rem; }
.input, .select {
  width: 100%; background: var(--field); color: var(--chalk);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: .55rem .7rem; font-family: var(--body); font-size: .9rem;
}
.input:focus, .select:focus { outline: none; border-color: var(--clay); }

/* ---- tables ---- */
.tbl { width: 100%; border-collapse: collapse; font-size: .82rem; }
.tbl th { font-family: var(--mono); font-size: .58rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); text-align: left;
  padding: .4rem .5rem; border-bottom: 1px solid var(--line); }
.tbl th.r, .tbl td.r { text-align: right; }
.tbl td { padding: .45rem .5rem; border-bottom: 1px solid rgba(42,61,48,.4); }
.tbl tr:last-child td { border-bottom: none; }
.tbl .pos { font-family: var(--mono); font-size: .68rem; color: var(--sage); width: 38px; }
.cell-best { color: var(--amber); font-weight: 700; }
.cell-zero { color: var(--sage-dim); }
.cell-neg { color: var(--bad); }

/* player link */
.plink { color: inherit; cursor: pointer; border-bottom: 1px dashed var(--sage-dim); }
.plink:hover { color: var(--amber); border-color: var(--amber); }

/* divider label */
.divlabel { font-family: var(--mono); font-size: .6rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sage-dim); text-align: center;
  margin: .75rem 0 .5rem; }

.hide { display: none !important; }
.row { display: flex; gap: .6rem; flex-wrap: wrap; }
.row-between { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
.mt { margin-top: 1rem; } .mb { margin-bottom: 1rem; }
.amber { color: var(--amber); } .clay { color: var(--clay); } .sage { color: var(--sage); }
</style>
</head>

<!-- ============ TOP BAR ============ -->
<div class="topbar">
  <div class="brand" onclick="go('home')">
    <span>BGL<span class="mark">.</span></span>
    <span class="ver">v7.1</span>
  </div>
  <div class="topbar-right">
    <button class="league-chip" id="league-chip" onclick="openLeagueSwitcher()" title="Change league or sport"></button>
    <span class="week-pill">WK <b id="wk-label">—</b></span>
    <button class="icon-btn" onclick="go('settings')" title="Settings">⚙</button>
  </div>
</div>

<!-- ============ PAGES ============ -->
<div id="page-home" class="page active"></div>
<div id="page-draft" class="page"></div>
<div id="page-rookie" class="page"></div>
<div id="page-standings" class="page"></div>
<div id="page-matchups" class="page"></div>
<div id="page-teams" class="page"></div>
<div id="page-myteam" class="page"></div>
<div id="page-players" class="page"></div>

<!-- ============ BOTTOM NAV ============ -->
<div class="botnav">
  <button data-nav="home" onclick="go('home')"><span class="ic">★</span>My Page</button>
  <button data-nav="draft" id="nav-draft" onclick="go('draft')" style="display:none"><span class="ic">◷</span>Draft</button>

  <button data-nav="matchups" onclick="go('matchups')"><span class="ic">⚔</span>Matchups</button>
  <button data-nav="players" onclick="go('players')"><span class="ic">◎</span>Players</button>
</div>

<div class="toast-wrap" id="toasts"></div>

<!-- ============ BLOCKING GATE (sport → league name) ============ -->
<div class="gate" id="gate" style="display:none">
  <div class="gate-inner" id="gate-inner"></div>
</div>

<!-- generic modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

/* ============================================================

   Everything sport-specific lives here. Adding a sport = filling
   in one entry. Baseball is complete; basketball is scaffolded.

const SPORTS = {
  flb: {
    key: 'flb',
    label: 'Baseball',
    icon: '⚾',
    espnGame: 'flb',
    season: 2026,
    statSeason: 2026,            // real-stat season (MLB) — current year; see CURRENT_YEAR
    rosterSize: 23,
    statsApi: 'mlb',
    // ESPN defaultPositionId -> position
    posMap: {1:'SP',2:'C',3:'1B',4:'2B',5:'3B',6:'SS',7:'OF',8:'OF',9:'OF',10:'DH',11:'RP'},
    // ESPN lineupSlotId -> slot label (null = bench/IL, not scored)

    lineupSlots: [

      { slot: 'P',   eligible: ['SP','RP'] },
      { slot: 'P',   eligible: ['SP','RP'] },

/* ============================================================

/* ============================================================
   STORAGE ARCHITECTURE
   - MASTER settings (shared Firebase doc 'master/<sportleague>'):
     player pool, ID mapping, scoring, schedule. Commissioner-level,
     PIN-protected to edit. Everyone reads these.
   - LOCAL settings (this device, localStorage): teams, draft, my team,
     lineups, view state, and any local overrides.
   ============================================================ */
const MASTER_KEYS = ['playerPool', 'idMapping', 'customScoring', 'schedule', 'masterMeta'];
const MASTER_DOC = 'master';        // firestore: leagues/master
const LOCAL_LS_KEY = 'bgl_local_v1';

function masterPayload() {
  // master holds only GLOBAL data shared across all leagues: the player pool
  // and ID overrides. Scoring + schedule are per-league (in leaguePayload).
  const out = {};
  for (const sk of Object.keys(STATE.leagues)) {
    const lg = STATE.leagues[sk];
    // gather every rostered playerId (main draft + rookie draft) so we know which
    // locally-loaded "extra" players actually need to be synced.
    const rostered = new Set();
    (lg.draft?.picks || []).forEach(pk => rostered.add(String(pk.playerId)));
    (lg.rookieDraft?.picks || []).forEach(pk => rostered.add(String(pk.playerId)));
    // sync the top-300 pool PLUS any extra player who is on a roster. Unrostered
    // extras (just browsed) stay local-only so the doc stays under 1 MB.
    const pool = (lg.playerPool || []).filter(p => !p.extra || rostered.has(String(p.espnId)));
    out[sk] = { playerPool: pool };
  }
  out.idOverrides = STATE.idOverrides;
  out.approvals = STATE.approvals || {};   // commissioner approval list
  out.salaryDB = STATE.salaryDB || {};     // salary database, 1 per sport
  out.salaryConfig = STATE.salaryConfig || {};  // master salary rules
  return out;
}

function applyMaster(master) {
  if (!master) return;
  if (master.approvals) STATE.approvals = master.approvals;
  if (master.salaryDB) STATE.salaryDB = master.salaryDB;
  if (master.salaryConfig) STATE.salaryConfig = { ...STATE.salaryConfig, ...master.salaryConfig };
  for (const sk of Object.keys(master)) {
    if (sk === 'idOverrides') { STATE.idOverrides = master.idOverrides || {}; continue; }
    if (sk === 'approvals') continue;
    if (!STATE.leagues[sk]) continue;
    const m = master[sk];
    if (m.playerPool) {
      // Preserve this device's LOCAL-ONLY extras (unrostered players loaded via
      // search) that aren't in the synced pool — merge them back in after applying.
      const incoming = m.playerPool;
      const incomingIds = new Set(incoming.map(p => String(p.espnId)));
      const localExtras = (STATE.leagues[sk].playerPool || [])
        .filter(p => p.extra && !incomingIds.has(String(p.espnId)));
      STATE.leagues[sk].playerPool = incoming.concat(localExtras);
      // self-heal: recompute eligibility from raw slots if it drifted from rules.
      autoCorrectEligibility(sk);
    }
  }
}

/* recompute eligibility for a sport's pool from stored raw slots if it drifted
   from what the current rules produce. Silent; no save (master is read-only here). */
function autoCorrectEligibility(sk) {
  const pool = STATE.leagues[sk]?.playerPool || [];
  pool.forEach(p => {
    if (!p.eligSlots) return;                 // no raw slots → can't re-derive
    const fresh = deriveEligibility(p.eligSlots, p.defPosId);
    if ((p.eligible||[]).join('/') !== fresh.join('/')) p.eligible = fresh;
  });
}

/* Local storage now holds ONLY identity pointers — which league this device
   joined and which member it is. All actual league data lives in Firebase. */
function saveLocal() {
  const identity = {
    sport: STATE.sport,
    activeLeagueDoc: STATE.activeLeagueDoc || null,
    memberId: STATE.memberId || null,
  };
  try {
    localStorage.setItem(LOCAL_LS_KEY, JSON.stringify(identity));
    // verify the write actually persisted (iOS private mode can silently fail)
    const check = localStorage.getItem(LOCAL_LS_KEY);
    if (!check) throw new Error('write did not persist');
  } catch(e) {
    // fall back to an in-memory mirror + cookie so a refresh still remembers
    window.__bglIdentity = identity;
    try {
      document.cookie = `${LOCAL_LS_KEY}=${encodeURIComponent(JSON.stringify(identity))};path=/;max-age=31536000;SameSite=Lax`;
    } catch(e2) {}
  }
}

function loadLocal() {
  let id = null;
  try {
    const raw = localStorage.getItem(LOCAL_LS_KEY);
    if (raw) id = JSON.parse(raw);
  } catch(e) {}
  // fallbacks if localStorage was empty/blocked
  if (!id && window.__bglIdentity) id = window.__bglIdentity;
  if (!id) {
    try {
      const match = document.cookie.match(new RegExp('(?:^|; )' + LOCAL_LS_KEY + '=([^;]*)'));
      if (match) id = JSON.parse(decodeURIComponent(match[1]));
    } catch(e) {}
  }
  if (!id) return;
  if (id.sport) STATE.sport = id.sport;
  if (id.activeLeagueDoc) STATE.activeLeagueDoc = id.activeLeagueDoc;
  if (id.memberId) STATE.memberId = id.memberId;
}

function initFirebase() {

    db = getFirestore(app);
    fbReady = true;

      if (snap.exists() && snap.data().master) {

        if (typeof ensurePoolPoints === 'function') ensurePoolPoints();

    if (STATE.activeLeagueDoc) subscribeLeague(STATE.activeLeagueDoc);
  } catch(e) { fbErr = e.message; }

/* live-sync a per-league doc (shared teams/draft). Personal data stays local. */

/* Firebase rejects any `undefined` anywhere in the document. Deep-strip them so
   one stray undefined (e.g. in a player object or trade) can't fail the whole write. */
function stripUndefined(v) {
  if (Array.isArray(v)) return v.map(stripUndefined).filter(x => x !== undefined);
  if (v && typeof v === 'object') {
    const out = {};
    for (const k of Object.keys(v)) {
      const cleaned = stripUndefined(v[k]);
      if (cleaned !== undefined) out[k] = cleaned;
    }
    return out;
  }
  return v === undefined ? undefined : v;
}

async function saveLeague(opts = {}) {
  if (!fbReady || !STATE.activeLeagueDoc) {
    if (!opts.silent) toast('💾 Saved locally', 'ok');
    return;
  }
  const payload = stripUndefined(leaguePayload());
  // SAFETY (wipe guard): never overwrite a populated doc with empty state. If this
  // device's league has no teams AND no draft picks AND no members, treat it as
  // "not loaded yet" and refuse to write. Prevents a blank LG() (after a sport
  // switch or mid-render glitch) from wiping everyone's Firebase data.
  const looksEmpty = (!payload.teams || payload.teams.length === 0)
                  && (!payload.draft?.picks || payload.draft.picks.length === 0)
                  && (!payload.members || Object.keys(payload.members).length === 0);
  if (looksEmpty && !opts.allowEmpty) {
    console.warn('saveLeague: refused empty payload (wipe guard)');
    if (!opts.silent) toast('Not synced — data not loaded yet. Try again shortly.', 'err');
    return;
  }
  try {
    // merge:true so a partial write can never delete fields it didn't include
    await setDoc(doc(db, 'leagues', STATE.activeLeagueDoc), { league: payload }, { merge: true });
    if (!opts.silent) toast(`☁️ Synced to league: ${LG().leagueName}`, 'ok');
  } catch(e) {
    const code = e?.code || '';
    if (code === 'permission-denied') {
      toast('Sync denied by security rule. Check the Firestore rule is published.', 'err');
    } else {
      toast('League sync failed: ' + (e?.message || code || 'unknown'), 'err');
    }
    console.error('saveLeague error:', code, e);
  }
}

/* Apply shared league data pulled from the per-league doc (without clobbering
   this device's personal choices like myTeamId / lineups). */
/* Apply the full shared league doc. Everything is shared now, including
   all members' lineups (you view all, edit only your own). */

  if (!league) return;
  const sk = league.sport || STATE.sport;
  if (!STATE.leagues[sk]) return;
  const lg = STATE.leagues[sk];
  if (league.leagueName) lg.leagueName = league.leagueName;
  if (league.currentWeek != null) lg.currentWeek = league.currentWeek;
  if (league.teams) lg.teams = league.teams;
  if (league.draft) lg.draft = league.draft;
  if (league.schedule) lg.schedule = league.schedule;
  if (league.customScoring) lg.customScoring = league.customScoring;
  if (league.rosterOverride !== undefined) lg.rosterOverride = league.rosterOverride;
  if (league.settings) lg.settings = { ...lg.settings, ...league.settings };
  if (league.draftPicks) lg.draftPicks = league.draftPicks;
  if (league.removedPicks) lg.removedPicks = league.removedPicks;
  if (league.contracts) lg.contracts = league.contracts;
  if (league.deadCap) lg.deadCap = league.deadCap;
  if (league.moneyTrades) lg.moneyTrades = league.moneyTrades;
  if (league.seasonApplied !== undefined) lg.seasonApplied = league.seasonApplied;
  if (league.rookieDraft) lg.rookieDraft = { ...lg.rookieDraft, ...league.rookieDraft };
  if (league.trades) lg.trades = league.trades;
  if (league.lineups) lg.lineups = league.lineups;
  if (league.members) lg.members = league.members;
  if (league.gameLogs) lg.gameLogs = league.gameLogs;
  if (league.scheduleCache) lg.scheduleCache = league.scheduleCache;
  if (league.irStash) lg.irStash = league.irStash;
}

async function saveMaster() {
  if (!fbReady) { toast('⚠ Master not saved — Firebase offline', 'err'); return; }
  try {
    // Full write (NOT merge) so removing an approval actually deletes it. The master
    // doc is small and always fully populated, so a full overwrite is safe here.
    // Still strip undefined so a stray undefined can't fail the write.

/* normalize a player name for matching: lowercase, strip accents, punctuation, suffixes */
function normName(name) {
  return String(name || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // strip accents
    .toLowerCase()
    .replace(/\b(jr|sr|ii|iii|iv)\b\.?/g, '')            // strip suffixes
    .replace(/[^a-z\s]/g, '')                             // strip punctuation
    .replace(/\s+/g, ' ').trim();
}

/* ============================================================
   SALARY DATABASE — parse pasted contract data (tolerant of missing lines).
   Each block: name, position, [team], age, startYr, endYr, [years], $total, $aav.
   The two $ lines anchor the end of each block. AAV (2nd $) counts vs the cap.
   ============================================================ */
const SALARY_POS = new Set(['C','1B','2B','3B','SS','OF','LF','CF','RF','DH','SP','RP','P','UTIL','PG','SG','SF','PF','G','F']);
function parseMoney(s) { const m = String(s).replace(/[^0-9]/g, ''); return m ? parseInt(m) : null; }
function parseSalaryPaste(text) {
  const lines = String(text||'').split('\n').map(l => l.trim());
  const players = [];
  let i = 0;
  while (i < lines.length) {
    if (!lines[i]) { i++; continue; }
    // NAME line (strip a trailing stray single letter like "Soto i")
    const name = lines[i].replace(/\s+[a-z]$/, '').trim();
    i++;
    const blk = { pos:'', team:'', age:null, start:null, end:null, years:null, total:null, aav:null };
    const moneys = [];
    while (i < lines.length) {
      if (moneys.length >= 2) break;            // two $ = block complete
      const ln = lines[i];
      if (ln === '') { i++; continue; }
      if (ln.startsWith('$')) { moneys.push(parseMoney(ln)); i++; continue; }
      if (SALARY_POS.has(ln)) { if (!blk.pos) blk.pos = ln; i++; continue; }
      if (/^(19|20)\d\d$/.test(ln)) {           // 4-digit year
        if (blk.start === null) blk.start = parseInt(ln);
        else if (blk.end === null) blk.end = parseInt(ln);
        i++; continue;
      }
      if (/^\d{1,2}$/.test(ln)) {                // small number = age then years
        if (blk.age === null) blk.age = parseInt(ln);
        else if (blk.years === null) blk.years = parseInt(ln);
        i++; continue;
      }
      if (/[A-Za-z]/.test(ln)) {                 // team line (strip prefix junk)
        const team = ln.replace(/^[^A-Za-z]+/, '').trim();
        if (!blk.team) blk.team = team;
        i++; continue;
      }
      i++;                                        // unknown line, skip
    }
    blk.total = moneys[0] ?? null;
    blk.aav = moneys[1] ?? null;
    if (name) players.push({ name, ...blk });
  }
  return players;
}
/* current sport's salary DB (normName -> record) */
function salaryDB() { return (STATE.salaryDB && STATE.salaryDB[STATE.sport]) || {}; }
/* salary config with master defaults */
function SALCFG() {
  const d = { defaultCap:260000000, capGrowthPct:5,
    penaltyTiers:[{maxPct:10,picks:1},{maxPct:20,picks:2},{maxPct:999,picks:3}],
    escalatorPct:5, signingDiscount:0.875, escalatorGrowth:0.125, maxTerm:10, arbSalary:5000000 };
  return { ...d, ...(STATE.salaryConfig || {}) };
}
/* this league's cap (league override or master default) */
function leagueCap() { return LSET().salaryCap || SALCFG().defaultCap; }
function currentSeasonYear() { return SEASON_OPENERS ? Math.max(...Object.keys(SEASON_OPENERS).map(Number).filter(y=>y<=new Date().getFullYear()+1)) : new Date().getFullYear(); }

/* a player's CONTRACT record (signed), or null */
function playerContract(p) { return (LG().contracts || {})[String(p.espnId)] || null; }
/* the raw imported AAV for a player, or null if not in DB */
function importedAAV(p) {
  const rec = salaryDB()[normName(p.name)];
  return rec ? rec.aav : null;
}
/* is this player an arb player? (in the pool, but no contract info imported) */
function isArbPlayer(p) {
  // arb = no imported contract data at all (no AAV in the salary DB)
  return importedAAV(p) == null && !playerContract(p);
}
/* escalated salary for a signed contract in a given season year.
   Year 1 (signedYear) = baseAAV * signingDiscount; year n = baseAAV * (1+growth)^(n-1). */
function contractSalaryForYear(contract, year) {
  if (!contract) return 0;
  const n = (year - contract.signedYear) + 1;          // 1-based contract year
  if (n < 1 || n > contract.termYears) return 0;        // outside the term
  const c = SALCFG();
  if (n === 1) return Math.round(contract.baseAAV * c.signingDiscount);
  return Math.round(contract.baseAAV * Math.pow(1 + c.escalatorGrowth, n - 1));
}
/* a player's cap hit for a given season year (defaults to current year):
   - signed contract → escalated salary for that year
   - unsigned but has imported AAV → that AAV (placeholder until signed)
   - arb (no data) → flat arb salary, no escalation */
function playerCapHit(p, year) {
  year = year || currentSeasonYear();
  const c = playerContract(p);
  if (c) return contractSalaryForYear(c, year);
  const aav = importedAAV(p);
  if (aav != null) return aav;                          // unsigned, show import AAV
  return SALCFG().arbSalary;                            // arb default (flat)
}
/* legacy alias used in some views */
function playerSalary(p) { return playerCapHit(p, currentSeasonYear()); }

/* sum a team's cap hit for a season year, including dead-cap + money-trade effects */
function teamSalaryTotal(teamId, year) {
  year = year || currentSeasonYear();
  let total = 0;
  teamRoster(teamId).forEach(p => { total += playerCapHit(p, year) || 0; });
  // dead-cap hits charged to this team for this year
  ((LG().deadCap || {})[teamId] || []).forEach(d => { if (d.year === year) total += d.amount; });
  // money traded: receiving cash reduces cap, sending cash increases it (for that year)
  (LG().moneyTrades || []).forEach(mt => {
    const yrs = mt.years || 1, start = mt.startYear || year;
    if (year >= start && year < start + yrs) {
      const per = mt.perYear != null ? mt.perYear : Math.round(mt.amount / yrs);
      if (String(mt.to) === String(teamId)) total -= per;
      if (String(mt.from) === String(teamId)) total += per;
    }
  });
  return total;
}
/* over-cap penalty (picks lost) for a team, per the tier table */
function teamCapPenalty(teamId, year) {
  const cap = leagueCap();
  const spent = teamSalaryTotal(teamId, year);
  if (spent <= cap) return { overPct:0, picks:0, over:0 };
  const over = spent - cap;
  const overPct = (over / cap) * 100;
  const tier = SALCFG().penaltyTiers.find(t => overPct <= t.maxPct) || { picks:3 };
  return { overPct: Math.round(overPct*10)/10, picks: tier.picks, over };
}
/* dead-cap hit if you drop a player NOW = 2x their current-year escalated salary */
function dropDeadCap(p) {
  const c = playerContract(p);
  if (!c) return 0;                                     // unsigned = no dead cap
  return 2 * contractSalaryForYear(c, currentSeasonYear());
}

/* ===== PICK OWNERSHIP for penalties =====
   draftPicks[year][round] = teamId records picks whose ownership CHANGED via trade.
   A team's own pick is implicit unless that slot points to someone else.
   removedPicks[year][round] = true marks a pick wiped by a penalty (no longer exists). */
function pickOwner(year, round, originalTeamId) {
  // who owns originalTeamId's pick at (year, round)?
  const moved = (LG().draftPicks||{})[year]?.[round];
  return moved != null ? moved : originalTeamId;   // if not traded, the original team owns it
}
function pickRemoved(year, round, teamId) {
  const rm = (LG().removedPicks||{});
  return !!(rm[year] && rm[year][round] && rm[year][round][teamId]);
}
/* Find a team's NEXT AVAILABLE own pick of a given round, at/after startYear.
   "Available" = the team still owns their own line slot (not traded away) AND it
   hasn't already been removed by a prior penalty. Returns {year, round} or null. */
function nextAvailableOwnPick(teamId, round, startYear) {
  for (let y = startYear; y < startYear + 15; y++) {
    // does this team still own THEIR OWN pick this year/round?
    const owner = pickOwner(y, round, teamId);
    const ownsOwnLine = String(owner) === String(teamId);
    if (ownsOwnLine && !pickRemoved(y, round, teamId)) return { year: y, round };
  }
  return null;
}
/* Apply ONE pick-removal penalty to a team for a given round, cascading to their
   next available pick if their nearest one was traded away. Also: if the targeted
   pick had been TRADED to someone else, the obligation follows to the next pick the
   team owns (the receiving team still gets a pick — the team's NEXT available one). */
function removeOnePick(teamId, round, startYear, log) {
  // 1) find the nearest future slot on this team's own line (traded or not)
  for (let y = startYear; y < startYear + 15; y++) {
    if (pickRemoved(y, round, teamId)) continue;          // already gone
    const owner = pickOwner(y, round, teamId);
    LG().removedPicks = LG().removedPicks || {};
    LG().removedPicks[y] = LG().removedPicks[y] || {};
    LG().removedPicks[y][round] = LG().removedPicks[y][round] || {};
    if (String(owner) === String(teamId)) {
      // team still holds this pick → remove it directly
      LG().removedPicks[y][round][teamId] = true;
      log && log(`${teamById(teamId).name}: lost their ${y} R${round} pick (penalty)`);
      return true;
    } else {
      // this pick was TRADED away. The penalty can't take a pick the team no longer
      // controls — instead it removes the team's NEXT AVAILABLE own pick, and the
      // trade obligation rolls forward to that next pick so the receiver still gets one.
      const nxt = nextAvailableOwnPick(teamId, round, y + 1);
      if (!nxt) { log && log(`${teamById(teamId).name}: no available R${round} pick to forfeit`); return false; }
      // mark the next own pick as removed (the team's penalty), and reassign the trade
      // obligation: the receiver (owner) now gets the team's pick at nxt.year instead.
      LG().draftPicks[nxt.year] = LG().draftPicks[nxt.year] || {};
      LG().draftPicks[nxt.year][round] = owner;            // obligation follows forward
      delete LG().draftPicks[y][round];                    // original traded slot reverts
      LG().removedPicks[nxt.year] = LG().removedPicks[nxt.year] || {};
      LG().removedPicks[nxt.year][round] = LG().removedPicks[nxt.year][round] || {};
      // NOTE: the pick still exists for the receiver; what's removed is the team's USE
      // of their next pick. We record the penalty against the team's own line at nxt.
      log && log(`${teamById(teamId).name}: their ${y} R${round} was traded to ${teamById(owner).name}; penalty + obligation roll to ${nxt.year} R${round}`);
      return true;
    }
  }
  return false;
}
function fmtMoney(n) {
  if (n == null) return '—';
  const neg = n < 0; n = Math.abs(n);
  let s;
  if (n >= 1000000) s = '$' + (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  else if (n >= 1000) s = '$' + (n/1000).toFixed(0) + 'K';
  else s = '$' + n;
  return neg ? '-' + s : s;
}

/* ============================================================
   ESPN API — player pool ONLY (no league ID needed; the /players
   endpoint is global per game+season, not league-scoped)
   ============================================================ */

/* Pull the full draftable player pool from ESPN's player info endpoint */
async function fetchPlayerPool(logFn) {
  logFn?.('Fetching ESPN player pool…', 'run');
  const statSeason = SP().statSeason;
  const url = `https://lm-api-reads.fantasy.espn.com/apis/v3/games/${SP().espnGame}/seasons/${SP().season}/players?scoringPeriodId=0&view=kona_player_info`;
  // Correct ESPN filter structure:
  //  - filterStatsForTopScoringPeriodIds tells ESPN WHICH stats to attach
  //  - additionalValue carries the season-total key "00<season>" and projected "10<season>"
  //  - sortPercOwned orders by relevance (rostered players first), limit caps the dump
  const filter = {
    players: {
      filterStatsForTopScoringPeriodIds: {
        value: 2,
        additionalValue: [`00${statSeason}`, `10${statSeason}`, `00${SP().season}`, `10${SP().season}`]
      },
      sortPercOwned: { sortPriority: 1, sortAsc: false },
      limit: 600,
      filterRanksForScoringPeriodIds: { value: [0] },
    }
  };
  const res = await fetch(url, { headers: { 'X-Fantasy-Filter': JSON.stringify(filter) } });
  if (!res.ok) throw new Error('ESPN player pool HTTP ' + res.status);
  const data = await res.json();
  const players = Array.isArray(data) ? data : (data.players || []);
  logFn?.(`Got ${players.length} players from ESPN`, 'ok');
  if (players.length) window._lastRawPlayer = players[0];
  return players;
}

/* Pull a player's season fantasy-point total from ESPN stat splits.
   ESPN stat split `id` is a string like "00<season>" (season total, actual).
   We try the stat season first, then the league season, then any actual split. */
function seasonPointsFromEspn(pl) {
  const stats = pl.stats || [];
  const tryKeys = [`00${SP().statSeason}`, `00${SP().season}`];
  for (const key of tryKeys) {
    const hit = stats.find(s => s.id === key && s.appliedTotal != null);
    if (hit) return Math.round((hit.appliedTotal || 0) * 10) / 10;
  }
  // fallback: any real (non-projected) season-total split with points
  const any = stats.find(s => s.statSourceId === 0 && s.statSplitTypeId === 0 && s.appliedTotal != null)
           || stats.find(s => s.statSourceId === 0 && s.appliedTotal != null);
  return any ? Math.round((any.appliedTotal || 0) * 10) / 10 : 0;
}

/* ============================================================
   MLB STATS API — the source of truth for game stats
   (runs in browser; not testable from build env but API is stable)
   ============================================================ */
const MLB = 'https://statsapi.mlb.com/api/v1';

/* search MLB for a player by name → returns best mlbId match */
async function mlbLookup(name) {
  const q = encodeURIComponent(name);
  const res = await fetch(`${MLB}/people/search?names=${q}`);
  if (!res.ok) return null;
  const data = await res.json();
  const people = data.people || [];
  if (!people.length) return null;
  const target = normName(name);
  const exact = people.find(p => normName(p.fullName) === target);
  return (exact || people[0]).id;
}

/* Get the active scoring values: user overrides if set, else defaults. */
function scoringValues() {
  const cat = SCORING_CATALOG[STATE.sport] || SCORING_CATALOG.flb;
  const saved = LG().customScoring || {};
  const out = {};
  cat.forEach(c => { out[c.id] = (saved[c.id] != null) ? saved[c.id] : c.def; });
  return out;
}
function scoringCatalog() { return SCORING_CATALOG[STATE.sport] || SCORING_CATALOG.flb; }

/* The current stat season — league year, rolls over automatically. */
function statSeasonNow() { return SP().season; }


/* Fetch a player's game-by-game log from MLB StatsAPI for the current season.
   Returns [{date, gamePk, opp, stat:{...}}] for both hitting and pitching. */
async function mlbGameLog(mlbId, group, season) {
  const yr = season || statSeasonNow();
  const url = `${MLB}/people/${mlbId}/stats?stats=gameLog&season=${yr}&group=${group}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`MLB gameLog HTTP ${res.status}`);
  const data = await res.json();
  const splits = data.stats?.[0]?.splits || [];
  return splits.map(s => ({
    date: s.date,
    gamePk: s.game?.gamePk,
    opp: s.opponent?.abbreviation || s.opponent?.name || '',
    isHome: s.isHome,
    stat: s.stat || {},
  }));
}

/* ============================================================
   SCHEDULE + PROBABLE PITCHERS (for the week lookahead)
   Fetches the MLB schedule for a date range with probable pitchers,
   then lets us answer: for player X on day D, who do they play, and
   (for pitchers) are they the probable starter? Cached per week.
   ============================================================ */
async function fetchSchedule(startYmd, endYmd) {
  // hydrate=probablePitcher gives us the listed starters
  const url = `${MLB}/schedule?sportId=1&startDate=${startYmd}&endDate=${endYmd}&hydrate=probablePitcher,team`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`MLB schedule HTTP ${res.status}`);
  const data = await res.json();
  // flatten into per-date game records keyed by team id
  const byDate = {}; // 'YYYY-MM-DD' -> [{homeId,awayId,homeAbbr,awayAbbr,homeProb,awayProb}]
  (data.dates||[]).forEach(d => {
    const games = (d.games||[]).map(g => ({
      homeId: g.teams?.home?.team?.id, awayId: g.teams?.away?.team?.id,
      homeAbbr: g.teams?.home?.team?.abbreviation, awayAbbr: g.teams?.away?.team?.abbreviation,
      homeProb: g.teams?.home?.probablePitcher?.id, awayProb: g.teams?.away?.probablePitcher?.id,
    }));
    byDate[d.date] = games;
  });
  return byDate;
}

/* cache schedule for a fantasy week in LG().scheduleCache[weekKey] */
async function getWeekSchedule(week) {
  const days = weekDays(week);
  const startYmd = ymd(days[0]), endYmd = ymd(days[days.length-1]);
  const key = `${SP().season}_${startYmd}_${endYmd}`;
  LG().scheduleCache = LG().scheduleCache || {};
  if (LG().scheduleCache[key]) return LG().scheduleCache[key];
  try {
    const sched = await fetchSchedule(startYmd, endYmd);
    LG().scheduleCache[key] = sched;
    return sched;
  } catch(e) { return {}; }
}

/* For a player on a given calendar date, return {opp, isProbable} or null.
   Needs the player's MLB team id (we resolve it lazily and cache on the player). */
function playerDayMatchup(player, dateYmd, sched) {
  const teamId = player.mlbTeamId;
  if (!teamId || !sched || !sched[dateYmd]) return null;
  for (const g of sched[dateYmd]) {
    if (g.homeId === teamId) return { opp: 'vs ' + (g.awayAbbr||''), isProbable: g.homeProb === player.mlbId };
    if (g.awayId === teamId) return { opp: '@ ' + (g.homeAbbr||''), isProbable: g.awayProb === player.mlbId };
  }
  return null;
}

/* Convert one game's MLB stat line into points using OUR scoring system.
   Reads the active per-category values (user overrides or defaults). */
function gamePoints(statObj, group) {
  const vals = scoringValues();
  const cat = scoringCatalog();
  let pts = 0;
  for (const c of cat) {
    if (c.grp !== group) continue;          // hitting cats → hitting games only
    const per = vals[c.id];
    if (!per) continue;                      // zero-valued categories skipped
    let val;
    if (c.derive) val = c.derive(statObj);   // computed (singles, etc.)
    else val = statObj[c.mlb];
    if (val == null) continue;
    val = parseFloat(val);
    if (isNaN(val)) continue;
    pts += val * per;
  }
  return Math.round(pts * 100) / 100;
}

/* Per-category breakdown of a game's points (for tap-to-see detail). */
function gameBreakdown(statObj, group) {
  const vals = scoringValues();
  const cat = scoringCatalog();
  const out = [];
  for (const c of cat) {
    if (c.grp !== group) continue;
    const per = vals[c.id];
    if (!per) continue;
    let raw = c.derive ? c.derive(statObj) : statObj[c.mlb];
    if (raw == null) continue;
    raw = parseFloat(raw);
    if (isNaN(raw) || raw === 0) continue;
    out.push({ label: c.label, raw, per, pts: Math.round(raw*per*100)/100 });
  }
  return out;
}

/* ============================================================
   WEEK ↔ DATE LOGIC
   Each week defaults to 7 days starting from the season opener
   Monday. Users can override (a) the opener date and (b) any
   week's duration in days. Weeks after a custom-duration week
   shift automatically, then resume standard 7-day spacing.
   Stored: LG().schedule = { opener: 'YYYY-MM-DD', durations: {week: days} }
   ============================================================ */
const SEASON_OPENERS = { 2025: '2025-03-24', 2026: '2026-03-23', 2027: '2027-03-29' };

function seasonOpenerMonday() {
  // user override first
  const custom = LG().schedule?.opener;
  if (custom) return new Date(custom + 'T00:00:00');
  const iso = SEASON_OPENERS[SP().season] || `${SP().season}-03-30`;
  return new Date(iso + 'T00:00:00');
}
/* duration (days) of a given week — custom or default 7 */
function weekDuration(week) {
  const d = LG().schedule?.durations?.[week];
  return (d && d > 0) ? d : 7;
}
/* start date of a week = opener + sum of all prior weeks' durations */
function weekStart(week) {
  const open = seasonOpenerMonday();
  let offset = 0;
  for (let w = 1; w < week; w++) offset += weekDuration(w);
  const start = new Date(open); start.setDate(open.getDate() + offset);
  return start;
}
function weekDateRange(week) {
  const start = weekStart(week);
  const end = new Date(start); end.setDate(start.getDate() + weekDuration(week) - 1);
  return { start, end };
}
function ymd(d) { return d.toISOString().slice(0,10); }
function dayLabel(d) {
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate();
}
function weekDays(week) {
  const start = weekStart(week);
  const len = weekDuration(week);
  const days = [];
  for (let i=0;i<len;i++) { const d = new Date(start); d.setDate(start.getDate()+i); days.push(d); }
  return days;
}
/* Which fantasy week is "now" — walk weeks until today falls inside one.
   Accounts for custom week durations. Clamped to 1..26. */
function currentWeekNow() {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let w = 1; w <= 26; w++) {
    const { start, end } = weekDateRange(w);
    if (today >= start && today <= end) return w;
    if (today < start) return Math.max(1, w);  // before this week starts
  }
  return 26;
}
/* The week the UI should show: explicit viewWeek if set, else computed now. */
function activeWeek() { return LG().viewWeek || currentWeekNow(); }

/* ============================================================
   LINEUP LOCK — lineups lock at 11:00 AM on the Sunday before
   a week begins (i.e. the day before a Monday week start).
   Returns the lock Date for a given week.
   ============================================================ */
const LOCK_HOUR = 11; // 11:00 AM local
function weekLockTime(week) {
  const start = weekStart(week);          // Monday (week start)
  const lock = new Date(start);
  lock.setDate(start.getDate() - 1);      // the Sunday before
  lock.setHours(LOCK_HOUR, 0, 0, 0);
  return lock;
}
function isWeekLocked(week) {
  return new Date() >= weekLockTime(week);
}
/* human countdown string until a week locks, or 'Locked' */
function lockCountdown(week) {
  const ms = weekLockTime(week) - new Date();
  if (ms <= 0) return 'Locked';
  const d = Math.floor(ms/86400000);
  const h = Math.floor((ms%86400000)/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function playerWeekGames(mlbId, week) {
  const logs = LG().gameLogs?.[mlbId] || [];
  const days = weekDays(week).map(ymd);
  const out = [];
  logs.forEach(g => {
    const idx = days.indexOf(g.date);
    if (idx >= 0) out.push({ ...g, dayIdx: idx, pts: gamePoints(g.stat, g.group) });
  });
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
function playerBestGame(mlbId, week) {
  const games = playerWeekGames(mlbId, week);
  if (!games.length) return null;
  return games.reduce((best,g)=> g.pts > best.pts ? g : best, games[0]);
}

/* ============================================================
   PLAYER POOL POINTS — fetch game logs for the top 200 by ADP and
   roll them into season + last-7/14/30-day totals using league scoring.
   Stored on each player: ptsSeason, pts7, pts14, pts30.
   ============================================================ */
let _poolPtsRunning = false;
async function computePoolPoints(force, progressFn) {
  if (_poolPtsRunning) return;
  _poolPtsRunning = true;
  try {
    // the stored pool is already the top 300 by ADP — just compute all of them.
    // (Players outside the 300 get computed individually via loadExtraPlayer.)
    const mapped = LG().playerPool.filter(p => p.mlbId);
    LG().gameLogs = LG().gameLogs || {};
    let done = 0;
    for (const p of mapped) {
      done++;
      try {
        // reuse cached log if present and not forcing
        let log = LG().gameLogs[p.mlbId];
        if (!log || force) {
          const isPitcher = /SP|RP/.test((p.eligible||[]).join('')) && !/1B|2B|3B|SS|OF|C|DH/.test((p.eligible||[]).join(''));
          const grp = isPitcher ? 'pitching' : 'hitting';
          const raw = await mlbGameLog(p.mlbId, grp);
          log = raw.map(g => ({...g, group: grp}));
          LG().gameLogs[p.mlbId] = log;
          await new Promise(r=>setTimeout(r,40));
        }
        applyPointFields(p, log);
      } catch(e) {}
      progressFn?.(done, mapped.length);
    }
    // persist to league doc (shared cache benefits everyone)
    if (STATE.activeLeagueDoc) saveLeague({silent:true}); else saveLocal();
  } finally { _poolPtsRunning = false; }
}


/* ============================================================
   ID MAPPING — bridge ESPN players ↔ MLB players
   Strategy: name match + override table; cache results
   ============================================================ */
async function resolveMlbIds(logFn, progressFn) {
  const api = SP().statsApi;
  if (api === 'mlb') return resolveIds(logFn, progressFn, mlbLookup, 'MLB');
  if (api === 'nba') return resolveIds(logFn, progressFn, nbaLookup, 'NBA');
  logFn?.(`No stat provider for ${SP().label}`, 'err');
  return { mapped: 0, failed: 0, failures: [] };
}

/* generic resolver — sport provides the lookup fn */
async function resolveIds(logFn, progressFn, lookupFn, apiName) {
  logFn?.(`Mapping ${SP().label} players to ${apiName} IDs…`, 'run');
  let mapped = 0, failed = 0, done = 0;
  const failures = [];
  const pool = LG().playerPool;
  const total = pool.length;
  for (const p of pool) {
    done++;
    if (p.mlbId) { mapped++; progressFn?.(done, total, mapped, failed); continue; }
    if (STATE.idOverrides[normName(p.name)]) {
      p.mlbId = STATE.idOverrides[normName(p.name)];
      mapped++; progressFn?.(done, total, mapped, failed); continue;
    }
    try {
      const id = await lookupFn(p.name);
      if (id) { p.mlbId = id; mapped++; }
      else { failed++; failures.push(p.name); }
    } catch { failed++; failures.push(p.name); }
    progressFn?.(done, total, mapped, failed);
    await new Promise(r => setTimeout(r, 35));
  }
  logFn?.(`Mapped ${mapped}, failed ${failed}`, failed ? 'err' : 'ok');
  if (failures.length) logFn?.('Unmapped: ' + failures.slice(0,10).join(', ') + (failures.length>10?'…':''), 'pending');
  return { mapped, failed, failures };
}

/* drive the 1-second draft clock; auto-pick when it hits zero */
let _draftTimer = null;
let _autoPickGuard = -1;   // pick index we last auto-fired, prevents double-fire
function manageDraftTimer(page) {
  const live = LG().draft?.live && !LG().draft?.paused;
  const onDraftPage = page === 'draft';
  if (live && onDraftPage) {
    if (!_draftTimer) {
      _draftTimer = setInterval(() => {
        if (!LG().draft?.live || LG().draft?.paused) { clearInterval(_draftTimer); _draftTimer=null; return; }
        const left = draftSecondsLeft();
        const t = document.querySelector('.draft-timer');
        if (t) { t.textContent = fmtClock(left); t.classList.toggle('urgent', left<=10); }
        if (left <= 0) {
          // AUTO-PICK for whichever team is on the clock — fires regardless of which
          // team is "mine", so other teams' expired picks don't stall the draft.
          const idx = currentPickIndex();
          if (_autoPickGuard === idx) return;   // already fired for this pick; wait for sync
          _autoPickGuard = idx;
          autoPickForCurrent();
        }
      }, 1000);
    }
  } else if (_draftTimer) {
    clearInterval(_draftTimer); _draftTimer = null;
  }
}

/* rookie draft clock — mirrors the main draft timer on RD() */
function manageRookieTimer(page) {
  const live = RD().live && !RD().paused;
  const onPage = page === 'rookie';
  if (live && onPage) {
    if (!_rookieTimer) {

/* a team's total for a given week = sum of its starters' best single game */
function teamWeekTotal(teamId, week) {
  const roster = teamRoster(teamId);
  const starters = getStarters(teamId, week);
  let total = 0;
  starters.forEach(pid => {
    const p = roster.find(r => String(r.espnId)===String(pid));
    if (p?.mlbId) { const bg = playerBestGame(p.mlbId, week); if (bg) total += bg.pts; }
  });
  return Math.round(total*10)/10;
}
/* a team's season total across all weeks up to (and including) the current week */
function teamSeasonTotal(teamId) {
  const upTo = currentWeekNow();
  let total = 0;
  for (let w = 1; w <= upTo; w++) total += teamWeekTotal(teamId, w);
  return Math.round(total*10)/10;
}

/* round-robin matchup schedule: returns opponentId for teamId in a given week.
   Standard circle method; teams rotate. Deterministic from team order. */
function matchupSchedule() {
  let ids = (LG().draft.order?.length ? LG().draft.order : LG().teams.map(t=>t.id)).slice();
  if (ids.length < 2) return {};
  const bye = (ids.length % 2 === 1);
  if (bye) ids.push('__BYE__');
  const n = ids.length, rounds = n - 1, half = n/2;
  const sched = {};  // week -> [[a,b],...]
  let arr = ids.slice();
  for (let r = 0; r < rounds; r++) {
    const pairs = [];
    for (let i = 0; i < half; i++) pairs.push([arr[i], arr[n-1-i]]);
    sched[r+1] = pairs;
    // rotate (keep first fixed)
    arr = [arr[0], arr[n-1], ...arr.slice(1, n-1)];
  }
  return sched;
}
/* who does teamId play in week? (cycles through the rounds if season > rounds) */
function opponentFor(teamId, week) {
  const sched = matchupSchedule();
  const rounds = Object.keys(sched).length;
  if (!rounds) return null;
  const wk = ((week - 1) % rounds) + 1;
  const pairs = sched[wk] || [];
  for (const [a,b] of pairs) {
    if (String(a)===String(teamId)) return b==='__BYE__'?null:b;
    if (String(b)===String(teamId)) return a==='__BYE__'?null:a;
  }
  return null;
}

/* full H2H record for every team through the current week.
   Returns { teamId: {w,l,t, pf, pa, bonusW, bonusL} }. */
function computeRecords() {
  const cur = currentWeekNow();
  const teams = LG().teams.map(t=>t.id);
  const rec = {}; teams.forEach(id => rec[id] = {w:0,l:0,t:0,pf:0,pa:0,bonusW:0,bonusL:0});
  const bonus = LSET().bonusWin;
  for (let wk = 1; wk <= cur; wk++) {
    // skip weeks with no games played yet by anyone (avoids 0-0 phantom losses)
    const totals = {}; let anyPlayed = false;
    teams.forEach(id => { const tot = teamWeekTotal(id, wk); totals[id]=tot; if (tot>0) anyPlayed=true; });
    if (!anyPlayed) continue;
    // head-to-head
    const counted = new Set();
    teams.forEach(id => {
      const opp = opponentFor(id, wk);
      rec[id].pf += totals[id];
      if (opp && !counted.has(id+'-'+opp)) {
        counted.add(opp+'-'+id);
        rec[id].pa += totals[opp]||0;
        if (totals[id] > (totals[opp]||0)) rec[id].w++;
        else if (totals[id] < (totals[opp]||0)) rec[id].l++;
        else rec[id].t++;
      }
    });
    // bonus win: top half of weekly scorers get +W, bottom half +L
    if (bonus) {
      const ranked = teams.slice().sort((a,b)=>(totals[b]||0)-(totals[a]||0));
      const half = Math.floor(ranked.length/2);
      ranked.forEach((id,i) => {
        if (i < half) { rec[id].w++; rec[id].bonusW++; }
        else if (ranked.length - i <= half) { rec[id].l++; rec[id].bonusL++; }
      });
    }
  }
  return rec;
}

  return `<div class="eyebrow">${LG().teams.length} teams · ${SP().label}</div>

/* ============================================================
   MY TEAM — pick once (permanent), then see roster + daily scoring
   ============================================================ */
function viewMyTeam() {
  if (!LG().teams.length) {
    return `<div class="h1">My Team</div>
      <div class="empty"><div class="big">★</div>
      <div class="msg">No teams yet. Set up the league first.</div>
      <button class="btn" onclick="go('settings')">Open Settings</button></div>`;
  }
  // not chosen yet → prompt selection
  if (!myTeamId()) {
    const opts = LG().teams.map(t =>
      `<button class="btn btn-ghost btn-block mt" onclick="pickMyTeam('${t.id}')"
        style="text-align:left">${esc(t.name)} <span class="sub">· ${esc(t.owner||'')}</span></button>`).join('');
    return `<div class="eyebrow">One-time choice</div>
      <div class="h1">Pick your team</div>
      <p class="sub mt mb">Choose which team is yours. <b>This is permanent</b> — it can't be changed later.</p>
      ${opts}`;
  }

  const mine = myTeamId();
  // which team are we viewing? defaults to mine; can browse others read-only
  const viewingId = STATE.viewingTeamId || mine;
  const isMine = String(viewingId) === String(mine);
  const t = teamById(viewingId);
  const week = activeWeek();
  const roster = teamRoster(viewingId);
  const starters = getStarters(viewingId, week);
  const haveLogs = Object.keys(LG().gameLogs||{}).length > 0;

  // team weekly total = sum of STARTERS' best game
  let teamTotal = 0;
  starters.forEach(pid => {
    const p = roster.find(r => String(r.espnId)===String(pid));
    if (p?.mlbId) { const bg = playerBestGame(p.mlbId, week); if (bg) teamTotal += bg.pts; }
  });

  const { start, end } = weekDateRange(week);
  const dayHeads = weekDays(week).map(d =>
    `<div class="dhead">${['Su','M','Tu','W','Th','F','Sa'][d.getDay()]}<br>${d.getMonth()+1}/${d.getDate()}</div>`).join('');

  // reverse lookup: playerId -> assigned slot index + label
  const lu = getLineup(viewingId, week);
  const assign = lu.assignments || {};
  const slotOf = {}; // espnId -> {idx, label}
  Object.entries(assign).forEach(([idx, pid]) => {
    if (pid) slotOf[String(pid)] = { idx: +idx, label: activeLineupSlots()[idx]?.slot || '?' };
  });
  const locked = isWeekLocked(week) || !isMine;  // can't edit others' lineups or locked weeks

  // schedule for this week (from cache; autoPull populates it)
  const weekSched = (() => {
    const days0 = weekDays(week);
    const key = `${SP().season}_${ymd(days0[0])}_${ymd(days0[days0.length-1])}`;
    return LG().scheduleCache?.[key] || null;
  })();
  const todayYmd = ymd(new Date());

  // build a card per player
  const cardFor = (p) => {
    const slot = slotOf[String(p.espnId)];
    const isStarter = !!slot;
    const games = p.mlbId ? playerWeekGames(p.mlbId, week) : [];
    const best = p.mlbId ? playerBestGame(p.mlbId, week) : null;
    const cells = weekDays(week).map((d,i) => {
      const g = games.find(x => x.dayIdx === i);
      if (g) {
        const isBest = best && g.date === best.date && isStarter;
        const cls = 'dcell' + (isBest?' best':'') + (g.pts<0?' neg':'');
        return `<div class="${cls}" onclick="showGameBreakdown('${p.mlbId}',${week},${i})">${g.pts}</div>`;
      }
      // no game logged → if it's today/future and we have schedule, show matchup
      const dYmd = ymd(d);
      if (dYmd >= todayYmd && weekSched) {
        const m = playerDayMatchup(p, dYmd, weekSched);
        if (m) {
          return `<div class="dcell upcoming">
            <span class="opp-tag">${esc(m.opp)}</span>
            ${m.isProbable?'<span class="ps-tag">PROB</span>':''}
          </div>`;
        }
      }
      return `<div class="dcell dnf">·</div>`;
    }).join('');

    // tappable slot badge → opens position picker for this player
    const badge = isStarter
      ? `<span class="starter-badge s" style="cursor:${locked?'default':'pointer'}"
          ${locked?'':`onclick="pickPosition('${p.espnId}')"`}>${esc(slot.label)} ${locked?'':'▾'}</span>`
      : `<span class="starter-badge b" style="cursor:${locked?'default':'pointer'}"
          ${locked?'':`onclick="pickPosition('${p.espnId}')"`}>BENCH ${locked?'':'▾'}</span>`;

    return `<div class="pcard ${isStarter?'':'bench'}">
      <div class="row-between" style="margin-bottom:.4rem">
        <div>
          ${badge}
          ${p.injured?`<span class="il-badge" title="On injured list">IL</span>`:''}
          <span class="plink" style="margin-left:.4rem" onclick="showPlayer('${p.espnId}')">${esc(p.name)}</span>
          <span class="sub" style="font-size:.7rem"> ${esc((p.eligible||[]).join('/'))}</span>
        </div>
        <div style="text-align:right">
          <div class="num amber" style="font-weight:700">${best?best.pts:'—'}</div>
          <div class="sub" style="font-size:.55rem">BEST</div>
        </div>
      </div>
      <div class="daygrid" style="grid-template-columns:repeat(7,1fr)">
        ${dayHeads}${cells}
      </div>
    </div>`;
  };

  // order: starters by slot order, then bench
  const starterList = roster.filter(p => slotOf[String(p.espnId)])
    .sort((a,b)=> slotOf[String(a.espnId)].idx - slotOf[String(b.espnId)].idx);
  const benchList = roster.filter(p => !slotOf[String(p.espnId)]);
  const starterCards = starterList.map(cardFor).join('');
  const benchCards = benchList.map(cardFor).join('');

  return `
    <div class="eyebrow">${isMine?'★ Your team':'👁 Viewing'} · ${esc(t.name)}${t.owner?` · ${esc(t.owner)}`:''}</div>
    <div class="row-between">
      <div class="h1">${isMine?'My Team':'League Team'}</div>
      ${isMine ? `<div class="row" style="gap:.4rem">
        <button class="btn btn-sm btn-ghost" onclick="openTradeCenter()">⇄ Trades${pendingForMe().length?` (${pendingForMe().length})`:''}</button>
        ${isDynasty()?`<button class="btn btn-sm btn-ghost" onclick="openPickAssets()">◆ Picks</button>`:''}
        <button class="btn btn-sm btn-ghost" onclick="openAddDrop()">+/− Players</button>
        <button class="btn btn-sm btn-ghost" onclick="editLineup()">Lineup ⛶</button>
      </div>` : `<button class="btn btn-sm btn-amber" onclick="viewMyOwnTeam()">← My team</button>`}
    </div>

    <div class="row" style="gap:.35rem;margin-top:.5rem">
      <button class="btn btn-sm ${teamViewMode==='lineup'?'btn-amber':'btn-ghost'}" onclick="setTeamView('lineup')">📋 Lineup</button>
      <button class="btn btn-sm ${teamViewMode==='stats'?'btn-amber':'btn-ghost'}" onclick="setTeamView('stats')">📊 Stats</button>
    </div>

    <div class="card" style="padding:.5rem .75rem;margin-top:.5rem">
      <label class="sub" style="font-size:.65rem">View team</label>
      <select class="select" style="width:100%;margin-top:.25rem" onchange="setViewingTeam(this.value)">
        ${LG().teams.map(tm => `<option value="${tm.id}" ${String(tm.id)===String(viewingId)?'selected':''}>
          ${esc(tm.name)}${tm.owner?` (${esc(tm.owner)})`:''}${String(tm.id)===String(mine)?' — you':''}</option>`).join('')}
      </select>
    </div>

    ${isMine ? `<div class="card" style="padding:.5rem .75rem;margin-top:.5rem;${isWeekLocked(week)?'border-color:var(--bad)':'border-color:var(--line)'}">
      <div class="row-between">
        <span class="sub" style="font-size:.72rem">
          ${isWeekLocked(week)
            ? `<span class="cell-neg">🔒 Week ${week} lineup locked</span>`
            : `⏳ Week ${week} locks in <b class="amber">${lockCountdown(week)}</b>`}
        </span>
        <span class="sub" style="font-size:.65rem">${isWeekLocked(week)?'':'Sun 11:00 AM'}</span>
      </div>
    </div>` : `<div class="card" style="padding:.5rem .75rem;margin-top:.5rem">
      <span class="sub" style="font-size:.72rem">👁 Read-only — you can view but not edit another team's lineup.</span>
    </div>`}

    <div class="card mt" style="border-color:var(--amber)">
      <div class="row-between" style="margin-bottom:.5rem">
        <button class="btn btn-sm btn-ghost" onclick="changeWeek(-1)" ${week<=1?'disabled':''}>← Wk ${week-1}</button>
        <span class="display amber">WEEK ${week}</span>
        <button class="btn btn-sm btn-ghost" onclick="changeWeek(1)" ${week>=26?'disabled':''}>Wk ${week+1} →</button>
      </div>
      <div class="row-between">
        <div>
          <div class="sub" style="font-size:.65rem">${dayLabel(start)}–${dayLabel(end)}</div>
          <div class="display" style="font-size:.9rem;color:var(--sage)">Starters' best games</div>
        </div>
        <div style="text-align:right">
          <div class="num amber display" style="font-size:2rem">${teamTotal.toFixed(1)}</div>
          <div class="sub" style="font-size:.6rem">WEEK TOTAL</div>
        </div>
      </div>
    </div>

    ${teamViewMode === 'stats'
      ? renderTeamStats(roster, slotOf)
      : `${!haveLogs ? `<div class="card"><p class="sub">No game data cached yet. Pull stats to see daily scoring.
          <button class="btn btn-sm btn-block mt" onclick="pullAllStats()">Pull MLB stats for my roster</button></p></div>`
          : (teamTotal===0 ? `<div class="card"><p class="sub" style="font-size:.78rem">
            No games found for your starters in week ${week} (${dayLabel(start)}–${dayLabel(end)}).
            ${currentWeekNow()!==week?`Today is week ${currentWeekNow()} — `:''}use the week arrows above to find a week with games,
            or re-pull stats.</p>
            <button class="btn btn-sm btn-ghost btn-block mt" onclick="pullAllStats()">Re-pull MLB stats</button></div>` : '')}

        <div class="divlabel">Starters · ${starters.length}</div>

        ${benchCards ? `<div class="divlabel mt">Bench</div>${benchCards}` : ''}

        <p class="sub mt" style="font-size:.7rem;text-align:center">
          Tap a player's <b>position badge</b> to move them or bench them.

          Lineups lock Sundays 11:00 AM.</p>`}
  `;

/* STATS view: all-stats table for a roster (best-avg, total, 7/14/30d at once) */
function renderTeamStats(roster, slotOf) {
  if (!roster.length) return '<p class="sub">No players on this roster yet.</p>';
  // make sure each player has computed fields (compute missing in background)
  const missing = roster.filter(p => p.mlbId && p.ptsSeason == null);
  if (missing.length) { Promise.all(missing.map(computeOnePlayer)).then(()=>renderActive()); }
  const sorted = [...roster].sort((a,b) => (b.bestAvg ?? -1) - (a.bestAvg ?? -1));
  const rows = sorted.map(p => {
    const isStarter = !!slotOf[String(p.espnId)];
    return `<tr style="${isStarter?'':'opacity:.7'}">
      <td><span class="plink" onclick="showPlayer('${p.espnId}')">${esc(p.name)}</span>
        ${p.injured?'<span class="il-badge">IL</span>':''}
        <span class="sub" style="font-size:.6rem;display:block">${esc((p.eligible||[]).join('/'))}${isStarter?' · '+slotOf[String(p.espnId)].label:' · bench'}</span></td>
      <td class="r num cell-best" style="font-weight:700">${p.bestAvg!=null?p.bestAvg.toFixed(1):'—'}</td>
      <td class="r num">${p.ptsSeason!=null?p.ptsSeason.toFixed(0):'—'}</td>
      <td class="r num" style="font-size:.72rem">${p.pts30!=null?p.pts30.toFixed(0):'—'}</td>
      <td class="r num" style="font-size:.72rem">${p.pts14!=null?p.pts14.toFixed(0):'—'}</td>
      <td class="r num" style="font-size:.72rem">${p.pts7!=null?p.pts7.toFixed(0):'—'}</td>
      ${LSET().useSalaryCap?`<td class="r num" style="font-size:.7rem">${fmtMoney(playerCapHit(p))}${playerContract(p)?' 📝':isArbPlayer(p)?' A':''}</td>`:''}

/* 10-year salary lookahead for a team: each future season's committed cap hit. */
function renderSalaryLookahead(teamId) {
  const startYr = currentSeasonYear();
  const cap0 = leagueCap();
  const growth = (SALCFG().capGrowthPct || 0) / 100;
  const roster = teamRoster(teamId);
  let html = `<div class="divlabel mt">10-year salary lookahead</div>
    <div class="card card-tight" style="overflow-x:auto">
      <table class="tbl"><thead><tr><th>Year</th><th class="r">Committed</th><th class="r">Cap</th><th class="r">Space</th></tr></thead><tbody>`;
  for (let i=0; i<10; i++) {
    const yr = startYr + i;
    let committed = 0;
    roster.forEach(p => {
      const c = playerContract(p);
      if (c) committed += contractSalaryForYear(c, yr);
      else if (isArbPlayer(p)) committed += SALCFG().arbSalary;   // arb stays flat, no escalation
      // unsigned non-arb players: no future commitment (must sign to keep beyond now)
    });
    // dead cap + money trades for that year
    ((LG().deadCap||{})[teamId]||[]).forEach(d => { if (d.year===yr) committed += d.amount; });
    (LG().moneyTrades||[]).forEach(mt => {
      const yrs=mt.years||1, start=mt.startYear||startYr;
      if (yr>=start && yr<start+yrs){ const per=mt.perYear!=null?mt.perYear:Math.round(mt.amount/yrs);
        if(String(mt.to)===String(teamId))committed-=per; if(String(mt.from)===String(teamId))committed+=per; }
    });
    const cap = Math.round(cap0 * Math.pow(1+growth, i));
    const space = cap - committed;
    html += `<tr><td class="pos">${yr}</td>
      <td class="r num">${fmtMoney(committed)}</td>
      <td class="r num sub">${fmtMoney(cap)}</td>
      <td class="r num ${space<0?'cell-neg':''}" style="${space>=0?'color:var(--good)':''}">${fmtMoney(space)}</td></tr>`;
  }
  html += `</tbody></table></div>
    <p class="sub" style="font-size:.64rem;text-align:center;margin-top:.3rem">Signed contracts escalate; arb players stay flat; unsigned players show no future commitment. Cap grows ${SALCFG().capGrowthPct}%/yr.</p>`;
  return html;
}

/* roster (array of player objects) for a team */
function teamRoster(teamId) {
  return LG().draft.picks
    .filter(pk => String(pk.teamId) === String(teamId))
    .map(pk => { const p = LG().playerPool.find(x => String(x.espnId)===String(pk.playerId));
      return p ? {...p, pick: pk.pick} : null; })
    .filter(Boolean);
}

/* Max roster size = starting slots + bench. IL players don't count. */
function rosterCap() {
  return (activeLineupSlots()||[]).length + rosterBenchCount();
}
/* count of a team's roster excluding IL-stashed players */
function rosterActiveCount(teamId) {
  const ir = LG().irStash?.[teamId] || [];
  return teamRoster(teamId).filter(p => !ir.includes(String(p.espnId))).length;
}

/* starters for team+week — manual lineup, or default to first N if unset */
/* The lineup for team+week: {assignments: {slotIdx: playerId}}.
   Carries forward from the most recent prior week if unset. */
function getLineup(teamId, week) {
  const lu = LG().lineups?.[teamId]?.[week];
  if (lu?.assignments && Object.keys(lu.assignments).length) return lu;
  // carry forward most recent prior week's lineup
  for (let w = week-1; w >= 1; w--) {
    const prev = LG().lineups?.[teamId]?.[w];
    if (prev?.assignments && Object.keys(prev.assignments).length)
      return { assignments: {...prev.assignments}, carried: true };
  }
  // never set → build a sensible default lineup so scoring still works
  return { assignments: defaultLineup(teamId), isDefault: true };
}

/* Auto-build a valid default lineup: greedily fill each slot with the
   best-ADP eligible un-used player. Ensures unset/locked weeks still score. */
function defaultLineup(teamId) {
  const slots = activeLineupSlots() || [];
  const roster = teamRoster(teamId).slice().sort((a,b)=>a.adp-b.adp); // best first
  const used = new Set();
  const assign = {};
  slots.forEach((s, idx) => {
    const pick = roster.find(r =>
      !used.has(String(r.espnId)) &&
      s.eligible.some(e => (r.eligible||[]).includes(e)));
    if (pick) { assign[idx] = pick.espnId; used.add(String(pick.espnId)); }
  });
  return assign;
}
/* starters = the set of player IDs assigned to any slot */
function getStarters(teamId, week) {
  const lu = getLineup(teamId, week);
  return Object.values(lu.assignments || {}).filter(Boolean).map(String);
}

/* ---- TAP-TO-MOVE LINEUP (from roster page) ----
   Tapping a player's slot badge opens this. Choose a new slot or bench.
   If the chosen slot is occupied, that player is bumped to bench. ---- */
window.pickPosition = function(espnId) {
  const week = activeWeek();
  if (isWeekLocked(week)) { toast('Week is locked', 'err'); return; }
  const p = teamRoster(myTeamId()).find(x => String(x.espnId)===String(espnId));
  if (!p) return;
  ensureLineupExists(week);
  const lu = LG().lineups[myTeamId()][week];
  const assign = lu.assignments;
  const slots = activeLineupSlots() || [];
  const curSlot = Object.entries(assign).find(([i,pid]) => String(pid)===String(espnId))?.[0];

  // which slots is this player eligible for?
  const eligibleSlotIdxs = slots.map((s,i)=>({s,i}))
    .filter(({s}) => s.eligible.some(e => (p.eligible||[]).includes(e)));

  const slotBtns = eligibleSlotIdxs.map(({s,i}) => {
    const occupant = assign[i] ? teamRoster(myTeamId()).find(r=>String(r.espnId)===String(assign[i])) : null;
    const isCur = String(curSlot)===String(i);
    return `<button class="btn ${isCur?'btn-amber':'btn-ghost'} btn-block mt" style="text-align:left"
      onclick="moveToSlot('${espnId}',${i})">
      <b>${esc(s.slot)}</b>${occupant&&!isCur?`<span class="sub"> · bumps ${esc(occupant.name)}</span>`:''}${isCur?' <span class="sub">· current</span>':''}
    </button>`;

  openModal(`

};

/* materialize the current (possibly default/carried) lineup into storage so edits stick */
function ensureLineupExists(week) {
  const tid = myTeamId();
  LG().lineups = LG().lineups || {};
  LG().lineups[tid] = LG().lineups[tid] || {};
  if (!LG().lineups[tid][week]?.assignments || !Object.keys(LG().lineups[tid][week].assignments).length) {
    const cur = getLineup(tid, week);  // default or carried
    LG().lineups[tid][week] = { assignments: {...cur.assignments} };
  }
}

window.moveToSlot = function(espnId, slotIdx) {
  const week = activeWeek();
  if (isWeekLocked(week)) { toast('Week is locked', 'err'); return; }
  ensureLineupExists(week);
  const assign = LG().lineups[myTeamId()][week].assignments;
  // remove player from any current slot
  for (const k of Object.keys(assign)) {
    if (String(assign[k])===String(espnId)) delete assign[k];
  }
  if (slotIdx !== 'bench') {
    // bump whoever is in the target slot
    if (assign[slotIdx]) delete assign[slotIdx];  // bumped player → bench (just unassigned)
    assign[slotIdx] = espnId;
  }
  save();  // local save (lineups are device-level)
  closeModal();
  renderActive();
};

function renderLineupEditor(week, locked) {
  const slots = activeLineupSlots() || [];
  const roster = teamRoster(myTeamId());
  const assign = window._lineupWork || {};
  const usedIds = new Set(Object.values(assign).filter(Boolean).map(String));

  const slotRows = slots.map((s, idx) => {
    const pid = assign[idx];
    const p = pid ? roster.find(r => String(r.espnId)===String(pid)) : null;
    // eligible players for this slot, not already used elsewhere
    const opts = roster.filter(r => {
      const elig = (r.eligible||[]);
      const fits = s.eligible.some(e => elig.includes(e));
      return fits && (!usedIds.has(String(r.espnId)) || String(r.espnId)===String(pid));
    });
    const optHtml = ['<option value="">— empty —</option>']
      .concat(opts.map(r => `<option value="${r.espnId}" ${String(r.espnId)===String(pid)?'selected':''}>${esc(r.name)} (${esc((r.eligible||[]).join('/'))})</option>`))
      .join('');
    return `<div class="row-between" style="padding:.35rem 0;border-bottom:1px solid rgba(42,61,48,.4);gap:.5rem">
      <span class="starter-badge s" style="min-width:42px;text-align:center">${esc(s.slot)}</span>
      <select class="select" style="flex:1" ${locked?'disabled':''}
        onchange="assignSlot(${idx},this.value)">${optHtml}</select>
    </div>`;
  }).join('');

  // bench = rostered players not in any slot
  const bench = roster.filter(r => !usedIds.has(String(r.espnId)));
  const benchHtml = bench.length
    ? bench.map(r => `<span class="starter-badge b" style="margin:.15rem">${esc(r.name)}</span>`).join('')
    : '<span class="sub">none</span>';

  return `
    <div class="h2">Lineup · Week ${week}</div>
    <div class="row-between mb">
      <span class="sub">${locked ? '<span class="cell-neg">🔒 Locked</span>' : `Locks in ${lockCountdown(week)}`}</span>
      <span class="sub" style="font-size:.7rem">${SP().label}</span>
    </div>
    ${locked ? `<p class="sub mb" style="font-size:.72rem">This week's lineup is locked. Edit a future week with the arrows.</p>` : ''}
    <div style="max-height:48vh;overflow-y:auto">${slotRows}</div>
    <div class="divlabel mt">Bench</div>
    <div style="line-height:1.8">${benchHtml}</div>
    ${!locked ? `<button class="btn btn-block mt" onclick="saveLineup()">Save lineup</button>` : ''}
    <button class="btn btn-ghost btn-block mt" onclick="closeModal()">${locked?'Close':'Cancel'}</button>
  `;
}

window.assignSlot = function(slotIdx, playerId) {
  window._lineupWork = window._lineupWork || {};

  if (playerId) {

};
